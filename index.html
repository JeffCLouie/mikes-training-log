//============================================================ DATA QA
// A data-quality workspace: see how the live data reconciles with Mike's own
// checksums, spot-check the uncertain entries, rule on them, and edit raw values.
//
// Persistence: rulings/edits are saved to the browser (localStorage) right now.
// To back them with a server later, set QAStore.SYNC_URL to an endpoint — every
// save then also POSTs {key,value}; no other code changes needed.
const QAStore = {
  SYNC_URL: null,                       // e.g. "/api/qa" once a server exists
  K_RUL:"mtl_rulings", K_EDIT:"mtl_edits",
  _load(k){ try{return JSON.parse(localStorage.getItem(k)||"{}")}catch{return{}} },
  _save(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch{} this._sync(k,v); },
  _sync(k,v){ if(!this.SYNC_URL)return; try{fetch(this.SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:k,value:v,at:new Date().toISOString()})})}catch(e){} },
  rulings(){ return this._load(this.K_RUL); },
  setRuling(id,val){ const r=this.rulings(); if(val&&val.trim())r[id]={val:val.trim(),ts:Date.now()}; else delete r[id]; this._save(this.K_RUL,r); },
  edits(){ return this._load(this.K_EDIT); },
  setEdit(id,orig,patch){ const e=this.edits(); e[id]={orig,patch,ts:Date.now()}; this._save(this.K_EDIT,e); },
  clearEdit(id){ const e=this.edits(); delete e[id]; this._save(this.K_EDIT,e); },
  exportBlob(){ return JSON.stringify({exportedAt:new Date().toISOString(),rulings:this.rulings(),edits:this.edits()},null,2); },
};
let QADATA=null, qaSub="review";   // land straight on Spot-check & rulings — the primary workflow
const qaId = r => `${r.d}|${r.s}|${r.r||""}`;

function renderQA(app){
  if(!QADATA){
    app.innerHTML=`<h2 class="section">Data QA</h2><div class="card"><p class="muted">Loading checksums…</p></div>`;
    fetch("qa-data.json").then(r=>r.json()).then(j=>{QADATA=j; if(current==="qa")renderQA(app);})
      .catch(()=>{QADATA={annual:{},runTable:{}}; if(current==="qa")renderQA(app);});
    return;
  }
  const subs=[["review","Spot-check &amp; rulings"],["outliers","Outliers"],["health","Data health"],["edit","Edit entries"]];
  app.innerHTML=`
    <h2 class="section">Data QA</h2>
    <div class="card" style="margin-bottom:14px">
      <p class="muted" style="margin:0 0 8px">Cross-check the live data against Mike's own written totals, review the
      uncertain entries, and record rulings. Changes are saved in this browser${QAStore.SYNC_URL?"":" (a server can be wired in later)"}.</p>
      <div class="qa-subnav">${subs.map(([id,n])=>`<button data-sub="${id}" class="${id===qaSub?'on':''}">${n}</button>`).join("")}</div>
    </div>
    <div id="qa-body"></div>`;
  app.querySelectorAll(".qa-subnav button").forEach(b=>b.onclick=()=>{qaSub=b.dataset.sub; renderQA(app);});
  const body=app.querySelector("#qa-body");
  if(qaSub==="health") qaHealth(body);
  else if(qaSub==="outliers") qaOutliers(body);
  else if(qaSub==="review") qaReview(body);
  else qaEdit(body);
}

// ---- Data health: confidence + reconciliation vs Mike's totals ----
function qaHealth(el){
  const real=DATA.filter(r=>r.s!=="note");
  const cc={x:0,d:0,u:0}, ck={x:0,d:0,u:0};
  for(const r of real){ cc[r.c]=(cc[r.c]||0)+1; if(r.k)ck[r.c]=(ck[r.c]||0)+r.k; }
  const totK=ck.x+ck.d+ck.u||1;
  const pct=v=>Math.round(100*v/totK);
  const outCount=DATA.reduce((n,r)=>n+(outlierInfo(r)?1:0),0);   // physically-impossible entries
  // reconciliation table
  const sum={}; for(const r of DATA){ if(!r.k)continue; const y=yearOf(r); sum[y]=sum[y]||{}; sum[y][r.s]=(sum[y][r.s]||0)+r.k; }
  const years=Object.keys(QADATA.annual).sort();
  let offCount=0, rows="";
  for(const y of years){
    const a=QADATA.annual[y]; if(!a)continue;
    const cells=["run","bike","swim"].map(sp=>{
      if(a[sp]==null) return `<td class="muted">·</td>`;
      const gotRaw=sum[y]?.[sp]||0, got=Math.round(gotRaw), diff=Math.round(gotRaw-a[sp]);
      const off=Math.abs(diff)>Math.max(5,a[sp]*0.03); if(off)offCount++;
      const col=off?(diff>0?"var(--bad,#e0685f)":"var(--warn,#d8a24a)"):"var(--accent)";
      return `<td title="Mike ${a[sp]} · data ${got}"><span style="color:${col}">${diff>0?"+":""}${diff}</span></td>`;
    }).join("");
    rows+=`<tr><td><b>${y}</b></td>${cells}</tr>`;
  }
  el.innerHTML=`
    <div class="grid stat-row" style="margin-bottom:14px">
      <div class="card stat"><div class="num" style="color:var(--accent)">${pct(ck.x)}%</div><div class="lbl">Distance confident (c=x)</div></div>
      <div class="card stat"><div class="num" style="color:var(--warn,#d8a24a)">${pct(ck.d)}%</div><div class="lbl">Doubtful (c=d)</div></div>
      <div class="card stat"><div class="num">${cc.d+cc.u}</div><div class="lbl">Rows needing review</div></div>
      <div class="card stat"><div class="num">${offCount}</div><div class="lbl">Sport-years off vs Mike</div></div>
      <div class="card stat qa-jump" data-sub="outliers" role="button" tabindex="0" title="Open the Outliers view" style="cursor:pointer"><div class="num" style="color:${outCount?"var(--bad,#e0685f)":"var(--accent)"}">${outCount}</div><div class="lbl">Impossible entries →</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <h3>Runs — reconciled ✔</h3>
      <p class="muted" style="margin:0">Runs come from the precise running log and match Mike's own per-year run
      table exactly (his grand total: ${QADATA.runTable?Object.values(QADATA.runTable).reduce((a,r)=>a+r.runs,0):"—"} runs). These are trustworthy.</p>
    </div>
    <div class="card">
      <h3>Distance vs Mike's annual totals — difference (km)</h3>
      <p class="muted" style="margin:0 0 10px">Grid distances (bike/swim) are ~95% low-confidence guesses, so they overshoot
      Mike's own yearly totals. Green = within 3%; <span style="color:var(--bad,#e0685f)">red</span> = data reads high;
      <span style="color:var(--warn,#d8a24a)">amber</span> = reads low. The goal is all-green, via the rulings under
      “Spot-check”.</p>
      <div style="overflow-x:auto"><table class="qa-tbl">
        <thead><tr><th>Year</th><th>Run</th><th>Bike</th><th>Swim</th></tr></thead>
        <tbody>${rows}</tbody></table></div>
    </div>`;
  const jump=el.querySelector(".qa-jump");
  if(jump){ const go=()=>{ qaSub="outliers"; renderQA(document.getElementById("app")); };
    jump.onclick=go; jump.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }; }
}

// ---- Shared QA entry card ----
// One consistent, compact card used by both Spot-check and Outliers, built to
// answer four questions at a glance, top to bottom: (1) what the parser made of
// the cell — the Raw Data columns; (2) why it's flagged; (3) the raw shorthand
// exactly as Mike wrote it; (4) where he rules on it (free text + quick buttons).
// Reuses the Raw Data vocabulary: sport tags, confidence pills, km/pace formatting.
const capFirst = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
function qaCard(r,{tone,why,emph,placeholder,focusLabel,quick,rv}){
  const id=qaId(r), eid=escapeHtml(id);
  const conf = r.c==="x" ? `<span class="pill">confirmed</span>`
                         : `<span class="pill ${r.c}">${CONF[r.c]}</span>`;
  const pace = perf(r) || (r.a!=null?fmtNum(r.a,1)+" km/h":"—");
  const metrics=[
    ["Distance", r.k!=null?fmtNum(r.k,r.s==="swim"?2:1)+" km":"—"],
    ["Duration", fmtDur(r.t)||"—"],
    ["Pace / Speed", pace],
  ];
  if(r.h) metrics.push(["HR", r.h+" bpm"]);
  const strip=metrics.map(([l,v])=>
    `<span class="qa-metric${l===emph?" emph":""}"><b>${l}</b>${v}</span>`).join("");
  const qbtns=(quick||[]).map(q=>
    `<button type="button" class="qa-qbtn" data-fill="${escapeHtml(q.fill)}">${escapeHtml(q.label)}</button>`).join("");
  return `<div class="qa-item tone-${tone}${rv?" ruled":""}" data-id="${eid}">
    <div class="qa-head">
      <span class="qa-date">${r.d}</span>${sportTag(r.s)}${conf}
      <span class="qa-ruledtag">✓ ruled</span>
      <span class="qa-viewraw" ${focusAttrs(r.d,r.d,rowId(r),focusLabel)}>View in Raw Data →</span>
    </div>
    <div class="qa-strip"><span class="qa-striplbl">Interpreted as</span>${strip}</div>
    <div class="qa-why tone-${tone}">${why}</div>
    <div class="qa-rawrow"><span class="qa-rawlbl">Raw shorthand</span><span class="qa-raw">${escapeHtml(r.r||"—")}</span></div>
    <div class="qa-rule">
      <span class="qa-rulelbl">Mike's ruling</span>
      <div class="qa-ruleinput">
        <input class="qa-ruling${rv?" saved":""}" data-id="${eid}" placeholder="${escapeHtml(placeholder)}" value="${rv?escapeHtml(rv.val):""}">
        ${qbtns?`<div class="qa-quick">${qbtns}</div>`:""}
      </div>
    </div>
  </div>`;
}
// Persist a ruling and reflect the saved/ruled state on the card.
function markRuled(inp){
  const on=!!inp.value.trim();
  inp.classList.toggle("saved",on);
  const item=inp.closest(".qa-item"); if(item) item.classList.toggle("ruled",on);
}
// Wire ruling inputs + quick buttons for any QA view (Spot-check / Outliers).
function wireQARulings(el){
  el.querySelectorAll(".qa-ruling").forEach(inp=>{
    inp.onchange=()=>{ QAStore.setRuling(inp.dataset.id, inp.value); markRuled(inp); };
  });
  el.querySelectorAll(".qa-qbtn").forEach(btn=>{
    btn.onclick=()=>{
      const item=btn.closest(".qa-item"), inp=item&&item.querySelector(".qa-ruling");
      if(!inp) return;
      inp.value=btn.dataset.fill;
      QAStore.setRuling(inp.dataset.id, inp.value); markRuled(inp);
    };
  });
}

// ---- Outliers: physically-impossible entries, worst first ----
// The systematic version of the manual hunt (Records → a bogus best → Raw Data →
// compare to the source .txt): outlierInfo() flags any entry whose time+distance
// imply a humanly-impossible speed/pace, so parse errors surface as a list to rule
// on instead of one at a time. Each links straight into Raw Data, and the ruling
// box writes to the same store as Spot-check.
let qaOutFilter="unruled";
function qaOutliers(el){
  const rul=QAStore.rulings();
  let all=DATA.map(r=>({r,o:outlierInfo(r)})).filter(x=>x.o);
  all.sort((a,b)=>b.o.sev-a.o.sev);
  const total=all.length, ruled=all.filter(x=>rul[qaId(x.r)]).length;
  const bySport=all.reduce((m,x)=>((m[x.r.s]=(m[x.r.s]||0)+1),m),{});
  let cand=all;
  if(qaOutFilter==="unruled") cand=all.filter(x=>!rul[qaId(x.r)]);
  else if(qaOutFilter==="ruled") cand=all.filter(x=>rul[qaId(x.r)]);
  else if(qaOutFilter==="confident") cand=all.filter(x=>x.r.c==="x");
  const shown=cand.slice(0,300);
  const sportBits=Object.entries(bySport).sort((a,b)=>b[1]-a[1]).map(([s,n])=>`${sportTag(s)} ${n}`).join(" · ");
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="qa-row">
        <span><b>${total}</b> impossible ${total===1?"entry":"entries"} · <b>${ruled}</b> ruled</span>
        <select id="qo-filter">
          <option value="unruled" ${qaOutFilter==="unruled"?"selected":""}>Needs ruling</option>
          <option value="ruled" ${qaOutFilter==="ruled"?"selected":""}>Ruled</option>
          <option value="confident" ${qaOutFilter==="confident"?"selected":""}>Marked confident (c=x)</option>
          <option value="all" ${qaOutFilter==="all"?"selected":""}>All</option></select>
        <button class="btn ghost" id="qo-export">Export rulings + edits</button>
      </div>
      <p class="muted" style="margin:8px 0 0">Entries whose recorded time &amp; distance imply a speed or pace no human sustains —
      almost always a parse error (an H:MM time read as M:SS, two numbers merged into one distance, or an interval split read as a distance).
      ${sportBits?`Found in ${sportBits}. `:""}Sorted most-extreme first; each opens in Raw Data. These are excluded from pace/speed
      records automatically — ruling on them here also corrects the yearly totals. Showing ${shown.length} of ${cand.length}.</p>
    </div>
    ${shown.map(({r,o})=>qaCard(r,{
        tone:"bad",
        emph:"Pace / Speed",
        why:`<b>Physically impossible ${escapeHtml(o.kind)}</b> — <span class="qa-badval">${o.value}</span>. ${capFirst(escapeHtml(o.why))}.`,
        placeholder:"e.g. “time is 2:41:46 not 46s”, “distance doubled — 1.9k”, “drop”",
        focusLabel:`Outlier — ${o.kind} ${o.value}`,
        quick:[{label:"Drop entry",fill:"drop"}],
        rv:rul[qaId(r)]
      })).join("") || `<div class="card muted">Nothing matches this filter. 🎉</div>`}`;
  el.querySelector("#qo-filter").onchange=e=>{qaOutFilter=e.target.value; qaOutliers(el);};
  el.querySelector("#qo-export").onclick=qaExport;
  wireQARulings(el);
}

// ---- Spot-check & rulings: work through the uncertain rows ----
// Why an entry needs a look: it's physically impossible, an outright uncertain
// parse, or a distance merely *deduced* from ambiguous grid shorthand. Returns
// the tone + a plain-English reason + which interpreted metric to highlight.
function reviewWhy(r){
  const o=outlierInfo(r);
  if(o) return {tone:"bad", emph:"Pace / Speed",
    html:`<b>Physically impossible.</b> ${capFirst(escapeHtml(o.why))} <span class="qa-badval">(${o.value})</span>`};
  const raw=r.r||"", nums=raw.match(/\d+(?:\.\d+)?/g)||[];
  let hint="";
  if(/\+/.test(raw)) hint=" It joins two figures with “+”, so the distance is a sum that may not be what Mike meant.";
  else if(nums.length>=2) hint=" It holds more than one number, so which is distance vs. time or speed is a guess.";
  if(r.c==="u") return {tone:"warn", emph:"Distance",
    html:`<b>Uncertain parse.</b> This cell was too ambiguous to read with confidence.${hint}`};
  return {tone:"warn", emph:"Distance",
    html:`<b>Deduced distance.</b> Read from ambiguous grid shorthand, so it can overshoot Mike's real total.${hint}`};
}
let qaFilter={year:"",sport:"",only:"unruled"};
function qaReview(el){
  const rul=QAStore.rulings();
  let cand=DATA.filter(r=>r.c!=="x" && r.s!=="note");
  const years=[...new Set(cand.map(yearOf))].sort((a,b)=>a-b);
  const sports=[...new Set(cand.map(r=>r.s))].sort();
  if(qaFilter.year) cand=cand.filter(r=>String(yearOf(r))===qaFilter.year);
  if(qaFilter.sport) cand=cand.filter(r=>r.s===qaFilter.sport);
  if(qaFilter.only==="unruled") cand=cand.filter(r=>!rul[qaId(r)]);
  else if(qaFilter.only==="ruled") cand=cand.filter(r=>rul[qaId(r)]);
  cand.sort((a,b)=>(b.k||0)-(a.k||0));               // biggest impact first
  const shown=cand.slice(0,200);
  const total=DATA.filter(r=>r.c!=="x"&&r.s!=="note").length;
  const ruled=Object.keys(rul).length;
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="qa-row">
        <span><b>${ruled}</b> ruled · <b>${Math.max(0,total-ruled)}</b> left</span>
        <select id="qf-year"><option value="">All years</option>${years.map(y=>`<option ${qaFilter.year==String(y)?"selected":""}>${y}</option>`).join("")}</select>
        <select id="qf-sport"><option value="">All sports</option>${sports.map(s=>`<option ${qaFilter.sport==s?"selected":""}>${sportName(s)}</option>`).join("")}</select>
        <select id="qf-only">
          <option value="unruled" ${qaFilter.only==="unruled"?"selected":""}>Needs ruling</option>
          <option value="ruled" ${qaFilter.only==="ruled"?"selected":""}>Ruled</option>
          <option value="all" ${qaFilter.only==="all"?"selected":""}>All</option></select>
        <button class="btn ghost" id="qa-export">Export rulings + edits</button>
      </div>
      <p class="muted" style="margin:8px 0 0">Low-confidence entries, biggest distance first. Each card shows what the parser
      <b>made of the cell</b>, <b>why</b> it's uncertain, and the <b>raw shorthand</b> Mike wrote — then rule on it: type a
      correction (“swim 1.8k”, “96 km bike”), or tap <b>Looks right</b> / <b>Drop</b>. Showing ${shown.length} of ${cand.length}.</p>
    </div>
    ${shown.map(r=>{ const w=reviewWhy(r);
      return qaCard(r,{
        tone:w.tone, why:w.html, emph:w.emph,
        placeholder:"e.g. “swim 1.8k”, “96 km bike”, “drop — placement”",
        focusLabel:"Spot-check entry",
        quick:[{label:"Looks right",fill:"correct"},{label:"Drop",fill:"drop"}],
        rv:rul[qaId(r)]
      });
    }).join("") || `<div class="card muted">Nothing matches this filter. 🎉</div>`}`;
  el.querySelector("#qf-year").onchange=e=>{qaFilter.year=e.target.value; qaReview(el);};
  el.querySelector("#qf-sport").onchange=e=>{qaFilter.sport=e.target.value; qaReview(el);};
  el.querySelector("#qf-only").onchange=e=>{qaFilter.only=e.target.value; qaReview(el);};
  el.querySelector("#qa-export").onclick=qaExport;
  wireQARulings(el);
}

// ---- Edit entries: correct raw values directly, tracked ----
let qaSearch="";
function qaEdit(el){
  const edits=QAStore.edits();
  let rows=DATA;
  if(qaSearch.trim()){ const q=qaSearch.toLowerCase(); rows=rows.filter(r=>(r.r||"").toLowerCase().includes(q)||r.d.includes(q)||r.s.includes(q)); }
  rows=rows.slice(0,150);
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="qa-row">
        <input id="qe-search" placeholder="Search by date, sport, or raw text…" value="${escapeHtml(qaSearch)}" style="flex:1;min-width:180px">
        <span class="muted"><b>${Object.keys(edits).length}</b> edited</span>
        <button class="btn ghost" id="qa-export2">Export rulings + edits</button>
      </div>
      <p class="muted" style="margin:8px 0 0">Edit distance (km), duration, sport, or note. Edited rows are flagged and
      recorded (original + new) so I can learn the pattern and apply it broadly. Showing ${rows.length}${qaSearch?"":" (search to narrow)"}.</p>
    </div>
    <div style="overflow-x:auto"><table class="qa-tbl qa-edit">
      <thead><tr><th>Date</th><th>Raw</th><th>Sport</th><th>km</th><th>Note</th><th></th></tr></thead>
      <tbody>${rows.map(r=>{ const id=qaId(r); const ed=edits[id];
        return `<tr class="${ed?"edited":""}" data-id="${id}">
          <td class="nowrap">${r.d}${ed?' <span title="edited" class="qa-flag">●</span>':''}</td>
          <td class="qa-rawc">${escapeHtml(r.r||"")}</td>
          <td><input class="qe-s" value="${escapeHtml(ed?.patch.s??r.s)}" size="6"></td>
          <td><input class="qe-k" value="${ed?.patch.k??r.k??""}" size="5" inputmode="decimal"></td>
          <td><input class="qe-n" value="${escapeHtml(ed?.patch.n??r.n??"")}" size="16"></td>
          <td>${ed?`<button class="qe-undo" title="revert">↺</button>`:""}</td>
        </tr>`;}).join("")}</tbody></table></div>`;
  el.querySelector("#qe-search").onchange=e=>{qaSearch=e.target.value; qaEdit(el);};
  el.querySelector("#qa-export2").onclick=qaExport;
  el.querySelectorAll("tbody tr").forEach(tr=>{
    const id=tr.dataset.id; const r=DATA.find(x=>qaId(x)===id);
    const save=()=>{ const patch={s:tr.querySelector(".qe-s").value.trim(), k:tr.querySelector(".qe-k").value.trim(), n:tr.querySelector(".qe-n").value.trim()};
      QAStore.setEdit(id,{s:r.s,k:r.k??"",n:r.n??""},patch); tr.classList.add("edited"); };
    tr.querySelectorAll("input").forEach(i=>i.onchange=save);
    const u=tr.querySelector(".qe-undo"); if(u)u.onclick=()=>{QAStore.clearEdit(id); qaEdit(el);};
  });
}

function qaExport(){
  const blob=new Blob([QAStore.exportBlob()],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="mikes-training-log-qa.json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

//============================================================ boot
fetch("data.json").then(r=>r.json()).then(j=>{
  META=j.meta; DATA=j.rows;
  const tab=tabOf(location.hash);
  current=TABS.some(t=>t[0]===tab)?tab:"dash";
  renderTabs(); route();
}).catch(e=>{
  document.getElementById("app").innerHTML=
    `<div class="card" style="margin-top:20px"><h3>Couldn't load data.json</h3>
     <p class="muted">If you opened this file directly from disk, your browser blocks loading
     <code>data.json</code>. View it through the GitHub Pages link, or run a local server
     (<code>python -m http.server</code>) in this folder.</p>
     <div class="rawbox">${e}</div></div>`;
});

//============================================================ mobile nav drawer
// A slide-out menu (hamburger, top-left) for phones — replaces the old crowded
// bottom bar. Built additively: it drives the existing go() router and mirrors
// its active state, so it needs no changes to the routing code above.
(function(){
  const ICONS = {
    dash:    '<path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.6V21h13V9.6"/>',
    insights:'<path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-3.8 10.6c.6.5.8 1 .8 2.4h6c0-1.4.2-1.9.8-2.4A6 6 0 0 0 12 3Z"/>',
    calendar:'<rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 2.5v4"/><path d="M16 2.5v4"/>',
    reports: '<path d="M4 21V10"/><path d="M10 21V4"/><path d="M16 21v-7"/><path d="M21 21H3"/>',
    records: '<path d="M7 4h10v3a5 5 0 0 1-10 0Z"/><path d="M7 5H4v1a3 3 0 0 0 3 3"/><path d="M17 5h3v1a3 3 0 0 1-3 3"/><path d="M10 17h4v3h-4z"/><path d="M9 20h6"/><path d="M12 12v5"/>',
    perf:    '<path d="M4 19h16"/><path d="M6 19v-6"/><path d="M11 19V6"/><path d="M16 19v-9"/><path d="M4.5 10.5 9 6l3 3 5.5-5.5"/>',
    wrapped: '<path d="M12 3l2.3 5.4L20 9l-4 3.6L17.2 19 12 16l-5.2 3L8 12.6 4 9l5.7-.6z"/>',
    browse:  '<path d="M4 6h16M4 12h16M4 18h16"/>',
    qa:      '<path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/>',
    changelog:'<path d="M3.5 12a8.5 8.5 0 1 0 2.5-6"/><path d="M3 4v4h4"/><path d="M12 8v4.2l2.8 1.7"/>',
    about:   '<circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r="1.1" fill="currentColor" stroke="none"/>',
  };
  const hamburger = document.getElementById("hamburger");
  if(!hamburger || typeof TABS==="undefined") return;

  const backdrop = document.createElement("div");
  backdrop.className = "drawer-backdrop";
  const drawer = document.createElement("aside");
  drawer.className = "drawer"; drawer.id = "drawer";
  drawer.setAttribute("role","dialog"); drawer.setAttribute("aria-label","Site navigation");
  drawer.setAttribute("aria-hidden","true");
  drawer.innerHTML =
    `<div class="drawer-head">
       <span class="dtitle"><span class="dot"></span>Menu</span>
       <button class="drawer-close" type="button" aria-label="Close menu">
         <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12"/><path d="M18 6L6 18"/></svg>
       </button>
     </div>
     <nav>${TABS.map(([id,name])=>
       `<button data-tab="${id}">
          <svg viewBox="0 0 24 24" aria-hidden="true">${ICONS[id]||""}</svg>
          <span>${name}</span></button>`).join("")}</nav>`;
  document.body.appendChild(backdrop);
  document.body.appendChild(drawer);

  const sync = ()=>drawer.querySelectorAll("nav button").forEach(b=>
    b.classList.toggle("active", b.dataset.tab===current));

  let open=false;
  function setOpen(v){
    open=v;
    backdrop.classList.toggle("open",v);
    drawer.classList.toggle("open",v);
    hamburger.setAttribute("aria-expanded",v?"true":"false");
    drawer.setAttribute("aria-hidden",v?"false":"true");
    document.body.style.overflow=v?"hidden":"";   // freeze background scroll while open
  }
  hamburger.onclick=()=>setOpen(!open);
  backdrop.onclick=()=>setOpen(false);
  drawer.querySelector(".drawer-close").onclick=()=>setOpen(false);
  drawer.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{ go(b.dataset.tab); setOpen(false); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&open) setOpen(false); });
  // Close (and release the frozen scroll) if the viewport grows to desktop width.
  window.matchMedia("(min-width:641px)").addEventListener("change",e=>{ if(e.matches&&open) setOpen(false); });

  // Wrap go() so the drawer tracks navigation triggered anywhere (tabs, drill-ins).
  if(typeof go==="function"){ const _go=go; window.go=function(t){ _go(t); sync(); }; }
  window.addEventListener("hashchange", sync);
  sync();
})();

//============================================================ QOL: nav helpers
// Back-to-top button, tap-the-brand-to-go-home, and 1..N keyboard tab jumps.
// Additive: relies on the existing go()/TABS, touches no render code.
(function(){
  const btn=document.createElement("button");
  btn.id="toTop"; btn.type="button"; btn.setAttribute("aria-label","Back to top");
  btn.innerHTML='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V6"/><path d="M6 12l6-6 6 6"/></svg>';
  btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
  document.body.appendChild(btn);
  const onScroll=()=>btn.classList.toggle("show",(window.scrollY||document.documentElement.scrollTop)>320);
  window.addEventListener("scroll",onScroll,{passive:true}); onScroll();

  const brand=document.querySelector(".brand");
  if(brand){ brand.setAttribute("role","button"); brand.title="Back to Dashboard"; brand.onclick=()=>go("dash"); }

  document.addEventListener("keydown",e=>{
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    const tag=(e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="select"||tag==="textarea"||e.target.isContentEditable) return;
    if(typeof TABS==="undefined") return;
    const n=parseInt(e.key,10);
    if(n>=1 && n<=TABS.length) go(TABS[n-1][0]);
  });
})();

//============================================================ QOL: line-chart hover/tap tooltips
// Delegated so it works for any lineChart rendered later. Shows a value bubble +
// focus guide for the hovered/tapped point.
(function(){
  let active=null;
  function hide(){
    if(!active) return;
    const t=active.querySelector(".lc-tip"); if(t)t.hidden=true;
    const fl=active.querySelector(".lc-focus"),fd=active.querySelector(".lc-fdot");
    if(fl)fl.style.display="none"; if(fd)fd.style.display="none";
    active=null;
  }
  function show(hit){
    const w=hit.closest(".lc-wrap"); if(!w) return; active=w;
    const tip=w.querySelector(".lc-tip");
    const fl=w.querySelector(".lc-focus"), fd=w.querySelector(".lc-fdot");
    const cx=hit.getAttribute("data-cx"), cy=hit.getAttribute("data-cy");
    if(fl){ fl.setAttribute("x1",cx); fl.setAttribute("x2",cx); fl.style.display="block"; }
    if(fd){ fd.setAttribute("cx",cx); fd.setAttribute("cy",cy); fd.style.display="block"; }
    tip.innerHTML='<b>'+hit.getAttribute("data-label")+'</b> '+hit.getAttribute("data-value");
    tip.hidden=false;
    // Position the HTML bubble over the focus dot using its real on-screen rect
    // (handles the SVG viewBox scaling for us).
    const dr=fd.getBoundingClientRect(), wr=w.getBoundingClientRect();
    tip.style.left=(dr.left-wr.left+dr.width/2)+"px";
    tip.style.top=(dr.top-wr.top)+"px";
  }
  document.addEventListener("pointermove",e=>{
    const hit=e.target.closest&&e.target.closest(".lc-hit");
    if(hit) show(hit);
    else if(!(e.target.closest&&e.target.closest(".lc-wrap"))) hide();
  },{passive:true});
  document.addEventListener("pointerdown",e=>{
    const hit=e.target.closest&&e.target.closest(".lc-hit");
    if(hit) show(hit);
  },{passive:true});
})();
</script>
