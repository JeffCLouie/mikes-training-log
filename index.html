<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Mike's Training Log</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161d26; --panel2:#1d2733; --line:#283546;
    --text:#e7edf3; --muted:#8aa0b5; --accent:#36c2a8; --accent2:#4d9fff;
    --shadow:0 2px 14px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent2);text-decoration:none}
  header.top{
    position:sticky;top:0;z-index:30;background:rgba(15,20,25,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  }
  .top-inner{max-width:1180px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{font-weight:700;font-size:18px;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:9px;flex:1;text-align:center}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
  nav.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
  nav.tabs button{
    background:transparent;border:1px solid transparent;color:var(--muted);
    padding:7px 13px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;
  }
  nav.tabs button:hover{color:var(--text);background:var(--panel)}
  nav.tabs button.active{color:var(--text);background:var(--panel2);border-color:var(--line)}
  main{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
  h2.section{font-size:20px;margin:6px 0 16px;font-weight:700}
  h3{font-size:15px;margin:0 0 10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .muted{color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:14px}
  .stat-row{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .stat .num{font-size:26px;font-weight:800;letter-spacing:.4px}
  .stat .lbl{color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .sportcards{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  .sportcard{display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:transform .08s,border-color .12s}
  .sportcard:hover{transform:translateY(-2px);border-color:var(--accent)}
  .sportcard .head{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .chip{width:13px;height:13px;border-radius:4px;flex:none}
  .sportcard .kv{display:flex;justify-content:space-between;font-size:13px}
  .sportcard .kv span:first-child{color:var(--muted)}
  /* controls */
  label.fld{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--muted);font-weight:600}
  select,input[type=text],input[type=number],input[type=date]{
    background:var(--panel2);border:1px solid var(--line);color:var(--text);
    padding:8px 10px;border-radius:9px;font-size:14px;font-family:inherit;width:100%;
  }
  select:focus,input:focus{outline:none;border-color:var(--accent)}
  .btn{background:var(--accent);color:#04201a;border:none;padding:9px 16px;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn:hover{filter:brightness(1.07)}
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .controls .fld{min-width:120px;flex:1}
  /* table */
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;user-select:none;background:var(--panel)}
  /* Sticky header for every table. .tablewrap is the scroll context (it has a
     max-height), so the header pins to the top of the table's own scroll area —
     top:0, not the viewport. The old top:54px assumed the page was the scroller,
     so inside the overflow:auto wrapper it floated 54px down over the rows. */
  .tablewrap th{position:sticky;top:0;z-index:2;box-shadow:inset 0 -1px 0 var(--line)}
  #x-table th{cursor:pointer}
  th.sortable:hover{color:var(--text)}
  tbody tr:hover{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow:auto;max-height:72vh;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  .sportlabel{display:inline-flex;align-items:center;gap:7px}
  .ic{font-size:14px;line-height:1;width:18px;text-align:center;flex:none;filter:saturate(.9)}
  .sportcard .head .ic{font-size:20px;width:24px}
  .pill{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .pill.d{color:#e0b15a;border-color:#5a4a26}
  .pill.u{color:#d98b8b;border-color:#5a3030}
  /* chart */
  .chartwrap{display:flex;gap:8px;align-items:flex-start;padding-top:15px;position:relative}
  .yunit{position:absolute;top:0;left:0;font-size:9px;color:var(--muted);line-height:1;letter-spacing:.3px}
  .yaxis{position:relative;width:34px;height:200px;flex:none}
  .yaxis span{position:absolute;right:0;bottom:0;transform:translateY(50%);font-size:10.5px;color:var(--muted);white-space:nowrap;line-height:1;font-variant-numeric:tabular-nums}
  .plot{flex:1;min-width:0}
  .chart{position:relative;display:flex;align-items:flex-end;gap:3px;height:200px}
  .gline{position:absolute;left:0;right:0;height:1px;background:var(--line);opacity:.45;pointer-events:none}
  .gline.base{opacity:.85}
  .bar{flex:1;background:linear-gradient(var(--accent),#1d6e60);border-radius:4px 4px 0 0;min-height:2px;position:relative;z-index:1;cursor:pointer;transition:opacity .1s}
  .bar:hover{opacity:.8}
  /* Lift the active bar (and its tooltip) above later sibling bars, which each
     create their own stacking context via z-index:1 and would otherwise clip it. */
  .bar:hover,.bar.show{z-index:6}
  .bar .val{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;pointer-events:none;transition:opacity .1s}
  .bar:hover .val{opacity:0}
  .bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;white-space:nowrap;margin-bottom:4px;z-index:5}
  .bar:hover .tip{display:block}
  .bar.show .tip{display:block}            /* tap-to-pin on touch devices */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:auto}
  .seg button{background:var(--panel2);color:var(--muted);border:none;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button+button{border-left:1px solid var(--line)}
  .seg button.on{background:var(--accent);color:#04201a}
  .cardhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .cardhead h3{margin:0}
  .xlab{position:relative;height:15px;margin-top:7px}
  .xlab span{position:absolute;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap}
  /* compact SVG line chart (y-axis fitted to the data range, not forced to 0) */
  .linechart{width:100%;height:auto;display:block;overflow:visible}
  .lc-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .lc-area{fill:rgba(54,194,168,.12);stroke:none}
  .lc-dot{fill:var(--accent)}
  .lc-grid{stroke:var(--line);stroke-width:1}
  .lc-ax{fill:var(--muted);font-size:10px}
  /* line-chart hover/tap: invisible hit columns, focus guide + value bubble */
  .lc-wrap{position:relative}
  .lc-hit{fill:transparent;cursor:crosshair}
  .lc-focus{display:none;stroke:var(--muted);stroke-width:1;stroke-dasharray:3 3;opacity:.55}
  .lc-fdot{display:none;fill:var(--accent);stroke:#04201a;stroke-width:1.5}
  .lc-tip{position:absolute;transform:translate(-50%,calc(-100% - 10px));background:#000;color:#fff;font-size:12px;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:6;box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .lc-tip[hidden]{display:none}
  /* insights: fun-fact callouts */
  .facts{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
  .fact{display:flex;gap:12px;align-items:center}
  .fact .big{font-size:22px;line-height:1}
  .fact .ftxt b{display:block;font-size:17px;font-weight:800}
  .fact .ftxt span{color:var(--muted);font-size:12.5px}
  /* insights: activity heatmap (GitHub-style) */
  .hm-box{position:relative}
  /* Year follows the scroll: pinned badge showing the year currently in view. */
  .hm-scroll{overflow-x:auto;padding-bottom:4px;scroll-behavior:smooth}
  .hm-months{display:flex;gap:3px;margin-bottom:4px;font-size:10px;color:var(--muted);height:15px}
  .hm-mlabel{width:16px;flex:none;white-space:nowrap;overflow:visible}
  .hm{display:flex;gap:3px}
  .hm-week{display:flex;flex-direction:column;gap:3px;flex:none}
  .hm-cell{width:16px;height:16px;border-radius:3px;background:var(--panel2)}
  .hm-cell[data-d]{cursor:pointer}
  .hm-cell[data-d]:hover{outline:2px solid var(--text);outline-offset:-1px}
  .hm-legend{display:flex;flex-wrap:wrap;align-items:center;gap:6px 6px;margin-top:9px;font-size:11.5px;color:var(--muted)}
  .hm-legend .hm-cell{width:12px;height:12px}
  /* day-detail overlay (tap a calendar square) */
  .overlay{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.55);backdrop-filter:blur(2px)}
  .overlay.show{display:flex}
  .day-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:15px 17px;width:100%;max-width:420px;max-height:80vh;overflow:auto}
  .day-x{background:var(--panel2);border:1px solid var(--line);color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;line-height:1;flex:none}
  .day-tot{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 4px;font-size:12.5px;color:var(--muted)}
  .day-tot b{color:var(--text);font-weight:700}
  /* insights: shoe leaderboard */
  .shoebar{display:grid;grid-template-columns:1fr;gap:7px}
  .shoe{display:flex;align-items:center;gap:10px;font-size:13px}
  .shoe .nm{width:120px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .shoe .track{flex:1;background:var(--panel2);border-radius:6px;height:16px;overflow:hidden;min-width:60px}
  .shoe .fill{display:block;height:100%;min-width:3px;background:linear-gradient(90deg,#1d6e60,var(--accent));border-radius:6px}
  .shoe .km{width:74px;flex:none;text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12.5px}
  .legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .checks label{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text)}
  .checks input{accent-color:var(--accent)}
  .row-detail{background:var(--panel2)!important}
  .row-detail td{white-space:normal;padding:14px 16px}
  .kvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px 18px}
  .kvgrid div{font-size:13px}
  .kvgrid b{color:var(--muted);font-weight:600;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .rawbox{font-family:ui-monospace,Menlo,Consolas,monospace;background:#0c1116;border:1px solid var(--line);padding:9px 12px;border-radius:8px;margin-top:10px;font-size:12.5px;color:#bcd}
  .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:14px}
  .pager button{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer}
  .pager button:disabled{opacity:.4;cursor:default}
  .hidden{display:none!important}
  .loading{text-align:center;padding:80px 0;color:var(--muted)}
  .matrix td.num{cursor:default}
  .matrix tr:hover td{background:var(--panel2)}
  .note-sm{font-size:12px;color:var(--muted);margin-top:4px}
  /* calendar heatmap */
  .cal-wrap{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .cal-inner{display:inline-block;min-width:max-content}
  .cal-months{display:flex;gap:2px;margin:0 0 4px 0;height:13px}
  .cal-months span{width:13px;flex:none;font-size:10px;color:var(--muted);white-space:nowrap;overflow:visible}
  .cal{display:flex;gap:2px}
  .cal-col{display:flex;flex-direction:column;gap:2px}
  .cal-cell{width:13px;height:13px;border-radius:3px;background:var(--panel2);flex:none}
  .cal-cell[data-d]{cursor:pointer}
  .cal-cell[data-d]:hover{outline:2px solid var(--text);outline-offset:-1px}
  .cal-cell.sel{outline:2px solid var(--accent);outline-offset:-1px}
  .cal-legend{display:flex;align-items:center;gap:6px 14px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .cal-legend .chip{width:11px;height:11px;border-radius:3px}
  .cal-detail{margin-top:12px}
  .cal-detail .e{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--line);font-size:13px;flex-wrap:wrap}
  .note-tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700;color:#0c1116;flex:none}
  .cal-detail .e .meta{color:var(--muted)}
  .factnum{font-size:24px;font-weight:800}
  .factsub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .wd-bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:6px}
  .wd-bars .wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end;height:100%}
  .wd-bars .wd .b{width:60%;background:linear-gradient(var(--accent),#1d6e60);border-radius:4px 4px 0 0;min-height:2px}
  .wd-bars .wd .l{font-size:11px;color:var(--muted)}
  /* global filter bar (dashboard / insights / records) */
  .fbar{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .fbar .fld{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .fbar select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:13px}
  .fbar .fclear{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  /* quick year picker: a wrapping row of tappable year pills (replaces a dropdown) */
  .yearpicks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .ypick{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;-webkit-tap-highlight-color:transparent}
  .ypick:hover{color:var(--text);border-color:var(--accent)}
  .ypick.sel{background:var(--accent);color:#04201a;border-color:var(--accent)}
  .fbar .fclear:hover{border-color:var(--accent);color:var(--text)}
  /* records: personal-best cards */
  .recgrid{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .rec{display:flex;flex-direction:column}
  .rec .v{font-size:22px;font-weight:800;letter-spacing:.3px}
  .rec .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
  .rec .sub{font-size:12px;color:var(--text);margin-top:4px}
  .rec .d{font-size:11.5px;color:var(--muted);margin-top:6px}
  /* records: achievement badges */
  .badges{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .badge{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;padding:16px 12px}
  .badge .bic{font-size:30px;line-height:1}
  .badge .bn{font-weight:700;font-size:13.5px}
  .badge .bd{font-size:11.5px;color:var(--muted);line-height:1.35}
  .badge.locked{opacity:.45;filter:grayscale(1)}
  .badge.earned{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  /* records: milestones timeline */
  .tl{position:relative;padding-left:26px}
  .tl::before{content:"";position:absolute;left:9px;top:5px;bottom:5px;width:2px;background:var(--line)}
  .tl .ev{position:relative;padding:0 0 15px}
  .tl .ev:last-child{padding-bottom:0}
  .tl .ev::before{content:"";position:absolute;left:-21px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--panel)}
  .tl .ev .dt{font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.3px}
  .tl .ev .tx{font-size:14px;margin-top:1px}
  .tl .ev .ic{margin-right:6px}
  /* year in review */
  .wrap-hero{text-align:center;padding:24px 18px}
  .wrap-hero .yr{font-size:42px;font-weight:800;letter-spacing:1px;line-height:1}
  .wrap-hero .sub{color:var(--muted);margin-top:6px;font-size:13.5px}
  .delta{font-size:11.5px;font-weight:700}
  .delta.up{color:var(--accent)}
  .delta.down{color:#e0556e}
  /* cumulative chart legend */
  .cumlegend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted)}
  .cumlegend span{display:inline-flex;align-items:center;gap:5px}
  .cumlegend i{width:14px;height:3px;border-radius:2px;display:inline-block}
  @media(max-width:640px){
    th{position:static}
    .top-inner{padding:10px 12px}
    main{padding:9px 11px 56px}
    h2.section{font-size:16px;margin:2px 0 8px}
    h3{font-size:13px;margin-bottom:8px}
    .grid{gap:9px}
    .card{padding:11px 12px;border-radius:11px}
    /* Stat tiles: keep all 4–5 on ONE row instead of wrapping to "one and a
       bit". Force a single row of equal columns and shrink the numbers/padding
       so even long values (135,560) fit a narrow phone. */
    .stat-row{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);gap:7px}
    .stat-row .card{padding:10px 9px}
    .stat .num{font-size:16px;letter-spacing:.2px}
    .stat .lbl{font-size:9.5px;margin-top:1px;letter-spacing:.3px}
    /* Sport tiles: 2 per row and tighter. */
    .sportcards{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    .sportcard{gap:4px}
    .sportcard .head{font-size:13.5px;gap:7px}
    .sportcard .kv{font-size:12px}
    /* Denser data tables. */
    table{font-size:12.5px}
    th,td{padding:6px 8px}
    /* Slimmer chart y-axis + value labels so bars keep room on phones. */
    .chartwrap{gap:5px}
    .yaxis{width:24px}
    .yaxis span{font-size:9px}
    .bar .val{font-size:8.5px}
    /* Reports/year pages: trim the stacked header + controls + stat-tile
       margins so the chart and table reach the viewport sooner. */
    .controls{margin-bottom:10px!important;padding:10px 11px}
    .stat-row{margin-bottom:10px!important}
    .cardhead{margin-bottom:9px!important}
    .stat{padding:9px 10px}
  }

  /* ============================================================
     iPhone / touch UX layer (kept last so these rules win)
     ============================================================ */
  *{-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  header.top{padding-top:env(safe-area-inset-top)}
  .tablewrap{-webkit-overflow-scrolling:touch}
  /* Bottom tab bar: hidden on desktop, shown on phones. */
  .bottomnav{display:none}

  @media(max-width:640px){
    /* Move primary navigation to a fixed, thumb-reachable bottom bar. */
    nav.tabs{display:none}
    .bottomnav{
      display:flex;position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:rgba(16,21,28,.97);backdrop-filter:blur(12px);
      border-top:1px solid var(--line);
      padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    }
    .bottomnav button{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      background:none;border:none;color:var(--muted);
      font-size:10px;font-weight:600;line-height:1;padding:6px 2px;
      cursor:pointer;min-height:46px;
    }
    .bottomnav button svg{width:23px;height:23px;stroke:currentColor;fill:none;
      stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
    .bottomnav button.active{color:var(--accent)}
    .bottomnav button:active{opacity:.55}
    /* Keep content clear of the fixed bottom bar. */
    main{padding-bottom:calc(74px + env(safe-area-inset-bottom))}

    /* Bigger, zoom-proof controls — iOS Safari zooms inputs under 16px on focus. */
    select,input[type=text],input[type=number],input[type=date]{font-size:16px;padding:10px 12px}
    .btn{font-size:15px;padding:11px 16px}
    .seg button{padding:9px 9px;font-size:12px}
    .pager button{padding:9px 16px;font-size:14px}
    .checks label{padding:8px 11px;font-size:13.5px}

    /* Touch feedback in place of hover. */
    .sportcard:active{transform:scale(.985);border-color:var(--accent)}
    tbody tr:active{background:var(--panel2)}
    .btn:active{filter:brightness(.92)}

    /* Raw Data: show only the essentials and let a tap reveal the rest.
       Cols: 1 Date 2 Sport 3 Duration 4 Distance 5 Pace 6 HR 7 Source 8 Conf 9 Notes */
    #x-table th:nth-child(n+5):nth-child(-n+8),
    #x-table td:nth-child(n+5):nth-child(-n+8){display:none}
    #x-table td:nth-child(9){max-width:40vw;overflow:hidden;text-overflow:ellipsis}
    #x-count::after{content:" · tap any row for full details";color:var(--muted)}
  }

  /* ============================================================
     QOL: site-wide navigation & polish
     ============================================================ */
  html{scroll-behavior:smooth}
  h2.section{scroll-margin-top:64px}
  .brand{cursor:pointer}
  ::selection{background:rgba(54,194,168,.32)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* Back-to-top: appears after scrolling; clears the mobile bottom bar. */
  #toTop{
    position:fixed;right:16px;bottom:18px;width:42px;height:42px;border-radius:50%;
    z-index:55;background:var(--accent);color:#04201a;border:none;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.45);
    display:flex;align-items:center;justify-content:center;
    opacity:0;visibility:hidden;transform:translateY(8px);
    transition:opacity .18s,transform .18s,visibility .18s;
    -webkit-tap-highlight-color:transparent;
  }
  #toTop.show{opacity:1;visibility:visible;transform:none}
  #toTop:active{filter:brightness(.92)}
  #toTop svg{width:22px;height:22px;stroke:#04201a;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  @media(max-width:640px){ #toTop{bottom:calc(70px + env(safe-area-inset-bottom));width:40px;height:40px} }
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">Mike's Training Log</div>
    <nav class="tabs" id="tabs"></nav>
  </div>
</header>
<main id="app"><div class="loading">Loading training data…</div></main>
<nav class="bottomnav" id="bottomnav"></nav>

<script>
//============================================================ data + config
const SPORTS = {
  run:        {name:"Run",          color:"#4d9fff", metric:"pace",     icon:"🏃"},
  bike:       {name:"Bike",         color:"#36c2a8", metric:"speed",    icon:"🚴"},
  fb:         {name:"Fat bike",     color:"#3fb5c9", metric:"speed",    icon:"🚵"},
  swim:       {name:"Swim",         color:"#7c5cff", metric:"swimpace", icon:"🏊"},
  hockey:     {name:"Hockey",       color:"#ff7a59", metric:"time",     icon:"🏒"},
  karate:     {name:"Karate",       color:"#e0556e", metric:"time",     icon:"🥋"},
  xcski:      {name:"XC Ski",       color:"#56c2e0", metric:"dist",     icon:"🎿"},
  skate:      {name:"Skate",        color:"#5ad0ff", metric:"time",     icon:"⛸️"},
  snowboard:  {name:"Snowboard",    color:"#9aa7ff", metric:"time",     icon:"🏂"},
  snowshoe:   {name:"Snowshoe",     color:"#86b6c9", metric:"dist",     icon:""},
  ski:        {name:"Alpine Ski",   color:"#7fb0d6", metric:"time",     icon:"⛷️"},
  weights:    {name:"Weights",      color:"#c9a14a", metric:"time",     icon:"🏋️"},
  elliptical: {name:"Elliptical",   color:"#b08fd0", metric:"time",     icon:""},
  row:        {name:"Row",          color:"#5fb38f", metric:"dist",     icon:"🚣"},
  yoga:       {name:"Yoga",         color:"#d08fb8", metric:"time",     icon:"🧘"},
  walk:       {name:"Walk",         color:"#8fae6f", metric:"dist",     icon:"🚶"},
  hike:       {name:"Hike",         color:"#9c7b4f", metric:"dist",     icon:"🥾"},
  squash:     {name:"Squash",       color:"#e0a14a", metric:"time",     icon:""},
  golf:       {name:"Golf",         color:"#6fb86f", metric:"time",     icon:"⛳"},
  canoe:      {name:"Canoe/Kayak",  color:"#4ab0b0", metric:"dist",     icon:"🛶"},
  soccer:     {name:"Soccer",       color:"#6fd06f", metric:"time",     icon:"⚽"},
  tennis:     {name:"Tennis",       color:"#d0d04a", metric:"time",     icon:"🎾"},
  physio:     {name:"Physio",       color:"#9aa6b2", metric:"time",     icon:""},
  other:      {name:"Other",        color:"#9aa6b2", metric:"time",     icon:""},
  note:       {name:"Note / rest",  color:"#5e6b78", metric:"none",     icon:""},
};
const sportName = s => (SPORTS[s]||{name:s}).name;
const sportColor = s => (SPORTS[s]||{color:"#888"}).color;
const sportIcon = s => (SPORTS[s]||{}).icon || "";
// one cohesive marker per sport: emoji icon where a clean one fits, else the color chip
function sportMark(s){
  const ic=sportIcon(s);
  return ic ? `<span class="ic">${ic}</span>`
            : `<span class="chip" style="background:${sportColor(s)}"></span>`;
}
function sportTag(s){ return `<span class="sportlabel">${sportMark(s)}${sportName(s)}</span>`; }
// Canonical sport ordering used in every sport list/dropdown/card in the app:
// the core triathlon sports lead as the most relevant, then everything else by
// training volume (total time, then session count). Keeps the page consistent.
const SPORT_PRIORITY = ["run","bike","swim"];
function cmpSport(a,b,totals){
  const pa=SPORT_PRIORITY.indexOf(a), pb=SPORT_PRIORITY.indexOf(b);
  if(pa>=0&&pb>=0) return pa-pb;            // both core → fixed run, bike, swim order
  if(pa>=0) return -1;                       // a core, b not → a leads
  if(pb>=0) return 1;                        // b core, a not → b leads
  return (totals[b].dur-totals[a].dur) || (totals[b].count-totals[a].count); // rest by volume
}
function sportRank(totals){ return Object.keys(totals).sort((a,b)=>cmpSport(a,b,totals)); }
// Sport keys present in `rows` (default: all data), ordered by the rule above.
function sportsByVolume(rows=DATA){
  const v={};
  for(const r of rows){ const t=v[r.s]||(v[r.s]={dur:0,count:0}); t.count++; if(r.t)t.dur+=r.t; }
  return sportRank(v);
}
let _globalSportOrder=null;
function globalSportOrder(){ return _globalSportOrder||(_globalSportOrder=sportsByVolume(DATA)); }
const CONF = {x:"confirmed", d:"deduced", u:"uncertain"};

let DATA = [], META = null;

//============================================================ helpers
const pad = n => String(n).padStart(2,"0");
function fmtDur(sec){
  if(!sec) return "";
  const h=Math.floor(sec/3600), m=Math.floor(sec%3600/60), s=sec%60;
  if(h) return h+":"+pad(m)+":"+pad(s);
  return m+":"+pad(s);
}
function fmtDurShort(sec){
  if(!sec) return "—";
  const h=Math.floor(sec/3600), m=Math.round(sec%3600/60);
  if(h) return h+"h "+(m?m+"m":"");
  return m+"m";
}
function fmtKm(k){ return k==null? "" : (Math.round(k*10)/10)+" km"; }
// Pad to exactly d decimals so units shown together read consistently (13.0, not 13)
function fmtNum(n,d=0){ return n==null?"":n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}); }
// Compact number for tight spots like chart axes: 15000 -> "15k", 1.2e6 -> "1.2M".
function fmtK(n){
  if(n==null) return "";
  const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toFixed(a%1e6?1:0).replace(/\.0$/,"")+"M";
  if(a>=1e3) return (n/1e3).toFixed(a%1e3?1:0).replace(/\.0$/,"")+"k";
  return fmtNum(n);
}
// performance metric label per sport
function perf(r){
  const sp=SPORTS[r.s]||{}, t=r.t, k=r.k;
  if(!t||!k) return "";
  if(sp.metric==="pace"){ const p=(t/60)/k; return fmtPace(p)+" /km"; }
  if(sp.metric==="swimpace"){ const p=t/(k*10); return fmtMMSS(p)+" /100m"; }
  if(sp.metric==="speed"){ return (k/(t/3600)).toFixed(1)+" km/h"; }
  return "";
}
function fmtPace(minPerKm){ const m=Math.floor(minPerKm), s=Math.round((minPerKm-m)*60); return m+":"+pad(s); }
function fmtMMSS(sec){ const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+pad(s); }
const yearOf = r => +r.d.slice(0,4);
const monthOf = r => +r.d.slice(5,7);
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WEEKDAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function weekdayOf(r){ const dt=new Date(r.d+"T00:00:00"); return (dt.getDay()+6)%7; }

// aggregate a list of rows -> metrics
function agg(rows){
  let count=rows.length, dist=0, dur=0, dCount=0, tCount=0;
  for(const r of rows){ if(r.k){dist+=r.k;dCount++;} if(r.t){dur+=r.t;tCount++;} }
  return {count, dist, dur, dCount, tCount};
}

//============================================================ tiny chart (column)
// Rounded "nice" axis ticks (0 → ≥max) so the y-axis reads in clean steps.
function niceTicks(max, target=4, integer=false){
  if(max<=0) return [0,1];
  const rawStep = max/target;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep/mag;
  let step = (norm<=1?1:norm<=2?2:norm<=2.5?2.5:norm<=5?5:10)*mag;
  if(integer) step = Math.max(1, Math.ceil(step));   // whole-number steps for count data
  const ticks=[];
  for(let v=0; v<=max+step*1e-6; v+=step) ticks.push(Math.round(v*1e6)/1e6);
  if(ticks[ticks.length-1] < max) ticks.push(Math.round((ticks[ticks.length-1]+step)*1e6)/1e6);
  return ticks;
}
function columnChart(data, opts={}){
  // data: [{label, value, color?, sub?}]
  const rawMax = Math.max(1, ...data.map(d=>d.value));
  const fmt = opts.fmt || (v=>fmtNum(v));
  // Inline labels above bars stay compact (the axis already names the unit) so
  // they don't collide; the hover tooltip still shows the full formatted value.
  const valFmt = opts.valFmt || fmt;
  // rounded axis ticks drive the y-axis labels, the gridlines, and bar heights
  const allInt = data.every(d=>Number.isInteger(d.value));
  const ticks = niceTicks(rawMax, 4, allInt);
  const axisMax = ticks[ticks.length-1];
  const n = data.length;
  // value labels above each bar — only when bars are few enough to stay legible
  const showVals = opts.values!==false && n <= (opts.maxValues || (window.innerWidth<560 ? 7 : 18));
  const bars = data.map(d=>{
    const h = (d.value/axisMax*100).toFixed(1);
    const col = d.color||"";
    const style = col? `background:linear-gradient(${col},${col}99)`:"";
    const val = showVals && d.value>0 ? `<span class="val">${valFmt(d.value)}</span>` : "";
    return `<div class="bar" style="height:${h}%;${style}" data-v="${d.value}">
      ${val}<span class="tip">${d.label}: ${fmt(d.value)}${d.sub?" · "+d.sub:""}</span></div>`;
  }).join("");
  // horizontal gridlines + matching y-axis tick labels (compact, e.g. "15k km")
  const axisFmt = opts.axisFmt || (v=>fmtK(v));
  const grid = ticks.map(t=>`<div class="gline${t===0?' base':''}" style="bottom:${(t/axisMax*100).toFixed(2)}%"></div>`).join("");
  const yax = ticks.map(t=>`<span style="bottom:${(t/axisMax*100).toFixed(2)}%">${axisFmt(t)}</span>`).join("");
  // evenly-spaced, thinned x-axis labels so they stay readable with many bars
  const maxLabels = opts.maxLabels || (window.innerWidth<560 ? 7 : 14);
  const step = Math.max(1, Math.ceil(n/maxLabels));
  const lastShown = Math.floor((n-1)/step)*step;     // index of final step tick
  const showLast = (n-1) - lastShown >= step*0.6;     // only add the last label if it won't crowd
  let labs = "";
  data.forEach((d,i)=>{
    const isTick = (i%step===0) || (i===n-1 && showLast);
    if(!isTick) return;
    const left=((i+0.5)/n*100).toFixed(2);
    const text=opts.shortLabel?opts.shortLabel(d.label):d.label;
    labs+=`<span style="left:${left}%">${text}</span>`;
  });
  return `<div class="chartwrap"><div class="yunit">${opts.unit||"sessions"}</div>
    <div class="yaxis">${yax}</div>
    <div class="plot">
      <div class="chart">${grid}${bars}</div>
      <div class="xlab">${labs}</div>
    </div>
  </div>`;
}

// Compact SVG line chart for trends where the variation matters more than the
// absolute level (e.g. a cumulative running total), so the y-axis fits the data range
// instead of starting at zero. points: [{label, value}].
function lineChart(points, opts={}){
  if(points.length<2) return `<div class="muted">Not enough data.</div>`;
  const fmt=opts.fmt||(v=>fmtNum(v,1));          // full value — tooltips
  const axisFmt=opts.axisFmt||(v=>fmtK(v));      // compact, round axis labels
  const W=620,H=190,padL=40,padR=12,padT=12,padB=24;
  const vals=points.map(p=>p.value);
  // Baseline at zero (cumulative/positive series); clean round ticks up from there.
  const lo=Math.min(0,...vals);
  const ticks=niceTicks(Math.max(...vals)-lo,3).map(t=>t+lo);
  const hi=Math.max(ticks[ticks.length-1],...vals);
  const X=i=>padL+(i/(points.length-1))*(W-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  const base=(H-padB).toFixed(1);
  const linePath=points.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(p.value).toFixed(1)}`).join(" ");
  const areaPath=`M${X(0).toFixed(1)} ${base} `+points.map((p,i)=>`L${X(i).toFixed(1)} ${Y(p.value).toFixed(1)}`).join(" ")+` L${X(points.length-1).toFixed(1)} ${base} Z`;
  const grid=ticks.map(v=>`<line x1="${padL}" x2="${W-padR}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" class="lc-grid"/>`).join("");
  const yax=ticks.map(v=>`<text x="${padL-6}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" class="lc-ax">${axisFmt(v)}</text>`).join("");
  const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.value).toFixed(1)}" r="2.6" class="lc-dot"/>`).join("");
  // wide transparent columns make every point easy to hover or tap
  const colW=(W-padL-padR)/(points.length-1);
  const hits=points.map((p,i)=>`<rect class="lc-hit" x="${(X(i)-colW/2).toFixed(1)}" y="${padT}" width="${colW.toFixed(1)}" height="${(H-padT-padB).toFixed(1)}" data-cx="${X(i).toFixed(1)}" data-cy="${Y(p.value).toFixed(1)}" data-label="${escapeHTML(String(p.label))}" data-value="${escapeHTML(fmt(p.value))}"/>`).join("");
  const focus=`<line class="lc-focus" x1="0" x2="0" y1="${padT}" y2="${base}"/><circle class="lc-fdot" r="4"/>`;
  const n=points.length, maxL=opts.maxLabels||(window.innerWidth<560?6:12), stp=Math.max(1,Math.ceil(n/maxL));
  let xl=""; points.forEach((p,i)=>{ if(i%stp && i!==n-1) return; const lab=opts.shortLabel?opts.shortLabel(p.label):p.label;
    xl+=`<text x="${X(i).toFixed(1)}" y="${H-7}" text-anchor="middle" class="lc-ax">${lab}</text>`; });
  return `<div class="yunit" style="position:static;margin-bottom:2px">${opts.unit||""}</div>
    <div class="lc-wrap">
      <svg class="linechart" viewBox="0 0 ${W} ${H}" role="img">${grid}<path d="${areaPath}" class="lc-area"/><path d="${linePath}" class="lc-line"/>${dots}${focus}${yax}${xl}${hits}</svg>
      <div class="lc-tip" hidden></div>
    </div>`;
}

//============================================================ tabs / routing
const TABS = [
  ["dash","Dashboard"], ["insights","Insights"], ["records","Records"],
  ["wrapped","Year in Review"], ["reports","Reports"], ["browse","Raw Data"],
  ["about","About"],
];
// The custom report builder used to be its own tab; it now lives inside Reports.
// Keep old #builder deep links working by routing them to Reports.
const aliasTab = t => t==="builder" ? "reports" : t;
let current="dash";
function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(([id,name])=>
    `<button data-tab="${id}" class="${id===current?'active':''}">${name}</button>`).join("");
  document.querySelectorAll("#tabs button").forEach(b=>
    b.onclick=()=>go(b.dataset.tab));
}
const tabOf = h => aliasTab((h||"").replace("#","").split("?")[0] || "dash");  // hash may carry ?filters
// navigate to a tab, syncing the URL hash (deep-linkable, survives refresh)
function go(tab){
  tab=aliasTab(tab);
  if(!TABS.some(t=>t[0]===tab)) tab="dash";
  current=tab;
  if(tabOf(location.hash)!==tab) location.hash=tab;  // fires hashchange (skipped: tab===current)
  renderTabs(); route(); window.scrollTo(0,0);
}
window.addEventListener("hashchange",()=>{
  const tab=tabOf(location.hash);
  if(tab===current) return;          // same tab (or a query change we made ourselves) — ignore
  if(TABS.some(t=>t[0]===tab)){ current=tab; renderTabs(); route(); window.scrollTo(0,0); }
});
// tap a chart bar to pin its tooltip (hover doesn't exist on touch)
document.addEventListener("click",e=>{
  const bar=e.target.closest(".chart .bar");
  if(!bar) return;
  const on=bar.classList.contains("show");
  document.querySelectorAll(".bar.show").forEach(x=>x.classList.remove("show"));
  if(!on) bar.classList.add("show");
});
function route(){
  const app=document.getElementById("app");
  if(current==="dash") renderDash(app);
  else if(current==="insights") renderInsights(app);
  else if(current==="records") renderRecords(app);
  else if(current==="wrapped") renderWrapped(app);
  else if(current==="reports") renderReports(app);
  else if(current==="browse") renderBrowse(app);
  else renderAbout(app);
}

//============================================================ DASHBOARD
function renderDash(app){
  const base = filtered(DATA);
  const real = base.filter(r=>r.s!=="note");
  const a = agg(real);
  const years = [...new Set(base.map(yearOf))].sort();
  const sportTotals = {};
  for(const r of real){ const t=sportTotals[r.s]||(sportTotals[r.s]={count:0,dist:0,dur:0});
    t.count++; if(r.k)t.dist+=r.k; if(r.t)t.dur+=r.t; }
  // dashboard "By sport" cards: order by total sessions, most first
  const ranked = Object.entries(sportTotals).sort((x,y)=>y[1].count-x[1].count);

  // per-year aggregates (reused for the metric toggle)
  const byYearAgg = years.map(y=>({y, a:agg(real.filter(r=>yearOf(r)===y))}));
  const DM = {
    count:{lbl:"Sessions", val:o=>o.a.count,            fmt:v=>fmtNum(v),         axisFmt:v=>fmtK(v)},
    dist: {lbl:"Distance", val:o=>Math.round(o.a.dist), fmt:v=>fmtNum(v)+" km",   axisFmt:v=>fmtK(v)+" km"},
    dur:  {lbl:"Hours",    val:o=>Math.round(o.a.dur/3600), fmt:v=>fmtNum(v)+" h", axisFmt:v=>fmtK(v)+" h"},
  };
  function dashChart(metric){
    const m=DM[metric];
    const data=byYearAgg.map(o=>({label:String(o.y), value:m.val(o)}));
    return columnChart(data,{shortLabel:l=>"'"+l.slice(2), fmt:m.fmt, axisFmt:m.axisFmt, unit:{count:"sessions",dist:"km",dur:"hours"}[metric]});
  }

  app.innerHTML = `
   <h2 class="section">Lifetime Overview</h2>
   ${filterBar()}
   <div class="grid stat-row" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:18px">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">Workouts</div></div>
     <div class="card stat"><div class="num">${fmtNum(a.dist)}</div><div class="lbl">Total km</div></div>
     <div class="card stat"><div class="num">${Math.round(a.dur/3600).toLocaleString()}</div><div class="lbl">Total hours</div></div>
     <div class="card stat"><div class="num">${years.length}</div><div class="lbl">Years active</div></div>
   </div>

   <div class="card" style="margin-bottom:18px">
     <div class="cardhead" style="flex-wrap:nowrap;gap:8px">
       <div class="seg" id="dash-seg" style="margin-left:0">
         <button data-m="count" class="on">Sessions</button>
         <button data-m="dist">Distance</button>
         <button data-m="dur">Hours</button>
       </div>
       <div class="seg" id="dash-view">
         <button data-v="chart" class="on">Chart</button>
         <button data-v="table">Table</button>
       </div></div>
     <div id="dash-chart">${dashChart("count")}</div>
     <div class="note-sm" id="dash-tip">Tip: tap a bar to read its value · click a sport below to drill in.</div>
   </div>

   <div class="card" style="margin-bottom:18px">
     <h3>Cumulative distance — year vs year</h3>
     ${cumulativeChart(real)}
     <div class="note-sm">Each line is one year's running distance total as the year progresses — see if you're ahead of your usual pace.</div>
   </div>

   <h3>By sport</h3>`;
  // The "Per year" card flips between the chart and a table of the same data.
  let dashMetric="count", dashViewMode="chart";
  function dashTable(){
    const head=`<thead><tr><th>Year</th><th class="num">Sessions</th><th class="num">Distance</th><th class="num">Hours</th></tr></thead>`;
    const body=byYearAgg.slice().reverse().map(o=>`<tr>
       <td>${o.y}</td>
       <td class="num">${fmtNum(o.a.count)}</td>
       <td class="num">${o.a.dist?fmtNum(Math.round(o.a.dist))+" km":"—"}</td>
       <td class="num">${o.a.dur?fmtNum(Math.round(o.a.dur/3600))+" h":"—"}</td></tr>`).join("");
    const tot=`<tr><td><b>Total</b></td>

  }
  function paintDash(){

    const seg=document.getElementById("dash-seg"); if(seg) seg.style.display = dashViewMode==="table" ? "none" : "";
    const tip=document.getElementById("dash-tip"); if(tip) tip.style.display = dashViewMode==="table" ? "none" : "";
  }

  app.insertAdjacentHTML("beforeend",`

       <div class="card sportcard" data-sport="${s}">

         ${t.dur?`<div class="kv"><span>Time</span><b>${Math.round(t.dur/3600).toLocaleString()} h</b></div>`:""}
       </div>`).join("")}
   </div>`);
  app.querySelectorAll(".sportcard").forEach(c=>c.onclick=()=>{

    const sel=document.getElementById("rep-type");

  const years=[...new Set(DATA.map(yearOf))].sort((a,b)=>b-a);

  app.innerHTML=`
   <h2 class="section">Reports</h2>

     <label class="fld" style="max-width:240px">Report
       <select id="rep-type">
         <option value="year">Year summary</option>
         <option value="compare">Year comparison</option>
         <option value="sport">Sport summary</option>
         <option value="matrix">Year × Sport matrix</option>
         <option value="bests">Personal bests</option>
         <option value="consistency">Consistency &amp; streaks</option>
         <option value="milestones">Distance milestones</option>
         <option value="custom">Custom report…</option>
       </select></label>
     <label class="fld" id="wrap-year" style="max-width:160px">Year
       <select id="rep-year">${years.map(y=>`<option>${y}</option>`).join("")}</select></label>
     <label class="fld hidden" id="wrap-year2" style="max-width:160px">vs Year
       <select id="rep-year2">${years.map((y,i)=>`<option ${i===1?"selected":""}>${y}</option>`).join("")}</select></label>
     <label class="fld hidden" id="wrap-sport" style="max-width:200px">Sport
       <select id="rep-sport">${sports.map(s=>`<option value="${s}">${sportName(s)}</option>`).join("")}</select></label>
     <label class="fld hidden" id="wrap-metric" style="max-width:180px">Metric
       <select id="rep-metric">
         <option value="count">Sessions</option>
         <option value="dist">Distance (km)</option>
         <option value="dur">Time (hours)</option>
       </select></label>
   </div>
   <div id="rep-out"></div>`;
  const type=document.getElementById("rep-type");
  const wYear=document.getElementById("wrap-year"), wYear2=document.getElementById("wrap-year2"),
        wSport=document.getElementById("wrap-sport"), wMetric=document.getElementById("wrap-metric");
  function syncControls(){
    // The custom builder brings its own filter controls, so hide the preset ones.
    const t=type.value;
    wYear.classList.toggle("hidden", t!=="year" && t!=="compare");
    wYear2.classList.toggle("hidden", t!=="compare");
    wSport.classList.toggle("hidden", t!=="sport");
    wMetric.classList.toggle("hidden", t!=="matrix");
  }
  type.onchange=()=>{ syncControls(); draw(); };
  document.getElementById("rep-year").onchange=draw;
  document.getElementById("rep-year2").onchange=draw;
  document.getElementById("rep-sport").onchange=draw;
  document.getElementById("rep-metric").onchange=draw;
  const yearSel=document.getElementById("rep-year");
  function setYear(y){ yearSel.value=y; draw(); }
  function draw(){
    const out=document.getElementById("rep-out");
    if(type.value==="custom"){ renderBuilderInto(out); return; }
    if(type.value==="year"){
      const y=+yearSel.value;
      out.innerHTML=reportYear(y);
      const av=[...new Set(DATA.map(yearOf))].sort((a,b)=>a-b), i=av.indexOf(y);
      const prev=document.getElementById("ry-prev"), next=document.getElementById("ry-next");
      if(prev) prev.onclick=()=>{ if(i>0) setYear(av[i-1]); };
      if(next) next.onclick=()=>{ if(i>=0&&i<av.length-1) setYear(av[i+1]); };
    }
    else if(type.value==="compare") out.innerHTML=reportCompare(+yearSel.value, +document.getElementById("rep-year2").value);
    else if(type.value==="consistency") out.innerHTML=reportConsistency();
    else if(type.value==="milestones") out.innerHTML=reportMilestones();

    else if(type.value==="matrix") out.innerHTML=reportMatrix(document.getElementById("rep-metric").value);

}

function yearNavHeader(y){
  const av=[...new Set(DATA.map(yearOf))].sort((a,b)=>a-b);

  const canPrev=i>0, canNext=i>=0&&i<av.length-1;
  return `<div class="cardhead" style="justify-content:space-between;margin-bottom:14px">
    <button class="btn ghost" id="ry-prev" ${canPrev?"":"disabled"}>‹ ${canPrev?av[i-1]:""}</button>
    <h2 class="section" style="margin:0">${y}</h2>
    <button class="btn ghost" id="ry-next" ${canNext?"":"disabled"}>${canNext?av[i+1]:""} ›</button>
  </div>`;
}
function reportYear(y){
  const rows=DATA.filter(r=>yearOf(r)===y && r.s!=="note");
  if(!rows.length) return yearNavHeader(y)+`<div class="card">No data recorded for ${y}.</div>`;
  const a=agg(rows);
  const sportTotals={};
  for(const r of rows){ const t=sportTotals[r.s]||(sportTotals[r.s]={count:0,dist:0,dur:0});
    t.count++; if(r.k)t.dist+=r.k; if(r.t)t.dur+=r.t; }
  const ranked=sportRank(sportTotals).map(s=>[s,sportTotals[s]]);
  // monthly stacked-ish (count) chart
  const byMonth=MONTHS.map((m,i)=>({label:m,value:rows.filter(r=>monthOf(r)===i+1).length}));
  return yearNavHeader(y)+`
   <div class="grid stat-row" style="margin-bottom:16px">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">Workouts in ${y}</div></div>
     <div class="card stat"><div class="num">${fmtNum(a.dist)}</div><div class="lbl">km</div></div>
     <div class="card stat"><div class="num">${Math.round(a.dur/3600)}</div><div class="lbl">hours</div></div>
     <div class="card stat"><div class="num">${ranked.length}</div><div class="lbl">sports</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>${y} by month</h3>${columnChart(byMonth)}</div>
   <div class="card"><h3>${y} by sport</h3>
     <div class="tablewrap"><table><thead><tr><th>Sport</th><th class="num">Sessions</th><th class="num">Distance</th><th class="num">Time</th></tr></thead>
     <tbody>${ranked.map(([s,t])=>`<tr>
        <td>${sportTag(s)}</td>
        <td class="num">${fmtNum(t.count)}</td>
        <td class="num">${t.dist?fmtNum(t.dist)+" km":"—"}</td>
        <td class="num">${t.dur?fmtDurShort(t.dur):"—"}</td></tr>`).join("")}</tbody></table></div></div>`;
}

function reportSport(s){
  const rows=DATA.filter(r=>r.s===s);
  if(!rows.length) return `<div class="card">No data.</div>`;
  const years=[...new Set(rows.map(yearOf))].sort();
  const a=agg(rows);
  const byYear=years.map(y=>({label:String(y),value:rows.filter(r=>yearOf(r)===y).length}));
  const perYearRows=years.map(y=>{const rr=rows.filter(r=>yearOf(r)===y);const ya=agg(rr);
    return {y,...ya};}).reverse();
  const recs=bestsFor(s);
  return `
   <div class="grid stat-row" style="margin-bottom:16px">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">${sportName(s)} sessions</div></div>
     ${a.dist>5?`<div class="card stat"><div class="num">${fmtNum(a.dist)}</div><div class="lbl">total km</div></div>`:""}
     <div class="card stat"><div class="num">${Math.round(a.dur/3600)}</div><div class="lbl">total hours</div></div>
     <div class="card stat"><div class="num">${years[0]}–${years[years.length-1]}</div><div class="lbl">span</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>${sportName(s)} sessions per year</h3>
     ${columnChart(byYear,{shortLabel:l=>"'"+l.slice(2)})}</div>

     <tbody>${perYearRows.map(r=>`<tr><td>${r.y}</td><td class="num">${fmtNum(r.count)}</td>
        <td class="num">${r.dist?fmtNum(r.dist)+" km":"—"}</td><td class="num">${r.dur?fmtDurShort(r.dur):"—"}</td></tr>`).join("")}</tbody></table></div></div>`;

function reportMatrix(metric){
  const years=[...new Set(DATA.map(yearOf))].sort();
  const sports=globalSportOrder().filter(s=>s!=="note"&&SPORTS[s]);
  const val=(rows)=>{ const a=agg(rows); return metric==="count"?a.count:metric==="dist"?Math.round(a.dist):Math.round(a.dur/3600); };
  const cell=(y,s)=>val(DATA.filter(r=>yearOf(r)===y&&r.s===s));
  const head=`<th>Year</th>`+sports.map(s=>`<th class="num">${sportTag(s)}</th>`).join("")+`<th class="num">Total</th>`;
  const body=years.slice().reverse().map(y=>{
    let tot=0; const cells=sports.map(s=>{const v=cell(y,s);tot+=v;return `<td class="num">${v||""}</td>`;}).join("");
    return `<tr><td><b>${y}</b></td>${cells}<td class="num"><b>${tot||""}</b></td></tr>`;
  }).join("");
  const unit=metric==="count"?"sessions":metric==="dist"?"km":"hours";
  return `<div class="card"><h3>Year × Sport — ${unit}</h3>
    <div class="note-sm" style="margin-bottom:8px">Rows are years (newest first), columns are sports. Each cell is the ${unit} for that year &amp; sport — blank means none. The <b>Total</b> column sums the row across all sports.</div>
    <div class="tablewrap"><table class="matrix"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
}

function bestsFor(s){
  const rows=DATA.filter(r=>r.s===s);
  const sp=SPORTS[s]||{};
  let html=[];
  const withDist=rows.filter(r=>r.k); const withDur=rows.filter(r=>r.t);
  if(withDist.length){ const m=withDist.reduce((a,b)=>b.k>a.k?b:a);
    html.push(kv("Longest distance",`${fmtNum(m.k,1)} km`,m.d)); }
  if(withDur.length){ const m=withDur.reduce((a,b)=>b.t>a.t?b:a);
    html.push(kv("Longest duration",fmtDur(m.t),m.d)); }
  if(sp.metric==="pace"){ const c=rows.filter(r=>r.t&&r.k&&r.k>=3);
    if(c.length){ const m=c.reduce((a,b)=> (b.t/b.k)<(a.t/a.k)?b:a); html.push(kv("Fastest pace (≥3 km)",fmtPace((m.t/60)/m.k)+" /km",m.d)); } }
  if(sp.metric==="speed"){ const c=rows.filter(r=>r.t&&r.k&&r.k>=10);
    if(c.length){ const m=c.reduce((a,b)=>(b.k/b.t)>(a.k/a.t)?b:a); html.push(kv("Fastest avg speed (≥10 km)",(m.k/(m.t/3600)).toFixed(1)+" km/h",m.d)); } }
  // best year
  const years=[...new Set(rows.map(yearOf))];
  if(years.length){ const by=years.map(y=>[y,rows.filter(r=>yearOf(r)===y).length]).reduce((a,b)=>b[1]>a[1]?b:a);
    html.push(kv("Most sessions in a year",`${by[1]}`,String(by[0]))); }
  return html.join("");
  function kv(label,val,date){ return `<div><b>${label}</b>${val} <span class="muted">(${date})</span></div>`; }
}

function reportBests(){
  const sports=["run","bike","swim","xcski","hockey"].filter(s=>DATA.some(r=>r.s===s));
  return `<div class="note-sm" style="margin:0 0 12px">Your single best efforts in each sport, with the date each was set in parentheses. Pace and speed records require a minimum distance so short, fast bursts don't dominate.</div>`+sports.map(s=>{const h=bestsFor(s); return h?`<div class="card" style="margin-bottom:14px">
    <h3>${sportTag(s)}</h3>
    <div class="kvgrid">${h}</div></div>`:"";}).join("");
}

// ── Year comparison: two years side by side, with deltas ──
function reportCompare(yA, yB){
  if(!yA || !yB || yA===yB) return `<div class="card">Pick two different years to compare.</div>`;
  const rowsA=DATA.filter(r=>yearOf(r)===yA && r.s!=="note");
  const rowsB=DATA.filter(r=>yearOf(r)===yB && r.s!=="note");
  if(!rowsA.length && !rowsB.length) return `<div class="card">No data for either year.</div>`;
  const A=agg(rowsA), B=agg(rowsB);
  // a coloured delta chip: green when yA beats yB, red when behind
  const dl=(a,b,fmt,suf)=>{ const d=a-b; if(!d) return `<span style="color:var(--muted);font-size:12px;font-weight:600;margin-left:6px">±0</span>`;
    const c=d>0?"#5ad08f":"#e07a8a", s=d>0?"+":"";
    return `<span style="color:${c};font-size:12px;font-weight:600;margin-left:6px">${s}${fmt(d)}${suf||""}</span>`; };
  const tile=(label,a,b,fmt,suf)=>`<div class="card stat">
     <div class="num">${fmt(a)}${suf||""}</div>
     <div class="lbl">${label} · ${yA}${dl(a,b,fmt,suf)}</div>
     <div class="note-sm" style="margin-top:4px">${yB}: ${fmt(b)}${suf||""}</div></div>`;
  const sports=globalSportOrder().filter(s=>SPORTS[s] && (rowsA.some(r=>r.s===s)||rowsB.some(r=>r.s===s)));
  const cnt=(rows,s)=>rows.filter(r=>r.s===s).length;
  const body=sports.map(s=>{ const ca=cnt(rowsA,s), cb=cnt(rowsB,s), d=ca-cb;
    const dcell = d>0?`<span style="color:#5ad08f">+${d}</span>`:d<0?`<span style="color:#e07a8a">${d}</span>`:"—";
    return `<tr><td>${sportTag(s)}</td><td class="num">${ca||"—"}</td><td class="num">${cb||"—"}</td><td class="num">${dcell}</td></tr>`;
  }).join("");
  const num=v=>fmtNum(v);
  return `<div class="cardhead" style="margin-bottom:14px"><h2 class="section" style="margin:0">${yA} vs ${yB}</h2></div>
   <div class="note-sm" style="margin:0 0 12px">Side-by-side totals for the two selected years. The big number is ${yA}; the coloured chip is the change vs ${yB} (green = ${yA} higher), and the small line shows the ${yB} value.</div>
   <div class="grid stat-row" style="margin-bottom:16px">
     ${tile("Workouts",A.count,B.count,num,"")}
     ${tile("Distance",Math.round(A.dist),Math.round(B.dist),num," km")}
     ${tile("Hours",Math.round(A.dur/3600),Math.round(B.dur/3600),num,"")}
   </div>
   <div class="card"><h3>By sport — sessions</h3>
     <div class="tablewrap"><table><thead><tr><th>Sport</th><th class="num">${yA}</th><th class="num">${yB}</th><th class="num">Δ</th></tr></thead>
     <tbody>${body}</tbody></table></div></div>`;
}

// ── Consistency & streaks: active days, streaks, layoffs, rest reasons ──
function reportConsistency(){
  const real=DATA.filter(r=>r.s!=="note");
  if(!real.length) return `<div class="card">No data.</div>`;
  const dnum=ds=>Math.floor(Date.parse(ds+"T00:00:00Z")/864e5);
  const activeDays=[...new Set(real.map(r=>r.d))].sort();
  let longest=0,cur=0,prev=null,lEnd=null;
  for(const ds of activeDays){ const n=dnum(ds); cur=(prev!==null&&n===prev+1)?cur+1:1; if(cur>longest){longest=cur;lEnd=ds;} prev=n; }
  let gap=0,gapAt=null; for(let i=1;i<activeDays.length;i++){ const g=dnum(activeDays[i])-dnum(activeDays[i-1]); if(g>gap){gap=g;gapAt=activeDays[i-1];} }
  const spanDays=activeDays.length>1?dnum(activeDays[activeDays.length-1])-dnum(activeDays[0])+1:1;
  const years=[...new Set(real.map(yearOf))].sort();
  const activeByYear=years.map(y=>({label:String(y),value:new Set(real.filter(r=>yearOf(r)===y).map(r=>r.d)).size}));
  const restCnt={injury:0,illness:0,rest:0,recovery:0,travel:0,home:0,other:0};
  for(const r of DATA){ if(r.s!=="note")continue; const c=classifyNote(noteText(r)); if(restCnt[c]!=null)restCnt[c]++; }
  const restRows=[["Injury","injury"],["Illness","illness"],["Rest day","rest"],["Recovery","recovery"],["Travel","travel"],["Home project","home"],["Other","other"]]
    .filter(([,k])=>restCnt[k]).map(([l,k])=>`<tr><td>${l}</td><td class="num">${fmtNum(restCnt[k])}</td></tr>`).join("");
  return `<div class="note-sm" style="margin:0 0 12px">How regularly Mike trained — active days, daily streaks, and the gaps between sessions — plus why no-workout days were logged.</div>
   <div class="grid stat-row" style="margin-bottom:16px">
     <div class="card stat"><div class="num">${fmtNum(activeDays.length)}</div><div class="lbl">active days</div></div>
     <div class="card stat"><div class="num">${longest}</div><div class="lbl">longest streak (days)</div></div>
     <div class="card stat"><div class="num">${gap}</div><div class="lbl">longest layoff (days)</div></div>
     <div class="card stat"><div class="num">${(Math.round(spanDays/365.25*10)/10)}</div><div class="lbl">years tracked</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>Active days per year</h3>
     ${columnChart(activeByYear,{shortLabel:l=>"'"+l.slice(2),unit:"days"})}
     <div class="note-sm">Distinct calendar days with at least one workout, year by year.</div></div>
   <div class="card" style="margin-bottom:16px"><h3>Streak details</h3>
     <div class="kvgrid">
       <div><b>Longest streak</b>${longest} days${lEnd?`, ending ${lEnd}`:""}</div>
       <div><b>Longest layoff</b>${gap} days${gapAt?`, from ${gapAt}`:""}</div>
       <div><b>Training span</b>${activeDays[0]} → ${activeDays[activeDays.length-1]}</div>
       <div><b>Active rate</b>${fmtNum(activeDays.length/spanDays*100)}% of all days</div>
     </div></div>
   ${restRows?`<div class="card"><h3>Why days had no workout</h3>
     <div class="note-sm" style="margin-bottom:8px">Diary-note days with no session, keyword-matched to a likely reason (medium confidence).</div>
     <div class="tablewrap"><table><thead><tr><th>Reason</th><th class="num">Days</th></tr></thead><tbody>${restRows}</tbody></table></div></div>`:""}`;
}

// ── Distance milestones: lifetime totals, cumulative curve, equivalences ──
function reportMilestones(){
  const real=DATA.filter(r=>r.s!=="note");
  if(!real.length) return `<div class="card">No data.</div>`;
  const years=[...new Set(real.map(yearOf))].sort();
  let cum=0; const cumByYear=years.map(y=>{ cum+=real.filter(r=>yearOf(r)===y).reduce((s,r)=>s+(r.k||0),0); return {label:String(y),value:Math.round(cum)}; });
  const total=cum;
  const bySport={}; for(const r of real){ if(r.k) bySport[r.s]=(bySport[r.s]||0)+r.k; }
  const sportRows=Object.entries(bySport).sort((a,b)=>b[1]-a[1])
    .map(([s,k])=>`<tr><td>${sportTag(s)}</td><td class="num">${fmtNum(Math.round(k))} km</td></tr>`).join("");
  const equator=total/40075, moon=total/384400*100;
  return `<div class="note-sm" style="margin:0 0 12px">Lifetime distance across every sport, how it accumulated over the years, and a few fun real-world equivalences.</div>
   <div class="grid stat-row" style="margin-bottom:16px">
     <div class="card stat"><div class="num">${fmtNum(Math.round(total))}</div><div class="lbl">total km logged</div></div>
     <div class="card stat"><div class="num">${fmtNum(equator,1)}×</div><div class="lbl">around the equator</div></div>
     <div class="card stat"><div class="num">${fmtNum(moon,1)}%</div><div class="lbl">of the way to the Moon</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>Cumulative distance over time</h3>
     ${cumByYear.length>1?lineChart(cumByYear,{unit:"km",fmt:v=>fmtNum(v)+" km",shortLabel:l=>"'"+l.slice(2)}):`<div class="muted">Not enough data.</div>`}
     <div class="note-sm">Running total of every kilometre logged, added up year by year.</div></div>
   ${sportRows?`<div class="card"><h3>Lifetime distance by sport</h3>
     <div class="tablewrap"><table><thead><tr><th>Sport</th><th class="num">Total distance</th></tr></thead><tbody>${sportRows}</tbody></table></div></div>`:""}`;
}

//============================================================ REPORT BUILDER
// Lives inside the Reports tab as the "Custom report…" option. Renders its
// filter/group controls + output into whatever container Reports hands it.
const BUILDER={f:{}};
function renderBuilderInto(target){
  const years=[...new Set(DATA.map(yearOf))].sort((a,b)=>b-a);
