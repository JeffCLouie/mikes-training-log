// ── Drill-in focus ─────────────────────────────────────────────────────────
// Deep-links from records/bests into Raw Data. A "focus" narrows the table to a
// date or date-range and (optionally) highlights the single entry that IS the
// record. Encoded in the URL (f0/f1/fi/fl) so it survives refresh & sharing.
let BROWSE_FOCUS=null;   // {from, to, idx|null, label} or null
let _rowIndex=null;      // row-object -> DATA index, built lazily
function rowId(r){ if(!_rowIndex){ _rowIndex=new Map(); DATA.forEach((row,i)=>_rowIndex.set(row,i)); } return _rowIndex.get(r); }
function addDays(ds,n){ const t=new Date(ds+"T00:00:00Z"); t.setUTCDate(t.getUTCDate()+n); return t.toISOString().slice(0,10); }
function monthRange(ym){ const y=+ym.slice(0,4),m=+ym.slice(5,7); const last=new Date(Date.UTC(y,m,0)).getUTCDate();
  return [ym+"-01", ym+"-"+String(last).padStart(2,"0")]; }
// nav for a single entry (drills to that exact row) / a date range (drills to a period)
const entryNav=(row,label)=>({from:row.d,to:row.d,idx:rowId(row),label});
const rangeNav=(from,to,label)=>({from,to,label});
const entryFocus=entryNav, rangeFocus=rangeNav;   // aliases
// build the data-* attributes that mark any element as a drill-in target
function focusAttrs(from,to,idx,label){
  let a=`data-focus="1" data-from="${from}" role="button" tabindex="0"`;
  if(to&&to!==from) a+=` data-to="${to}"`;
  if(idx!=null) a+=` data-idx="${idx}"`;
  if(label) a+=` data-flabel="${escapeHTML(label)}"`;

}
// navigate to Raw Data focused on a date / range / single entry
function openFocus(from,to,idx,label){
  if(!from) return;

  p.set("f0",from); if(to&&to!==from) p.set("f1",to);
  if(idx!=null&&idx!=="") p.set("fi",String(idx));
  if(label) p.set("fl",label);
  document.getElementById("day-overlay")?.classList.remove("show");   // if opened from a day popup
  current="browse"; renderTabs();
  history.replaceState(null,"","#browse?"+p.toString());   // set URL first so render restores from it
  renderBrowse(document.getElementById("app"));

function restoreFocusFromURL(){

  const from=p.get("f0"), to=p.get("f1")||from;
  const fi=p.has("fi")?+p.get("fi"):null;
  BROWSE_FOCUS={from,to,idx:(fi!=null&&!isNaN(fi))?fi:null,label:p.get("fl")||""};

function focusBanner(){

}
function clearFocus(){

// delegated: any [data-focus] element (record card, best row, day link) drills in
document.addEventListener("click",e=>{

// reflect current filters into the URL so refresh / sharing keeps them
function syncBrowseURL(){

    if(BROWSE_FOCUS.to!==BROWSE_FOCUS.from) p.set("f1",BROWSE_FOCUS.to);
    if(BROWSE_FOCUS.idx!=null) p.set("fi",String(BROWSE_FOCUS.idx));
    if(BROWSE_FOCUS.label) p.set("fl",BROWSE_FOCUS.label); }

function applyBuilderToBrowse(){

function browseFilter(){
  const q=document.getElementById("x-q").value.toLowerCase();
  const sport=document.getElementById("x-sport").value;
  const year=document.getElementById("x-year").value;
  const src=document.getElementById("x-src").value;

  return DATA.filter(r=>{
    if(BROWSE_FOCUS&&(r.d<BROWSE_FOCUS.from||r.d>BROWSE_FOCUS.to)) return false;
    if(sport&&r.s!==sport) return false;
    if(year&&yearOf(r)!==+year) return false;
    if(src&&r.src!==src) return false;
    if(conf&&r.c!==conf) return false;
    if(q&&!(r.r||"").toLowerCase().includes(q)&&!(r.n||"").toLowerCase().includes(q)) return false;
    return true;
  });

const BROWSE_COLS=[
  ["d","Date",0],["s","Sport",0],["t","Duration",1],["k","Distance",1],
  ["perf","Pace / Speed",1],["h","HR",1],["src","Source",0],["c","Conf",0],["r","Notes / raw",0],
];
function drawBrowse(){
  let rows=browseFilter();
  const {sort,dir}=BROWSE;
  rows.sort((a,b)=>{
    let av,bv;
    if(sort==="perf"){av=a.t&&a.k?a.t/a.k:0;bv=b.t&&b.k?b.t/b.k:0;}
    else {av=(a[sort]==null?-Infinity:a[sort]);bv=(b[sort]==null?-Infinity:b[sort]);}
    if(av<bv)return -dir; if(av>bv)return dir; return 0;
  });
  BROWSE.rows=rows;
  // If a specific entry is focused, jump to the page that contains it.
  let focusPos=-1;
  if(BROWSE_FOCUS&&BROWSE_FOCUS.idx!=null){
    const fr=DATA[BROWSE_FOCUS.idx]; focusPos=fr?rows.indexOf(fr):-1;
    if(focusPos>=0) BROWSE.page=Math.floor(focusPos/BROWSE.per);
  }
  const total=rows.length, pages=Math.max(1,Math.ceil(total/BROWSE.per));
  if(BROWSE.page>=pages)BROWSE.page=0;
  const start=BROWSE.page*BROWSE.per;
  const slice=rows.slice(start,start+BROWSE.per);
  document.getElementById("x-count").textContent= total
    ? `Showing ${fmtNum(start+1)}–${fmtNum(start+slice.length)} of ${fmtNum(total)} entries`
    : "No entries match these filters.";
  const th=BROWSE_COLS.map(([k,lbl,num])=>`<th class="sortable ${num?'num':''}" data-k="${k}">${lbl}${BROWSE.sort===k?(BROWSE.dir>0?" ▲":" ▼"):""}</th>`).join("")
    +`<th class="rd-acthead" aria-label="Add context for Mike"></th>`;
  const rul=QAStore.rulings();
  const body=slice.map((r,i)=>rowHTML(r,start+i,rul)).join("");
  const tbl=document.getElementById("x-table");
  tbl.innerHTML=`<thead><tr>${th}</tr></thead><tbody>${body}</tbody>`;
  // One delegated handler covers header sorting + the per-row context button +
  // row expand, so large page sizes (250/500/All) don't bind thousands of listeners.
  tbl.onclick=e=>{
    const h=e.target.closest("th.sortable");
    if(h){
      const k=h.dataset.k;
      if(BROWSE.sort===k)BROWSE.dir*=-1; else {BROWSE.sort=k;BROWSE.dir=(k==="d")?-1:1;}
      drawBrowse(); return;
    }
    const act=e.target.closest(".rd-act");
    if(act){                                   // open the row (if closed) and jump to its ruling box
      const row=act.closest("tr.datarow"); if(!row) return;
      let det=row.nextElementSibling;
      if(!(det&&det.classList.contains("row-detail"))){ toggleDetail(row); det=row.nextElementSibling; }
      const inp=det&&det.querySelector(".qa-ruling");
      if(inp){ inp.focus({preventScroll:true}); inp.scrollIntoView({block:"center",behavior:"smooth"}); }
      return;
    }
    const tr=e.target.closest("tr.datarow");
    if(tr) toggleDetail(tr);
  };
  // Highlight + expand + scroll to the focused entry once it's on this page.
  if(focusPos>=start&&focusPos<start+slice.length){
    const tr=tbl.querySelectorAll("tbody tr.datarow")[focusPos-start];
    if(tr){ tr.classList.add("focusrow");
      if(!(tr.nextElementSibling&&tr.nextElementSibling.classList.contains("row-detail"))) toggleDetail(tr);
      requestAnimationFrame(()=>tr.scrollIntoView({behavior:"smooth",block:"center"}));
    }
  }
  // pager + rows-per-page picker
  const pg=document.getElementById("x-pager");
  pg.innerHTML=`<button ${BROWSE.page===0?"disabled":""} id="pg-prev">‹ Prev</button>
    <span class="muted">Page ${BROWSE.page+1} / ${pages}</span>
    <button ${BROWSE.page>=pages-1?"disabled":""} id="pg-next">Next ›</button>
    <label class="muted" style="margin-left:14px">Rows&nbsp;<select id="pg-per">${PER_CHOICES.map(v=>`<option value="${v}" ${BROWSE.per===v?"selected":""}>${perLabel(v)}</option>`).join("")}</select></label>`;
  const prev=document.getElementById("pg-prev"),next=document.getElementById("pg-next"),per=document.getElementById("pg-per");
  if(prev)prev.onclick=()=>{BROWSE.page--;drawBrowse();window.scrollTo(0,0);};
  if(next)next.onclick=()=>{BROWSE.page++;drawBrowse();window.scrollTo(0,0);};
  if(per)per.onchange=()=>{BROWSE.per=+per.value;BROWSE.page=0;drawBrowse();window.scrollTo(0,0);};
}

// A ruling box lives in each expanded Raw Data row — an alternate route to the

function wireRowRuling(det,tr){

function escapeHTML(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

//============================================================ INSIGHTS
// ── Notes as data ─────────────────────────────────────────────────────────
// Note-only rows (no sport/distance) are Mike's diary jottings. With medium/
// high-confidence keyword matching we pull out the reason a day had no workout —
// injury, illness, a deliberate rest day, therapy/recovery, travel, or a home
// project. Each is its own category (colour). Order = match priority; the first
// regex that hits wins. Anything unmatched is "other" and stays uncoloured.
const NOTE_CATS = [
  ["race",     /\b(triathlon|duathlon|biathlon|tri|relay|race|sprint|marathon|worlds?|championships?|champs|dnf|dns|oac|national capital|nat\.? ?cap|beat beethoven|rockland|shuffle)\b/i],
  ["injury",   /\b(back|knee|foot|feet|ankle|hip|shin|calf|hamstring|hams|groin|crotch|shoulder|heel|achilles|wrist|numb|orthotics?|sore|hurt|injur|sprain|strain|pain|tendon|sciatic|blister)\b/i],
  ["illness",  /\b(sick|flu|ill|fever|cold|chills|nausea|dizzy|tired|exhaust|cough|throat|stomach|migraine|headache|virus)\b/i],
  ["weather",  /\b(snow ?day|snow ?storm|storm|blizzard|flood(?:ed|ing)?|hurricane|ice ?storm|washout)\b/i],
  ["rest",     /\b(rest|day ?off|off day|easy day|lazy)\b/i],
  ["recovery", /\b(massage|physio|chiro|acupunct\w*|recover|stretch|rehab|sauna|foam ?roll|ice ?bath|art)\b/i],
  ["travel",   /\b(mexico|camping|vacation|trip|cottage|florida|cuba|tremblant|stockholm|away|holiday|christmas|xmas|wedding|conference|flight|airport)\b/i],
  ["home",     /\b(roof|porch|firewood|patio|kitchen|deck|fence|garage|paint|yard|lawn|mow|shovel|reno|drywall|basement|shed|gutter|boards|cables|garden|plant|aralia|weed|mulch|wood|floor|tile|shingle|caulk|stain|chores?)\b/i],
];
function noteText(r){ return (r.n||r.r||"").trim(); }
function classifyNote(t){ for(const [c,re] of NOTE_CATS) if(re.test(t)) return c; return "other"; }
// How each note category surfaces on the activity calendar: a distinct colour, a
// label, and a rank (when a day has several notes, the highest-rank one colours
// the square — race/health first).
const NOTE_COL  = { race:"rgba(228,80,200,.90)", injury:"rgba(224,90,108,.80)", illness:"rgba(232,150,60,.80)", weather:"rgba(200,212,224,.80)", rest:"rgba(125,142,170,.82)", recovery:"rgba(80,180,220,.74)", travel:"rgba(150,130,255,.72)", home:"rgba(190,140,85,.76)" };
const NOTE_RANK = { race:7, injury:6, illness:5, weather:4.5, rest:4, recovery:3, travel:2, home:1 };
const NOTE_LABEL= { race:"race / event", injury:"injury", illness:"illness", weather:"weather day", rest:"rest day", recovery:"therapy / recovery", travel:"travel", home:"home project" };

function renderInsights(app){
  const real = filtered(DATA).filter(r=>r.s!=="note");
  const a = agg(real);
  const years = [...new Set(real.map(yearOf))].sort((x,y)=>x-y);
  const dnum = ds => Math.floor(Date.parse(ds+"T00:00:00Z")/864e5);

  // total running distance (for the marathon equivalence)
  let runKm=0; for(const r of real) if(r.s==="run"&&r.k) runKm+=r.k;
  // distinct active days power the streak + average stats
  const activeDays=[...new Set(real.map(r=>r.d))].sort();
  const spanDays = activeDays.length>1 ? dnum(activeDays[activeDays.length-1])-dnum(activeDays[0])+1 : 1;
  const perWeek = a.count/(spanDays/7);
  // most active year + busiest single day
  const yc={}; real.forEach(r=>{const y=yearOf(r);yc[y]=(yc[y]||0)+1;});
  const topYear = Object.entries(yc).sort((x,y)=>y[1]-x[1])[0];
  const dc={}; real.forEach(r=>{dc[r.d]=(dc[r.d]||0)+1;});
  const busiest = Object.entries(dc).sort((x,y)=>y[1]-x[1])[0];

  // streaks: longest run of consecutive calendar days trained + longest layoff
  let longest=0, cur=0, prev=null;
  for(const ds of activeDays){ const n=dnum(ds);
    cur = (prev!==null && n===prev+1) ? cur+1 : 1; if(cur>longest) longest=cur; prev=n; }
  let gap=0; for(let i=1;i<activeDays.length;i++){ const g=dnum(activeDays[i])-dnum(activeDays[i-1]); if(g>gap) gap=g; }

  // real-world equivalences for the fun-fact row
  const equator=a.dist/40075, moonPct=a.dist/384400*100, marathons=runKm/42.195, totalDays=a.dur/86400;
  const fact=(icon,big,sub)=>`<div class="card stat fact"><span class="big">${icon}</span><span class="ftxt"><b>${big}</b><span>${sub}</span></span></div>`;

  // Sport groups for the stacked charts: run / bike / swim, and everything else.
  // On-brand categorical palette stepped for the dark card surface (validated:
  // in-band lightness, ≥3:1 contrast, adjacent CVD ΔE ≥ 18). run = the brand
  // teal, bike = the brand blue, swim = amber, other = a recessive neutral slate.
  const STACK_SERIES = [
    {key:"run",   label:"Run",   color:"#2aa189"},
    {key:"bike",  label:"Bike",  color:"#3d80d4"},
    {key:"swim",  label:"Swim",  color:"#c2863a"},
    {key:"other", label:"Other", color:"#5f7186"},
  ];
  const grpOf = s => (s==="run"||s==="bike"||s==="swim") ? s : "other";
  const zeroParts = () => ({run:0, bike:0, swim:0, other:0});

  // weekly + seasonal training patterns, split by sport group
  const dow = WEEKDAYS.map(w=>({label:w, parts:zeroParts()}));
  real.forEach(r=>{ const d=new Date(r.d+"T00:00:00Z").getUTCDay(); dow[(d+6)%7].parts[grpOf(r.s)]++; });
  const mon = MONTHS.map(m=>({label:m, parts:zeroParts()}));
  real.forEach(r=>{ mon[monthOf(r)-1].parts[grpOf(r.s)]++; });

  // shoe mileage leaderboard (running km attributed to each shoe)
  const shoes={};
  for(const r of real){ if(r.s!=="run"||!r.sh||!r.k) continue; shoes[r.sh]=(shoes[r.sh]||0)+r.k; }
  const topShoes=Object.entries(shoes).sort((x,y)=>y[1]-x[1]);
  const shoeMax=topShoes.length?topShoes[0][1]:1;

  // extra fun-fact equivalences + standout sessions
  let bikeKm=0, swimKm=0, runSec=0, longSession=null; const dayKm={};
  for(const r of real){
    if(r.s==="bike"&&r.k) bikeKm+=r.k;
    if(r.s==="swim"&&r.k) swimKm+=r.k;
    if(r.s==="run"&&r.t) runSec+=r.t;
    if(r.t && (!longSession || r.t>longSession.t)) longSession=r;
    if(r.k) dayKm[r.d]=(dayKm[r.d]||0)+r.k;
  }
  const toursDeFrance=bikeKm/3360, channels=swimKm/33.8;  // a Tour ≈ 3360 km, the Channel ≈ 33.8 km
  const coverage=activeDays.length/spanDays*100;
  const runPace=runKm>0?(runSec/60)/runKm:0;              // lifetime avg run pace (min/km)
  const bigDay=Object.entries(dayKm).sort((x,y)=>y[1]-x[1])[0];
  const distinctShoes=Object.keys(shoes).length;
  const sportCount=new Set(real.map(r=>r.s)).size;

  // complementary insight cards (on-this-day / by-decade / fitness trends)
  const _today=new Date(), _md=pad(_today.getMonth()+1)+"-"+pad(_today.getDate());
  const otd=real.filter(r=>r.d.slice(5)===_md).sort((x,y)=>x.d<y.d?-1:1);
  const dec={};
  for(const r of real){ const k=Math.floor(yearOf(r)/10)*10;
    const o=dec[k]||(dec[k]={count:0,dist:0,dur:0,sp:{}});
    o.count++; o.dist+=r.k||0; o.dur+=r.t||0; o.sp[r.s]=(o.sp[r.s]||0)+1; }
  const decRows=Object.keys(dec).sort().map(k=>{const o=dec[k];
    return {dec:k,count:o.count,dist:o.dist,dur:o.dur,top:Object.entries(o.sp).sort((x,y)=>y[1]-x[1])[0][0]};});
  const _trend=(sp,kind)=>{
    // Plausibility guard: the source shorthand sometimes mis-parses an H:MM time
    // as M:SS (durations come out ~60x too short) or scrambles distance, which
    // produces absurd implied speeds (e.g. 140 km/h bikes). Only count rides
    // whose implied speed is physically sane so a few bad entries can't poison

    const sane=r=>{ if(!r.t||!r.k) return false; const v=r.k/(r.t/3600);

    {label:"Recovery", value:restCnt.recovery, color:"#4db6e6"},
    {label:"Travel",   value:restCnt.travel,   color:"#8a7dff"},
    {label:"Home",     value:restCnt.home,     color:"#be8c55"},
  ];

  // More patterns: annual volume + sport mix. (Cumulative distance lives in the
  // Reports distance report; active days per year in Reports > Consistency.)
  const kmByYear={}; for(const r of real){ if(!r.k) continue; const y=yearOf(r);
    const o=kmByYear[y]||(kmByYear[y]=zeroParts()); o[grpOf(r.s)]+=r.k; }
  const volYears=Object.keys(kmByYear).sort();
  const distByYear=volYears.map(y=>{ const o=kmByYear[y];
    return {label:y, parts:{run:Math.round(o.run), bike:Math.round(o.bike), swim:Math.round(o.swim), other:Math.round(o.other)}}; });
  const sportCnt={}; for(const r of real) sportCnt[r.s]=(sportCnt[r.s]||0)+1;

  app.innerHTML=`

     ${fact("🌍", fmtNum(equator,1)+"×", "around the Earth — "+fmtNum(a.dist)+" km logged")}
     ${fact("🌙", fmtNum(moonPct,1)+"%", "of the way to the Moon")}
     ${fact("🏅", fmtNum(marathons), "marathons' worth of running")}
     ${fact("⏱️", fmtNum(totalDays,1)+" days", "spent training, non-stop")}
     ${fact("📅", fmtNum(perWeek,1)+"/wk", "avg sessions over "+years.length+" years")}
     ${fact("🔥", longest+" days", "longest daily training streak")}
     ${bikeKm?fact("🚴", fmtNum(toursDeFrance,1)+"×", "the Tour de France — "+fmtNum(bikeKm)+" km biked"):""}
     ${swimKm?fact("🏊", fmtNum(channels,1)+"×", "across the English Channel — "+fmtNum(swimKm)+" km swum"):""}
     ${runPace?fact("⚡", fmtPace(runPace)+"/km", "lifetime average running pace"):""}
     ${longSession?fact("⏳", fmtDurShort(longSession.t), "longest session — "+sportName(longSession.s)+" "+longSession.d.slice(0,4)):""}
     ${bigDay?fact("📈", fmtNum(bigDay[1])+" km", "biggest distance in a single day"):""}
     ${distinctShoes?fact("👟", fmtNum(distinctShoes), "pairs of running shoes worn out"):""}
     ${fact("🤸", sportCount, "different sports logged over the years")}
     ${fact("🗓️", fmtNum(coverage)+"%", "of all days had a workout")}
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:18px">
     <div class="card"><h3>By day of week</h3>${stackedColumnChart(dow,{unit:"sessions",series:STACK_SERIES})}<div class="note-sm">Total sessions on each weekday, all years combined — split by sport (everything but run/bike/swim is “other”).</div></div>
     <div class="card"><h3>By month (all years)</h3>${stackedColumnChart(mon,{shortLabel:l=>l[0],unit:"sessions",series:STACK_SERIES})}<div class="note-sm">Sessions in each calendar month, every year stacked together and split by sport — reveals seasonal patterns.</div></div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:18px">
     <div class="card"><h3>Why days were skipped <span class="muted" style="font-weight:400;font-size:12px">· ${years[0]}–${years[years.length-1]}</span></h3>
       ${restData.some(d=>d.value)?columnChart(restData.filter(d=>d.value>0),{unit:"days"}):`<div class="muted">No rest-reason notes found.</div>`}
       <div class="note-sm">Note-only days across all ${years.length} years (${years[0]}–${years[years.length-1]}), grouped by likely reason and keyword-matched from the diary jottings (medium confidence). Reasons with no matching notes are omitted.</div></div>
   </div>

   <div class="card" style="margin-bottom:18px"><h3>Distance by year</h3>${stackedColumnChart(distByYear,{unit:"km",shortLabel:l=>"'"+l.slice(2),fmt:v=>fmtNum(v)+" km",series:STACK_SERIES})}<div class="note-sm">Total distance logged each year, split by sport (everything but run/bike/swim is “other”). Active days per year live in Reports → Consistency.</div></div>

   <div class="card" style="margin-bottom:18px">
     <h3>Cumulative distance — year vs year</h3>
     ${cumulativeChart(real)}
     <div class="note-sm">Each line is one year's distance total as the year progresses — handy for spotting fast vs slow years.</div>
   </div>

   <div class="card" style="margin-bottom:18px"><h3>Sessions by sport</h3>
     <div class="shoebar">
       ${topSports.map(([s,cnt])=>`<div class="shoe">
         <span class="nm">${sportTag(s)}</span>
         <span class="track"><span class="fill" style="width:${(cnt/sportMax*100).toFixed(1)}%;background:linear-gradient(90deg,${sportColor(s)}88,${sportColor(s)})"></span></span>
         <span class="km">${fmtNum(cnt)}</span></div>`).join("")}
     </div>
     <div class="note-sm">All-time session counts by activity (top ${topSports.length}).</div></div>

   <div class="card" style="line-height:1.7">
     <h3>Consistency</h3>
     <div class="kvgrid">
       <div><b>Most active year</b>${topYear?topYear[0]+" — "+fmtNum(topYear[1])+" sessions":"—"}</div>
       <div><b>Busiest day</b>${busiest?busiest[0]+" — "+busiest[1]+" sessions":"—"}</div>
       <div><b>Distinct active days</b>${fmtNum(activeDays.length)}</div>
       <div><b>Longest streak</b>${longest} days</div>
       <div><b>Longest layoff</b>${gap} days between sessions</div>
       <div><b>Training span</b>${(Math.round(spanDays/365.25*10)/10)} years</div>
     </div>
   </div>

   <div class="card" style="margin-top:18px"><h3>By decade</h3>
     <div class="note-sm" style="margin-bottom:8px">Totals grouped into calendar decades (90s, 00s…). <b>Top sport</b> is the most-logged sport of that decade by session count. The 1990s and 2020s are partial decades.</div>
     <div class="tablewrap"><table><thead><tr><th>Decade</th><th class="num">Workouts</th><th class="num">Distance</th><th class="num">Hours</th><th>Top sport</th></tr></thead>
     <tbody>${decRows.map(o=>`<tr><td><b>${o.dec}s</b></td><td class="num">${fmtNum(o.count)}</td><td class="num">${fmtNum(Math.round(o.dist))} km</td><td class="num">${Math.round(o.dur/3600)}</td><td>${sportTag(o.top)}</td></tr>`).join("")}</tbody></table></div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:18px">
     <div class="card"><h3>🏃 Avg run pace by year</h3>${runTrend.length?columnChart(runTrend,{shortLabel:l=>"'"+l.slice(2),fmt:v=>fmtPace(v)+"/km",unit:"min/km"}):`<div class="muted">Not enough data.</div>`}<div class="note-sm">Shorter = faster · years with &ge;8 runs</div></div>
     <div class="card"><h3>🚴 Avg bike speed by year</h3>${bikeTrend.length?columnChart(bikeTrend,{shortLabel:l=>"'"+l.slice(2),fmt:v=>v.toFixed(1)+" km/h",valFmt:v=>v.toFixed(1),unit:"km/h"}):`<div class="muted">Not enough data.</div>`}<div class="note-sm">Years with &ge;8 rides</div></div>
   </div>

   <div class="card" style="margin-top:18px"><h3>On this day — ${MONTHS[_today.getMonth()]} ${_today.getDate()}</h3>
     ${otd.length?`<div class="kvgrid" style="grid-template-columns:1fr">${otd.map(r=>`<div><b style="display:inline-block;width:42px">${r.d.slice(0,4)}</b>${sportTag(r.s)} <span class="muted">${[fmtDur(r.t),r.k!=null?fmtNum(r.k,1)+" km":"",perf(r)].filter(Boolean).join(" · ")}</span></div>`).join("")}</div>`:`<div class="muted">No workouts recorded on this date in any year.</div>`}
   </div>

   ${topShoes.length?`<div class="card" style="margin-top:18px">
     <h3>Running shoes by distance <span class="muted" style="font-weight:400;font-size:12px">· ${topShoes.length} pairs</span></h3>
     <div class="shoescroll"><div class="shoebar">
       ${topShoes.map(([nm,km])=>`<div class="shoe">
         <span class="nm" title="${escapeHTML(nm)}">${escapeHTML(nm)}</span>
         <span class="track"><span class="fill" style="width:${(km/shoeMax*100).toFixed(1)}%"></span></span>
         <span class="km">${fmtNum(km)} km</span></div>`).join("")}
     </div></div>
     <div class="note-sm">Distance attributed to the shoe noted on each run — every pair Mike logged (${fmtNum(topShoes.length)} in all), ranked by total distance. Scroll for the full list.</div>
   </div>`:""}`;

  wireFilter();
}

// Tap a calendar square → overlay that day's sessions and totals.
function dayPopup(ds){
  const all=DATA.filter(r=>r.d===ds);
  const rows=all.filter(r=>r.s!=="note");
  const notes=all.filter(r=>r.s==="note");
  const dt=new Date(ds+"T00:00:00Z");
  const title=WEEKDAYS[(dt.getUTCDay()+6)%7]+", "+MONTHS[dt.getUTCMonth()]+" "+dt.getUTCDate()+", "+dt.getUTCFullYear();
  let totDur=0,totKm=0; rows.forEach(r=>{ if(r.t)totDur+=r.t; if(r.k)totKm+=r.k; });
  const wbody=rows.map(r=>`<div class="e">${sportTag(r.s)}<span class="meta">${[r.t?fmtDur(r.t):"",r.k!=null?fmtNum(r.k,1)+" km":"",perf(r)].filter(Boolean).join(" · ")||"—"}</span>${r.n?`<div class="note-sm" style="flex-basis:100%;margin-top:2px">${escapeHTML(r.n)}</div>`:""}</div>`).join("");
  // Diary notes (injury, rest, travel, home projects…): show the
  // detected category as a coloured tag next to whatever Mike actually wrote.
  const nbody=notes.map(r=>{ const txt=noteText(r), c=classifyNote(txt);
    const lab=NOTE_LABEL[c]||"note", col=NOTE_COL[c]||"var(--panel2)";
    return `<div class="e"><span class="note-tag" style="background:${col}">${lab}</span><span class="meta">${escapeHTML(txt)||"—"}</span></div>`; }).join("");
  const body=(wbody+nbody)||`<div class="muted">Nothing recorded.</div>`;
  const tot=rows.length>1?`<div class="day-tot"><span><b>${rows.length}</b> sessions</span><span><b>${fmtDurShort(totDur)}</b> total</span>${totKm?`<span><b>${fmtNum(totKm,1)}</b> km</span>`:""}</div>`:"";
  const link=all.length?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line)"><span class="daylink" ${focusAttrs(ds,ds,null,"Day: "+ds)}>View in Raw Data →</span></div>`:"";
  return `<div class="day-card">
    <div class="cardhead" style="justify-content:space-between;margin-bottom:6px"><h3 style="margin:0">${title}</h3><button class="day-x" aria-label="Close">✕</button></div>
    ${tot}<div class="cal-detail">${body}</div>${link}
  </div>`;
}
function showDayOverlay(ds){
  let ov=document.getElementById("day-overlay");
  if(!ov){ ov=document.createElement("div"); ov.id="day-overlay"; ov.className="overlay"; document.body.appendChild(ov);
    ov.addEventListener("click",e=>{ if(e.target===ov||e.target.closest(".day-x")) ov.classList.remove("show"); });
    document.addEventListener("keydown",e=>{ if(e.key==="Escape") ov.classList.remove("show"); });
  }
  ov.innerHTML=dayPopup(ds);
  ov.classList.add("show");
}

// ---- Training-load model, shared by the Insights heatmap and the Calendar page.
// A day's "load" combines time and intensity so one hard effort outweighs a pile
// of easy ones. Per session:  load = effort-minutes × intensity, where
//   effort-minutes = the recorded minutes, or (distance ÷ the sport's typical
//                    speed) when only a distance was logged;
//   intensity      = the session's speed ÷ that sport's typical speed
//                    (faster = harder), clamped to 0.7–1.5, and 1.0 when there's
//                    no pace to judge (time-only sports, or missing data).
// Reference speeds are the median of each sport's physically-plausible sessions,
// so the model self-calibrates to Mike's own data. A day's load is the sum of its
// sessions' loads; the top-1% (orange) days sit at/above the 99th load percentile.
let _actModel=null;
function activityModel(){
  if(_actModel) return _actModel;
  const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;
  // plausible-speed guard (km/h) so mis-parsed times can't skew the medians/load
  const sane=r=>{ if(!r.t||!r.k) return false; const v=r.k/(r.t/3600);
    return r.s==="swim" ? (v>=1&&v<=8) : r.s==="run" ? (v>=4&&v<=22) : (v>=2&&v<=60); };
  // 1) reference (median) speed per sport from its sane sessions
  const bySport={};
  for(const r of DATA){ if(r.s==="note"||!sane(r)) continue;
    (bySport[r.s]||(bySport[r.s]=[])).push(r.k/(r.t/3600)); }
  const ref={}; for(const s in bySport){ const a=bySport[s].sort((x,y)=>x-y); ref[s]=a[Math.floor(a.length/2)]; }
  // 2) roll every day up into sessions / seconds / km / load, and pick the top note
  const day={}, noteDay={}; let minY=Infinity,maxY=-Infinity;
  for(const r of DATA){
    if(r.s==="note"){ const c=classifyNote(noteText(r)); if(c==="other") continue;
      if(!noteDay[r.d] || NOTE_RANK[c]>NOTE_RANK[noteDay[r.d]]) noteDay[r.d]=c; continue; }
    const y=yearOf(r); if(y<minY)minY=y; if(y>maxY)maxY=y;
    const rs=ref[r.s];
    const mins = r.t ? r.t/60 : (r.k&&rs ? (r.k/rs)*60 : 0);
    let inten = 1;
    if(r.t&&r.k&&rs && sane(r)){ const v=r.k/(r.t/3600); if(v>0&&isFinite(v)) inten=clamp(v/rs,0.7,1.5); }
    const m=day[r.d]||(day[r.d]={c:0,dur:0,dist:0,load:0});
    m.c++; if(r.t)m.dur+=r.t; if(r.k)m.dist+=r.k; m.load+=mins*inten;
  }
  // 3) the top-1% load threshold across all days that carried any load
  const loads=Object.values(day).map(d=>d.load).filter(v=>v>0).sort((x,y)=>x-y);
  const hot = loads.length>=2 ? loads[Math.floor(loads.length*0.99)] : Infinity;
  return _actModel={ref,day,noteDay,minY,maxY,hot};
}
// green shade for a day's load (effort-minutes): four steps, darker = more load
function loadShade(load){ const a = load<30?.4 : load<60?.58 : load<120?.76 : .92; return `rgba(54,194,168,${a})`; }

//============================================================ CALENDAR (dedicated page)
// The Insights heatmap, but full-page and scrolled VERTICALLY: every week is one
// Mon→Sun row, weeks stack oldest-at-top, with a sticky weekday header, a year
// jump, a live year summary, and category filters that grey out the rest.
let _calYear=null;
// the ten legend/filter categories: [key, swatch colour, label]
const CAL_CATS=[
  ["trained","#36c2a8","trained"], ["top","rgba(255,178,90,.95)","top 1%"],
  ["race",NOTE_COL.race,"race"], ["injury",NOTE_COL.injury,"injury"],
  ["illness",NOTE_COL.illness,"illness"], ["weather",NOTE_COL.weather,"weather"],
  ["rest",NOTE_COL.rest,"rest"], ["recovery",NOTE_COL.recovery,"recovery"],
  ["travel",NOTE_COL.travel,"travel"], ["home",NOTE_COL.home,"home"],
];
function renderCalendar(app){
  const {day,noteDay,minY,maxY,hot}=activityModel();
  if(!isFinite(minY)){ app.innerHTML=`<h2 class="section">Activity calendar</h2><div class="card muted">No activity recorded.</div>`; return; }
  const years=[]; for(let y=minY;y<=maxY;y++) years.push(y);
  // per-year totals for the summary strip + a most-active default year
  const ysum={};
  for(const ds in day){ const y=+ds.slice(0,4); const o=ysum[y]||(ysum[y]={days:0,sess:0,dur:0,load:0,top:0});
    const d=day[ds]; o.days++; o.sess+=d.c; o.dur+=d.dur; o.load+=d.load; if(d.load>0&&d.load>=hot)o.top++; }
  if(_calYear===null || !years.includes(_calYear)){
    let best=null; for(const y of years){ const o=ysum[y]; if(o&&(best===null||o.sess>ysum[best].sess)) best=y; }
    _calYear = best!==null ? best : maxY;
  }
  // one continuous Monday-start week list, oldest first
  const start=new Date(Date.UTC(minY,0,1)); start.setUTCDate(start.getUTCDate()-((start.getUTCDay()+6)%7));
  const end=new Date(Date.UTC(maxY,11,31)); end.setUTCDate(end.getUTCDate()+(6-((end.getUTCDay()+6)%7)));
  const weeks=[]; const cur=new Date(start);
  while(cur<=end){ const wk=[];
    for(let i=0;i<7;i++){ const ds=cur.toISOString().slice(0,10), y=cur.getUTCFullYear();
      const inSpan=y>=minY&&y<=maxY, d=day[ds]||{c:0,dur:0,dist:0,load:0};
      wk.push({ds,y,inSpan,dom:cur.getUTCDate(),mo:cur.getUTCMonth()+1,c:d.c,dur:d.dur,dist:d.dist,load:d.load,note:noteDay[ds]||null});
      cur.setUTCDate(cur.getUTCDate()+1); }
    weeks.push(wk);
  }
  const catOf=d=> !d.inSpan?"none" : (!d.c ? (d.note||"none") : (d.load>0&&d.load>=hot?"top":"trained"));
  const color=d=>{ if(!d.inSpan) return "transparent";
    if(!d.c) return d.note?NOTE_COL[d.note]:"var(--panel2)";
    if(d.load>0&&d.load>=hot) return "rgba(255,178,90,.95)";
    return loadShade(d.load); };
  const tip=d=>{ if(!d.inSpan) return "";
    if(!d.c) return d.note?`${d.ds} · ${NOTE_LABEL[d.note]}`:"";
    const bits=[`${d.c} session${d.c===1?"":"s"}`]; if(d.dur)bits.push(fmtDurShort(d.dur));
    if(d.dist)bits.push(fmtNum(d.dist,1)+" km"); bits.push("load "+Math.round(d.load));
    if(d.load>0&&d.load>=hot)bits.push("top 1%");
    return `${d.ds} · ${bits.join(" · ")}`; };
  const gutter=wk=>{ const f=wk.find(d=>d.inSpan&&d.dom===1); if(!f) return "";
    return f.mo===1?`<b>${f.ds.slice(0,4)}</b>`:MONTHS[f.mo-1]; };
  // build the grid: each week is one row = [gutter label][7 day cells]
  const rowsHTML = weeks.map(wk=>{
    const ny = wk.some(d=>d.inSpan&&d.ds.slice(5)==="01-01");   // first week of a calendar year
    const fs = wk.find(d=>d.inSpan); const yv = fs?fs.y:wk[3].y;
    const cells = wk.map(d=>{
      const tappable = d.inSpan&&(d.c||d.note);
      return `<div class="vcal-cell" data-cat="${catOf(d)}"${tappable?` data-d="${d.ds}"`:""} style="background:${color(d)}" title="${tip(d)}">${d.inSpan?`<span class="dn">${d.dom}</span>`:""}</div>`;
    }).join("");
    return `<div class="vcal-row${ny?" vcal-y":""}" data-y="${yv}"><div class="vcal-lbl">${gutter(wk)}</div>${cells}</div>`;
  }).join("");
  const dows = WEEKDAYS.map((w,i)=>`<div class="dow${i>=5?" we":""}">${w}</div>`).join("");
  const chips = CAL_CATS.map(([k,c,l])=>`<button class="vcal-chip" data-cat="${k}" aria-pressed="true"><span class="sw" style="background:${c}"></span>${l}</button>`).join("");
  const legend = `<div class="hm-legend" style="margin-top:12px">Less
    <span class="hm-cell" style="background:var(--panel2)"></span><span class="hm-cell" style="background:rgba(54,194,168,.4)"></span><span class="hm-cell" style="background:rgba(54,194,168,.58)"></span><span class="hm-cell" style="background:rgba(54,194,168,.76)"></span><span class="hm-cell" style="background:rgba(54,194,168,.92)"></span> More<span class="hm-cell" style="background:rgba(255,178,90,.95);margin-left:12px"></span> top 1%<span class="hm-cell" style="background:${NOTE_COL.race};margin-left:12px"></span> race<span class="hm-cell" style="background:${NOTE_COL.injury};margin-left:8px"></span> injury<span class="hm-cell" style="background:${NOTE_COL.illness};margin-left:8px"></span> illness<span class="hm-cell" style="background:${NOTE_COL.weather};margin-left:8px"></span> weather<span class="hm-cell" style="background:${NOTE_COL.rest};margin-left:8px"></span> rest<span class="hm-cell" style="background:${NOTE_COL.recovery};margin-left:8px"></span> recovery<span class="hm-cell" style="background:${NOTE_COL.travel};margin-left:8px"></span> travel<span class="hm-cell" style="background:${NOTE_COL.home};margin-left:8px"></span> home</div>`;
  const howNote = `<details class="vcal-how">
     <summary>How it's measured</summary>
     <div class="body">
       <ul>
         <li><b>Green = training load</b> (not session count): <code>minutes × intensity</code>, summed per day. Darker = harder.</li>
         <li><b>Intensity</b> = a session's speed vs that sport's typical speed — faster is harder — capped 0.7–1.5×; 1.0× when there's no pace (hockey, weights…).</li>
         <li>So one long, fast effort beats five short easy ones (5×10-min jog ≈ 35; one fast 200-min ride ≈ 280).</li>
         <li><b style="color:rgba(255,178,90,.95)">Orange = top 1%</b> of daily load across all ${years.length} years — the hardest days, not the busiest.</li>
       </ul>
       <div style="margin-top:9px;font-weight:700;color:var(--text)">Diary tints — no-workout days, by what Mike jotted:</div>
       <ul class="vcal-catgrid">
         <li><b>race</b> — event / meet</li><li><b>injury</b> — hurt / pain</li>
         <li><b>illness</b> — sick / flu</li><li><b>weather</b> — storm / heat / cold</li>
         <li><b>rest</b> — explicit day off</li><li><b>recovery</b> — massage / physio</li>
         <li><b>travel</b> — trips / away</li><li><b>home</b> — projects / chores</li>
       </ul>
       <div style="margin-top:9px;opacity:.8">Diary tints are keyword-matched (medium confidence). Typical speeds are each sport's own median, so the scale self-calibrates.</div>
     </div>
   </details>`;

  app.innerHTML = `
   <h2 class="section">Activity calendar</h2>
   <div class="card">
     <div class="vcal-controls">
       <label class="fld" style="max-width:110px;margin:0">Year
         <select id="vcal-year">${years.slice().reverse().map(y=>`<option ${y===_calYear?"selected":""}>${y}</option>`).join("")}</select></label>
       <div id="vcal-sum" class="vcal-sum"></div>
     </div>
     <div class="vcal-controls" style="margin-bottom:8px">
       <div class="vcal-chips">${chips}
         <button class="vcal-mini" id="vcal-all">All</button>
         <button class="vcal-mini" id="vcal-none">None</button>
       </div>
     </div>
     <div class="vcal-layout">
       <div class="vcal-main">
         <div class="vcal-scroll" id="vcal-scroll">
           <div class="vcal-head"><div></div>${dows}</div>
           <div class="vcal" id="vcal-grid">${rowsHTML}</div>
         </div>
       </div>
       <div class="vcal-aside">
         ${legend}
         ${howNote}
       </div>
     </div>
     <div id="vcal-table" class="vcal-table"></div>
   </div>`;

  // ---- wiring: year jump ↔ scroll sync, day popups, category filter
  const scroll=document.getElementById("vcal-scroll");
  const grid=document.getElementById("vcal-grid");
  const ysel=document.getElementById("vcal-year");
  const sumEl=document.getElementById("vcal-sum");
  const rowEls=[...grid.querySelectorAll(".vcal-row")];
  const headH=()=>{ const h=scroll.querySelector(".vcal-head"); return h?h.offsetHeight:0; };
  // Every week row is the same height, so positions are exact from index×pitch —
  // no per-row offsetTop reads (which content-visibility only *estimates* for
  // off-screen rows, and which would be O(rows) on every scroll frame).
  const firstTop=rowEls.length?rowEls[0].offsetTop:0;
  const pitch=rowEls.length>1?((rowEls[1].offsetTop-rowEls[0].offsetTop)||1):1;
  const yearIndex={}; rowEls.forEach((el,i)=>{ const y=+el.dataset.y; if(yearIndex[y]==null) yearIndex[y]=i; });
  const topOfYear=y=>firstTop+(yearIndex[y]||0)*pitch;
  // scroll a specific date's week to just under the sticky header (rows[0] starts
  // on `start`, one week per row) and sync the year label + summary to it.
  const startMs=start.getTime();
  const scrollToDate=ds=>{ const wi=Math.floor((Date.parse(ds+"T00:00:00Z")-startMs)/(7*864e5));
    const i=Math.max(0,Math.min(rowEls.length-1,wi));
    scroll.scrollTop=Math.max(0, firstTop+i*pitch-headH()-4);
    const y=+ds.slice(0,4); if(ysel)ysel.value=y; _calYear=y; fillSum(y); };
  const fillSum=y=>{ const o=ysum[y];
    sumEl.innerHTML = o
      ? `<b>${y}</b> · <b>${o.days}</b> active day${o.days===1?"":"s"} · <b>${fmtNum(o.sess)}</b> session${o.sess===1?"":"s"} · <b>${Math.round(o.dur/3600)}h</b> trained · <b>${o.top}</b> top-1% day${o.top===1?"":"s"}`
      : `<b>${y}</b> · no recorded activity`; };
  // which year sits under the sticky header right now (slack > the jump gap below
  // so a freshly-jumped-to year reads back as itself, not the tail of the prior one)
  const yearAtScroll=()=>{ if(!rowEls.length) return _calYear;
    let i=Math.floor((scroll.scrollTop+headH()+14-firstTop)/pitch);
    if(i<0)i=0; else if(i>rowEls.length-1)i=rowEls.length-1;
    return +rowEls[i].dataset.y; };
  let raf=0;
  scroll.addEventListener("scroll",()=>{ if(raf) return; raf=requestAnimationFrame(()=>{ raf=0;
    const y=yearAtScroll(); if(+ysel.value!==y) ysel.value=y; _calYear=y; fillSum(y); }); },{passive:true});
  // Instant jump — smooth-scrolling across decades is a long, janky ride; a year
  // picker should land immediately (and the scroll sync then reads back that year).
  ysel.onchange=()=>{ const y=+ysel.value; _calYear=y; fillSum(y);
    scroll.scrollTop=Math.max(0,topOfYear(y)-headH()-4); };
  grid.addEventListener("click",e=>{ const c=e.target.closest(".vcal-cell[data-d]"); if(c) showDayOverlay(c.dataset.d); });
  // category filter: unselected categories grey out. Dimming is done by toggling
  // an `off-<cat>` class on the GRID (one node) — static CSS then fades just the
  // matching cells via opacity. No per-cell writes, no filter/transition, so even
  // "None" (dim everything) is instant on mobile.
  const active=new Set(CAL_CATS.map(c=>c[0]));
  const applyFilter=()=>CAL_CATS.forEach(c=>grid.classList.toggle("off-"+c[0], !active.has(c[0])));

  // ---- companion table: lists the days matching the active categories, so a
  // sparse category (travel, races, injuries…) can be read off directly instead
  // of hunted for in the grid. Tinted note-days follow the same rule as the
  // calendar (a note only counts on a day with no workout). Tap a row → that day.
  const tableEl=document.getElementById("vcal-table");
  const catColor=c=> c==="trained"?"#36c2a8" : c==="top"?"rgba(255,178,90,.95)" : (NOTE_COL[c]||"var(--panel2)");
  const catLbl=c=> c==="top"?"top 1%" : c;
  const TCAP=400;
  const updateTable=()=>{
    if(active.size===CAL_CATS.length){ tableEl.innerHTML=`<div class="vcal-table-hint">Tap <b>None</b> then a category (or switch some off) to list those days here — every <b>travel</b>, <b>race</b> or <b>injury</b> day at a glance, no scrolling.</div>`; return; }
    if(!active.size){ tableEl.innerHTML=`<div class="vcal-table-hint">No categories selected — pick one or more above.</div>`; return; }
    const list=[];
    const noteCats=new Set(["race","injury","illness","weather","rest","recovery","travel","home"]);
    if([...active].some(c=>noteCats.has(c)))
      for(const ds in noteDay){ const c=noteDay[ds]; if(active.has(c)&&!day[ds]) list.push({d:ds,cat:c,note:1}); }
    const wT=active.has("trained"), wTop=active.has("top");
    if(wT||wTop) for(const ds in day){ const dd=day[ds], top=dd.load>0&&dd.load>=hot;
      if((top&&wTop)||(!top&&wT)) list.push({d:ds,cat:top?"top":"trained",dd}); }
    list.sort((a,b)=> a.d<b.d?1:a.d>b.d?-1:0);   // newest first
    const total=list.length;
    const rows=list.slice(0,TCAP).map(it=>{
      const dt=new Date(it.d+"T00:00:00Z");
      const dstr=`${MONTHS[dt.getUTCMonth()]} ${dt.getUTCDate()}, ${dt.getUTCFullYear()}`;
      const tag=`<span class="vcal-ttag" style="background:${catColor(it.cat)}">${catLbl(it.cat)}</span>`;
      let detail;
      if(it.note){ const txt=DATA.filter(r=>r.s==="note"&&r.d===it.d).map(noteText).filter(Boolean).join(" · "); detail=escapeHTML(txt)||"<span class='muted'>—</span>"; }
      else { const dd=it.dd, sports=[...new Set(DATA.filter(r=>r.d===it.d&&r.s!=="note").map(r=>r.s))].map(sportTag).join(" ");
        detail=`${sports} <span class="muted">· ${dd.c} session${dd.c===1?"":"s"}${dd.dur?" · "+fmtDurShort(dd.dur):""}${dd.dist?" · "+fmtNum(dd.dist,1)+" km":""} · load ${Math.round(dd.load)}</span>`; }
      return `<tr data-d="${it.d}"><td class="vcal-tdate">${dstr}</td><td>${tag}</td><td>${detail}</td></tr>`;
    }).join("");
    tableEl.innerHTML=`<div class="vcal-table-head"><b>${fmtNum(total)}</b> matching day${total===1?"":"s"}${total>TCAP?` <span class="muted">· showing the ${TCAP} most recent</span>`:""}</div>
      <div class="vcal-table-scroll"><table class="vcal-ttable"><tbody>${rows||`<tr><td class="muted" style="padding:12px">No matching days.</td></tr>`}</tbody></table></div>`;
  };
  tableEl.addEventListener("click",e=>{ const tr=e.target.closest("tr[data-d]"); if(tr) showDayOverlay(tr.dataset.d); });
  const refresh=()=>{ applyFilter(); updateTable(); };

  // earliest day matching a single active category (for the jump-on-isolate below)
  const NOTE_CAT_KEYS=new Set(["race","injury","illness","weather","rest","recovery","travel","home"]);
  const firstMatchDate=()=>{
    if(active.size!==1) return null;
    const cat=[...active][0]; let best=null;
    if(NOTE_CAT_KEYS.has(cat)){ for(const ds in noteDay){ if(noteDay[ds]===cat&&!day[ds]&&(best===null||ds<best)) best=ds; } }
    else if(cat==="trained"||cat==="top"){ for(const ds in day){ const dd=day[ds], top=dd.load>0&&dd.load>=hot;
      if((top?"top":"trained")===cat&&(best===null||ds<best)) best=ds; } }
    return best;
  };
  const chipEls=[...document.querySelectorAll(".vcal-chip")];
  const syncChips=()=>chipEls.forEach(ch=>ch.setAttribute("aria-pressed", active.has(ch.dataset.cat)?"true":"false"));
  // Tapping a category ISOLATES it (drop the rest) when everything is currently
  // shown — so "click travel" means "show only travel", not "hide travel". Tapping
  // the lone selected one again restores all; from a partial selection it toggles.
  // Isolating down to a single category jumps the grid to that category's first day.
  const onCat=k=>{
    if(active.size===CAL_CATS.length){ active.clear(); active.add(k); }
    else if(active.size===1&&active.has(k)){ CAL_CATS.forEach(c=>active.add(c[0])); }
    else if(active.has(k)){ active.delete(k); }
    else { active.add(k); }
    syncChips(); refresh();
    const fd=firstMatchDate(); if(fd) scrollToDate(fd);
  };
  chipEls.forEach(ch=>ch.onclick=()=>onCat(ch.dataset.cat));
  document.getElementById("vcal-all").onclick=()=>{ CAL_CATS.forEach(c=>active.add(c[0])); syncChips(); refresh(); };
  document.getElementById("vcal-none").onclick=()=>{ active.clear(); syncChips(); refresh(); };
  updateTable();
  // open on the default (most-active) year without a scroll animation
  requestAnimationFrame(()=>{ scroll.scrollTop=Math.max(0,topOfYear(_calYear)-headH()-4); fillSum(_calYear); });
}

//============================================================ GLOBAL FILTER
// A site-wide scope (year range + sport) applied to the Dashboard, Insights and
// Records pages. Kept in one place so switching tabs preserves the selection.
let FILTER = {fromY:null, toY:null, sport:""};
function allYears(){ return [...new Set(DATA.map(yearOf))].sort((a,b)=>a-b); }
function filtered(rows=DATA){
  return rows.filter(r=>{
    const y=yearOf(r);
    if(FILTER.fromY!=null && y<FILTER.fromY) return false;
    if(FILTER.toY!=null && y>FILTER.toY) return false;
    if(FILTER.sport && r.s!==FILTER.sport) return false;
    return true;
  });
}
function filterActive(){
  const ys=allYears();
  return !!FILTER.sport || (FILTER.fromY!=null&&FILTER.fromY!==ys[0]) || (FILTER.toY!=null&&FILTER.toY!==ys[ys.length-1]);

function wireFilter(){

//============================================================ CUMULATIVE CHART
// Cumulative distance through the year, one line per year overlaid, so you can
// see whether a year is running ahead of or behind your usual pace. Recent years
// are drawn brightest; older years fade into the background.
function cumulativeChart(rows){
  const byYear={};
  for(const r of rows){ if(!r.k) continue; (byYear[yearOf(r)]||(byYear[yearOf(r)]=[])).push(r); }
  const years=Object.keys(byYear).map(Number).sort((a,b)=>a-b);
  if(!years.length) return `<div class="muted">No distance data in range.</div>`;
  const W=660,H=240,padL=46,padR=12,padT=12,padB=22;
  const doy=ds=>{ const dt=new Date(ds+"T00:00:00Z"); return Math.floor((dt-Date.UTC(dt.getUTCFullYear(),0,1))/864e5); };
  let maxKm=0;
  const series=years.map(y=>{
    const rs=byYear[y].slice().sort((a,b)=>a.d<b.d?-1:1);
    let cum=0; const pts=[];
    for(const r of rs){ cum+=r.k; pts.push([doy(r.d),cum]); }
    if(cum>maxKm) maxKm=cum;
    return {y,pts,total:cum};
  });
  const ticks=niceTicks(Math.max(1,maxKm),4); const tmax=ticks[ticks.length-1];
  const X=d=>padL+(d/365)*(W-padL-padR);
  const Y=v=>padT+(1-v/tmax)*(H-padT-padB);
  const recent=years.slice(-6);
  // Distinct hues (oldest→newest of the recent years) so the lines are easy to
  // tell apart; the newest year gets the brightest colour.
  const PAL=["#e0a14a","#e0556e","#a78bfa","#4d9fff","#36c2a8","#62f0d0"];
  const colorFor=y=>{ const ri=recent.indexOf(y); return ri<0 ? "rgba(138,160,181,.16)" : PAL[Math.round(ri/Math.max(1,recent.length-1)*(PAL.length-1))]; };
  const grid=ticks.map(t=>`<line x1="${padL}" x2="${W-padR}" y1="${Y(t).toFixed(1)}" y2="${Y(t).toFixed(1)}" class="lc-grid"/><text x="${padL-6}" y="${(Y(t)+3).toFixed(1)}" text-anchor="end" class="lc-ax">${fmtK(t)}</text>`).join("");
  const mlab=["Jan","Mar","May","Jul","Sep","Nov"].map((m,i)=>`<text x="${X([0,59,120,181,243,304][i]).toFixed(1)}" y="${H-6}" text-anchor="middle" class="lc-ax">${m}</text>`).join("");
  const paths=series.map(s=>{
    const col=colorFor(s.y), w=recent.includes(s.y)?2:1;
    const d=s.pts.map((p,j)=>`${j?'L':'M'}${X(p[0]).toFixed(1)} ${Y(p[1]).toFixed(1)}`).join(" ");
    return `<path d="${d}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linejoin="round" stroke-linecap="round"><title>${s.y}: ${fmtNum(Math.round(s.total))} km</title></path>`;
  }).join("");
  const legend=`<div class="cumlegend">`+recent.slice().reverse().map(y=>`<span><i style="background:${colorFor(y)}"></i>${y} · ${fmtNum(Math.round(byYear[y].reduce((a,r)=>a+r.k,0)))} km</span>`).join("")+(years.length>recent.length?`<span><i style="background:rgba(138,160,181,.16)"></i>earlier years</span>`:"")+`</div>`;
  return `<div class="yunit" style="position:static;margin-bottom:2px">km</div><svg class="linechart" viewBox="0 0 ${W} ${H}" role="img">${grid}${paths}${mlab}</svg>${legend}`;
}

//============================================================ PERFORMANCE ANALYTICS
// Two related lenses on Mike's *best* performance rather than his volume:
//   Races  — only the efforts Mike tagged RACE, so training noise is excluded.
//   By Era — records per decade / 5-year block, since all-time bests skew to his youth.
// Plus sport-specific premade reports live in the Reports tab.

// A race is any effort Mike flagged with an explicit uppercase RACE tag in his log
// (the running log uses a "RACE - <event>" prefix). That is his own high-precision
// marker — far cleaner than keyword-guessing "race"/"sprint"/"marathon" out of prose.
function isRace(r){ return /\bRACE\b/.test((r.n||"")+" "+(r.r||"")); }
// A readable event name out of a race note: drop the "RACE -" marker, then cut at
// the first split time (12:34), doubled space, or sentence break so the diary prose
// that often trails the name doesn't leak into the label.
function raceName(r){
  let n=(r.n||"").replace(/^.*?\bRACE\b\s*[-–:]*\s*/,"").trim();
  if(!n) return "Race";
  n=n.split(/\s\d{1,2}:\d{2}|\.\s|\s{2,}| exults\b/i)[0].trim();
  n=n.replace(/\s+1\/2\s*$/,"").trim();
  return (n||"Race").slice(0,44);
}

// Group races that are the SAME recurring event so Mike can filter the race
// table to one series and watch his time on it move over the years. His log
// spells a race several ways — "Dalhousie Lake Shuffle" is also just "DLS", the
// whole Countdown Race family, "Army Half"/"Army half"/"Army" — so each series
// is an explicit alias rule matched against the cleaned race name. Ordered
// most-specific first; the first hit wins (so "Nortel Countdown Race Route DLS
// entry" is a Countdown Race, not a DLS). A name that matches nothing is a
// one-off and gets no series (no button — you can't chart improvement off one run).
const RACE_SERIES=[
  {key:"countdown", label:"Countdown Race",             re:/count-?down race/i},
  {key:"dls",       label:"Dalhousie Lake Shuffle",     re:/dalhousie lake shuffle|\bdls\b/i},
  {key:"oac-relay", label:"OAC Relay",                  re:/oac relay/i},
  {key:"oac-tri",   label:"OAC Triathlon",              re:/oac tri/i},
  {key:"sharbot",   label:"Sharbot Lake Triathlon",     re:/sharbot lake/i},
  {key:"orw",       label:"Ottawa Race Weekend",        re:/ottawa race weekend/i},
  {key:"perth-kilt",label:"Perth Kilt Run",             re:/perth kilt/i},
  {key:"army",      label:"Army Run",                   re:/\barmy\b/i},
  {key:"deep-river",label:"Deep River Triathlon",       re:/deep river/i},
  {key:"richmond",  label:"Richmond",                   re:/richmond/i},
  {key:"kingston",  label:"Kingston Triathlon",         re:/kingston/i},
  {key:"natcap-tri",label:"National Capital Triathlon", re:/national capital tri/i},
  {key:"canada-day",label:"Canada Day",                 re:/canada day/i},
  {key:"perth-tri", label:"Perth Triathlon",            re:/perth tri/i},
  {key:"barrys-bay",label:"Barry's Bay Triathlon",      re:/barry.?s bay/i},
  {key:"gatineau",  label:"Gatineau Triathlon",         re:/gatineau/i},
  {key:"smiths-tri",label:"Smith's Falls Triathlon",    re:/smith.?s falls tri/i},
  {key:"nordion",   label:"Nordion",                    re:/nordion/i},
  {key:"nc-mara",   label:"NC Marathon",                re:/\bnc marathon\b/i},
];
function raceSeries(name){ for(const s of RACE_SERIES) if(s.re.test(name)) return s; return null; }

// ---- Performance tab ------------------------------------------------------
let perfSub="races";
let perfRaceSeries=null;   // null = All; else a RACE_SERIES key the race table is filtered to
let eraSize=10;   // decade vs 5-year blocks in the By-Era view
// Rows inside the current year filter, IGNORING the sport filter — the Performance
// tab is inherently running-based, so a stray "sport: bike" filter shouldn't empty it.

// Standard-distance race bands: a race whose distance falls in the band counts as
// that event (a 10.2 km race is a 10K; a tri run leg at 10 km counts too).
const RACE_BANDS=[["5K",5,4.6,5.6],["10K",10,9.2,10.8],["Half",21.0975,20.4,22.2],["Marathon",42.195,40.0,43.6]];
function perfRaces(){
  const races=perfRows().filter(isRace).filter(r=>r.s==="run"&&r.t>0&&r.k>0&&_pace(r)>=3.0&&_pace(r)<=10);
  if(!races.length) return `<div class="card">No <b>RACE</b>-tagged efforts in this range. Mike marks races with a “RACE –” tag in his log; widen the year filter to see them.</div>`;
  const years=[...new Set(races.map(yearOf))].sort();
  const byYear=years.map(y=>({label:String(y),value:races.filter(r=>yearOf(r)===y).length}));
  const raceKm=races.reduce((s,r)=>s+(r.k||0),0);
  // Quick race-series filter: bucket each race into its recurring event (if any)
  // so the table can be narrowed to one race Mike has run repeatedly and he can
  // watch his time on it move over the years. Counts drive both the chips and
  // which series earn a button (>=2 runnings — one run charts no progress).
  const seriesCount={};
  for(const r of races){ const s=raceSeries(raceName(r)); if(s) seriesCount[s.key]=(seriesCount[s.key]||0)+1; }
  if(perfRaceSeries && !seriesCount[perfRaceSeries]) perfRaceSeries=null;   // selection fell outside the year filter
  const chips=RACE_SERIES.filter(s=>seriesCount[s.key]>=2 || s.key===perfRaceSeries)
    .map(s=>({key:s.key,label:s.label,count:seriesCount[s.key]}))
    .sort((a,b)=>b.count-a.count);   // most-raced first — the useful ones lead the scroll row
  const selSeries=perfRaceSeries?RACE_SERIES.find(s=>s.key===perfRaceSeries):null;
  const tableRaces=selSeries?races.filter(r=>raceSeries(raceName(r))?.key===perfRaceSeries):races;
  const sorted=tableRaces.slice().sort((a,b)=>a.d<b.d?1:-1);   // newest first
  // race PRs at standard distances (races only — fastest actual finishing time in band)
  const prCards=RACE_BANDS.map(([name,D,lo,hi])=>{
    const c=races.filter(r=>r.k>=lo&&r.k<=hi); if(!c.length) return "";
    const b=c.reduce((x,y)=>y.t<x.t?y:x);
    return `<div class="card stat rec clk" ${focusAttrs(b.d,b.d,rowId(b),name+" race PR")}>
      <div class="l">${name} race PR</div><div class="v">${fmtDur(b.t)}</div>
      <div class="sub">${fmtPace(_pace(b))}/km · ${fmtNum(b.k,1)} km</div>
      <div class="d">${b.d} <span class="drillcue">→</span></div></div>`;
  }).filter(Boolean).join("");
  const rows=sorted.map(r=>
    `<tr class="clk" ${focusAttrs(r.d,r.d,rowId(r),raceName(r))}>
      <td>${r.d}</td><td>${escapeHTML(raceName(r))}</td>
      <td class="num">${fmtNum(r.k,1)}</td><td class="num">${fmtDur(r.t)}</td>
      <td class="num">${fmtPace(_pace(r))}</td></tr>`
  ).join("");

function perfEra(){

    <div class="note-sm">Mike's all-time bests nearly all come from his 20s–30s, which buries what he ran later. Splitting records by era shows his best at every stage of life. Distance records are <b>race-day</b> bests (“—” = he didn't race that distance in the era); <b>longest run</b> counts any run.</div></div>`;

    const eraRaces=bl.rows.filter(isRace);
    const bandBest=(lo,hi)=>{ const c=eraRaces.filter(r=>r.k>=lo&&r.k<=hi&&_pace(r)>=3&&_pace(r)<=10); return c.length?c.reduce((x,y)=>y.t<x.t?y:x):null; };
    const raceSane=eraRaces.filter(r=>_pace(r)>=3&&_pace(r)<=10);
    const fastest=raceSane.length?raceSane.reduce((a,b)=>_pace(b)<_pace(a)?b:a):null;
    const longest=bl.rows.reduce((a,b)=>(b.k||0)>(a.k||0)?b:a);
    const rec=(l,v,sub,row)=> row?`<div class="erarec clk" ${focusAttrs(row.d,row.d,rowId(row),l)}><span class="el">${l}</span><span class="ev">${v}</span><span class="es">${sub}</span></div>`
                                 :`<div class="erarec"><span class="el">${l}</span><span class="ev muted">—</span><span class="es"></span></div>`;
    return `<div class="card eracard">
      <div class="cardhead" style="justify-content:space-between"><h3 style="margin:0">${bl.s}${eraSize>1?"–"+bl.e:""}</h3>
        <span class="muted">${bl.rows.length} runs · ${eraRaces.length} races</span></div>
      <div class="erarecs">
        ${RACE_BANDS.map(([n,D,lo,hi])=>{ const b=bandBest(lo,hi); return b?rec(n,fmtDur(b.t),fmtPace(_pace(b))+"/km · "+b.d,b):rec(n,"—","",null); }).join("")}
        ${rec("Fastest race pace",fastest?fmtPace(_pace(fastest))+"/km":"—",fastest?fmtNum(fastest.k,1)+" km · "+fastest.d:"",fastest)}
        ${rec("Longest run",longest.k?fmtNum(longest.k,1)+" km":"—",longest.d||"",longest.k?longest:null)}

  return toggle+`<div class="eragrid">${cards}</div>`;
}

//============================================================ RECORDS / BADGES / MILESTONES
// The source has some mis-parsed times (impossible paces/speeds), so pace/speed
// records use sanity guards; raw distance/duration records don't need them.
const _pace = r => (r.t/60)/r.k;          // min/km
const _kmh  = r => r.k/(r.t/3600);        // km/h
const _per100 = r => r.t/(r.k*10);        // sec/100 m
// 3:20/km (3.333 min/km) floor: a few runs carry a mis-keyed distance or time that
// yields an impossible pace — faster than any race Mike has ever run (his 5 K PR is
// 17:33, a 3:30/km pace). An earlier 3:00 floor still let a couple slip through (an
// 8.5 km "run" at 3:01/km, a 16 km at 3:16/km) and they surfaced as bogus 5 K / 10 K
// records. These impossible-pace log entries are catalogued for Mike to correct at
// source in source/mike-review.md (Batch 4).
const saneRun  = r => r.s==="run"  && r.t>0 && r.k>0 && _pace(r)>=3.333 && _pace(r)<=10;
const saneBike = r => r.s==="bike" && r.t>0 && r.k>0 && _kmh(r)>=8  && _kmh(r)<=55;
const saneSwim = r => r.s==="swim" && r.t>0 && r.k>0 && _per100(r)>=55 && _per100(r)<=200;
const dayNum = ds => Math.floor(Date.parse(ds+"T00:00:00Z")/864e5);

// Physically-impossible bands. An entry whose recorded time + distance imply a
// speed/pace no human sustains is almost always a parse artifact — an H:MM time
// read as M:SS (~60× too short), two numbers merged into one distance, or an
// interval split read as a distance. These bands are wider than the sane*
// record bands on purpose: sane* decides what may set a record; these flag near-
// certain DATA ERRORS for review, so each edge sits past what's humanly possible
// rather than merely fast/slow. Powers the Data QA "Outliers" validation view —
// the systematic version of eyeballing the Records page for a bogus best.
const OUTLIER = {
  bikeKmhMax:   60,    // >60 km/h average: duration too short, or two distances summed
  runPaceMin:   3.333, // <3:20/km: quicker than Mike's fastest race pace (5K PR is 3:30/km)
  swimPer100Min:45,    // <0:45/100m: faster than a 100 m sprint world record, held all set
  swimPer100Max:300,   // >5:00/100m: distance mis-read tiny (e.g. a pull set counted as 0.03 km)
};
// Return {kind,value,sev,why} if r is physically impossible, else null. sev is a
// >1 severity ratio (how far past the limit) so different sports sort together.
function outlierInfo(r){
  if(!(r.t>0&&r.k>0)) return null;
  if(r.s==="bike"){ const v=_kmh(r);
    if(v>OUTLIER.bikeKmhMax) return {kind:"bike speed",value:v.toFixed(1)+" km/h",sev:v/OUTLIER.bikeKmhMax,why:`implied average speed exceeds ${OUTLIER.bikeKmhMax} km/h — the duration is likely an H:MM time read as M:SS, or two rides summed into one distance`}; }
  else if(r.s==="run"){ const p=_pace(r);
    if(p<OUTLIER.runPaceMin) return {kind:"run pace",value:fmtPace(p)+" /km",sev:OUTLIER.runPaceMin/p,why:"faster than 3:20/km — quicker than any race Mike has run, so the distance or time is mis-keyed"}; }
  else if(r.s==="swim"){ const p=_per100(r);
    if(p<OUTLIER.swimPer100Min) return {kind:"swim pace",value:fmtMMSS(p)+" /100m",sev:OUTLIER.swimPer100Min/p,why:"faster than a 100 m world-record sprint, held for the whole set — distance likely doubled"};
    if(p>OUTLIER.swimPer100Max) return {kind:"swim pace",value:fmtMMSS(p)+" /100m",sev:p/OUTLIER.swimPer100Max,why:"slower than 5:00/100m — the distance was mis-read far too small (e.g. a pull set counted as a few lengths)"}; }
  return null;
}

const RACE_DISTS = [["5K",5],["10K",10],["Half",21.0975],["Marathon",42.195]];
// Best avg pace over runs that covered at least each distance → an estimated time.
function distancePRs(rows){
  const runs=rows.filter(saneRun), out=[];
  for(const [name,D] of RACE_DISTS){
    const c=runs.filter(r=>r.k>=D-0.05); if(!c.length) continue;
    let b=c[0]; for(const r of c) if(_pace(r)<_pace(b)) b=r;
    out.push({name,D,row:b,sec:_pace(b)*60*D});
  }
  return out;
}
function streakInfo(rows){
  const days=[...new Set(rows.map(r=>r.d))].sort();
  let longest=0,cur=0,prev=null,curStart=null,bestStart=null,bestEnd=null;
  for(const ds of days){ const n=dayNum(ds);
    if(prev!==null&&n===prev+1){cur++;} else {cur=1;curStart=ds;}
    if(cur>longest){longest=cur;bestStart=curStart;bestEnd=ds;}
    prev=n;
  }
  let gap=0; for(let i=1;i<days.length;i++){const g=dayNum(days[i])-dayNum(days[i-1]); if(g>gap)gap=g;}
  return {longest,start:bestStart,end:bestEnd,gap,activeDays:days.length};
}
function dailyMap(rows){ const m={}; for(const r of rows){ const o=m[r.d]||(m[r.d]={k:0,c:0,dur:0}); o.c++; if(r.k)o.k+=r.k; if(r.t)o.dur+=r.t; } return m; }
// Max total over any rolling N-day window (key "k" distance or "c" sessions).
function rollingMax(rows,key,win){
  const m=dailyMap(rows), days=Object.keys(m).sort(); if(!days.length) return null;
  const dn=days.map(dayNum); let best=0,bestEnd=null,lo=0,sum=0;
  for(let hi=0;hi<days.length;hi++){
    sum+=m[days[hi]][key];
    while(dn[hi]-dn[lo]>win-1){ sum-=m[days[lo]][key]; lo++; }
    if(sum>best){best=sum;bestEnd=days[hi];}
  }
  return {val:best,end:bestEnd};
}
function monthMax(rows,key){ const m={}; for(const r of rows){ const k=r.d.slice(0,7); m[k]=(m[k]||0)+(key==="k"?(r.k||0):1);} let bk=null; for(const k in m) if(bk===null||m[k]>m[bk])bk=k; return bk?{val:m[bk],ym:bk}:null; }
function distMilestones(rows,thresholds){
  const rs=rows.filter(r=>r.k>0).slice().sort((a,b)=>a.d<b.d?-1:1);
  let cum=0,ti=0; const out=[];
  for(const r of rs){ cum+=r.k; while(ti<thresholds.length&&cum>=thresholds[ti]){ out.push({km:thresholds[ti],date:r.d}); ti++; } }
  return out;
}
// Riegel race-time projection from the fastest recent run (last ~2 years of data).
function predictRaces(rows){
  const sane=rows.filter(r=>saneRun(r)&&r.k>=3); if(!sane.length) return null;
  const latest=sane.reduce((a,b)=>a.d>b.d?a:b).d;
  const cut=new Date(latest+"T00:00:00Z"); cut.setUTCFullYear(cut.getUTCFullYear()-2);
  const cutS=cut.toISOString().slice(0,10);
  let pool=sane.filter(r=>r.d>=cutS&&r.k>=5);
  if(!pool.length) pool=sane.filter(r=>r.k>=5);
  if(!pool.length) pool=sane;
  let basis=pool[0]; for(const r of pool) if(_pace(r)<_pace(basis)) basis=r;
  return {basis, preds:RACE_DISTS.map(([n,D])=>({n,D,sec:basis.t*Math.pow(D/basis.k,1.06)}))};
}
function buildBadges(rows,prs){

function buildMilestones(rows){
  const sorted=rows.slice().sort((a,b)=>a.d<b.d?-1:1); if(!sorted.length) return [];
  const ev=[{date:sorted[0].d,ic:"🎉",text:`First logged workout — ${sportName(sorted[0].s)}`}];
  const firstOf=(s,text,ic)=>{ const r=sorted.find(x=>x.s===s); if(r) ev.push({date:r.d,ic,text}); };
  firstOf("run","First run","🏃"); firstOf("bike","First ride","🚴"); firstOf("swim","First swim","🏊");
  const f10=sorted.find(r=>r.s==="run"&&r.k>=10); if(f10) ev.push({date:f10.d,ic:"🏃",text:"First 10 km run"});
  const fM=sorted.find(r=>r.s==="run"&&r.k>=42.195); if(fM) ev.push({date:fM.d,ic:"🏅",text:"First marathon-distance run"});
  const fC=sorted.find(r=>r.s==="bike"&&r.k>=100); if(fC) ev.push({date:fC.d,ic:"💯",text:"First 100 km ride"});
  for(const m of distMilestones(rows,[1000,5000,10000,25000,50000,75000,100000,150000,200000]))
    ev.push({date:m.date,ic:"📍",text:`${fmtNum(m.km)} km lifetime total reached`});
  const st=streakInfo(rows); if(st.longest>=7&&st.start) ev.push({date:st.start,ic:"🔥",text:`Longest streak begins — ${st.longest} days straight (through ${st.end})`});
  ev.push({date:sorted[sorted.length-1].d,ic:"⏱️",text:`Most recent workout — ${sportName(sorted[sorted.length-1].s)}`});
  return ev.sort((a,b)=>a.date<b.date?-1:1);
}
function renderRecords(app){
  // Drop interval-artifact "ultras": "8x400on77 7" parsed the rep split (77) as a
  // 77 km distance. Real long runs record a duration, so a >60 km run with no time
  // is a parse error, not an ultramarathon.
  const rows=filtered(DATA).filter(r=>r.s!=="note").filter(r=>!(r.s==="run"&&r.k>60&&!r.t));
  const recs=[], prs=distancePRs(rows);
  for(const p of prs) recs.push({v:fmtDur(Math.round(p.sec)),l:p.name,sub:fmtPace(_pace(p.row))+"/km · "+fmtNum(p.row.k,1)+" km",d:p.row.d,nav:entryNav(p.row,p.name+" PR")});
  const longestBy=pred=>{ const a=rows.filter(pred); return a.length?a.reduce((x,y)=>(y.k||0)>(x.k||0)?y:x):null; };
  const lr=longestBy(r=>r.s==="run"&&r.k>0), lb=longestBy(r=>r.s==="bike"&&r.k>0), lsw=longestBy(r=>r.s==="swim"&&r.k>0);
  if(lr) recs.push({v:fmtNum(lr.k,1)+" km",l:"Longest run",sub:lr.t?fmtDurShort(lr.t):"",d:lr.d,nav:entryNav(lr,"Longest run")});
  if(lb) recs.push({v:fmtNum(lb.k,1)+" km",l:"Longest ride",sub:lb.t?fmtDurShort(lb.t):"",d:lb.d,nav:entryNav(lb,"Longest ride")});
  if(lsw) recs.push({v:fmtNum(lsw.k,2)+" km",l:"Longest swim",sub:lsw.t?fmtDurShort(lsw.t):"",d:lsw.d,nav:entryNav(lsw,"Longest swim")});
  const ride40=rows.filter(r=>saneBike(r)&&r.k>=40);
  if(ride40.length){ const b=ride40.reduce((x,y)=>_kmh(y)>_kmh(x)?y:x); recs.push({v:_kmh(b).toFixed(1)+" km/h",l:"Fastest 40K+ ride",sub:fmtNum(b.k,1)+" km",d:b.d,nav:entryNav(b,"Fastest 40K+ ride")}); }
  const sw=rows.filter(saneSwim);
  if(sw.length){ const b=sw.reduce((x,y)=>_per100(y)<_per100(x)?y:x); recs.push({v:fmtMMSS(_per100(b))+"/100m",l:"Best swim pace",sub:fmtNum(b.k,2)+" km",d:b.d,nav:entryNav(b,"Best swim pace")}); }
  const timed=rows.filter(r=>r.t>0);
  if(timed.length){ const b=timed.reduce((x,y)=>y.t>x.t?y:x); recs.push({v:fmtDurShort(b.t),l:"Longest session",sub:sportName(b.s),d:b.d,nav:entryNav(b,"Longest session")}); }
  const dm=dailyMap(rows); let bd=null; for(const d in dm) if(!bd||dm[d].k>dm[bd].k)bd=d;
  if(bd&&dm[bd].k>0) recs.push({v:fmtNum(dm[bd].k,1)+" km",l:"Biggest day",d:bd,nav:rangeNav(bd,bd,"Biggest day")});
  const wk=rollingMax(rows,"k",7); if(wk&&wk.val>0) recs.push({v:fmtNum(Math.round(wk.val))+" km",l:"Biggest week",d:"week to "+wk.end,nav:rangeNav(addDays(wk.end,-6),wk.end,"Biggest week (7 days to "+wk.end+")")});
  const mo=monthMax(rows,"k"); if(mo&&mo.val>0){ const[mf,mt]=monthRange(mo.ym); recs.push({v:fmtNum(Math.round(mo.val))+" km",l:"Biggest month",d:MONTHS[+mo.ym.slice(5,7)-1]+" "+mo.ym.slice(0,4),nav:rangeNav(mf,mt,"Biggest month ("+MONTHS[+mo.ym.slice(5,7)-1]+" "+mo.ym.slice(0,4)+")")}); }
  // Biggest year — most distance logged in a calendar year (volume: sits with day/week/month).
  const yearKm={}; for(const r of rows) if(r.k>0){ const y=r.d.slice(0,4); yearKm[y]=(yearKm[y]||0)+r.k; }
  { let by=null; for(const y in yearKm) if(by===null||yearKm[y]>yearKm[by]) by=y;
    if(by) recs.push({v:fmtNum(Math.round(yearKm[by]))+" km",l:"Biggest year",d:by,nav:rangeNav(by+"-01-01",by+"-12-31","Biggest year ("+by+")")}); }
  const wkc=rollingMax(rows,"c",7); if(wkc&&wkc.val>0) recs.push({v:wkc.val+" sessions",l:"Most in a week",d:"week to "+wkc.end,nav:rangeNav(addDays(wkc.end,-6),wkc.end,"Most sessions in a week (7 days to "+wkc.end+")")});
  // Most in a day — busiest single day by session count (sits with most-in-a-week).
  { let bday=null; for(const d in dm) if(bday===null||dm[d].c>dm[bday].c) bday=d;
    if(bday&&dm[bday].c>1) recs.push({v:dm[bday].c+" sessions",l:"Most in a day",d:bday,nav:rangeNav(bday,bday,"Most sessions in a day ("+bday+")")}); }
  // Most active year — most distinct days trained in a calendar year (consistency).
  const yearDays={}; for(const r of rows){ const y=r.d.slice(0,4); (yearDays[y]||(yearDays[y]=new Set())).add(r.d); }
  { let by=null; for(const y in yearDays) if(by===null||yearDays[y].size>yearDays[by].size) by=y;
    if(by) recs.push({v:yearDays[by].size+" days",l:"Most active year",sub:"days trained",d:by,nav:rangeNav(by+"-01-01",by+"-12-31","Most active year ("+by+")")}); }
  // Longest streak — most consecutive calendar days trained (consistency).
  const stk=streakInfo(rows);
  if(stk.longest>1&&stk.start) recs.push({v:stk.longest+" days",l:"Longest streak",sub:"consecutive days",d:"through "+stk.end,nav:rangeNav(stk.start,stk.end,"Longest streak — "+stk.longest+" days")});
  // Most sports in a day — biggest single-day variety (a multi-sport / brick day).
  const daySports={}; for(const r of rows){ (daySports[r.d]||(daySports[r.d]=new Set())).add(r.s); }
  { let bs=null; for(const d in daySports) if(bs===null||daySports[d].size>daySports[bs].size) bs=d;
    if(bs&&daySports[bs].size>1) recs.push({v:daySports[bs].size+" sports",l:"Most sports in a day",sub:[...daySports[bs]].map(sportName).join(", "),d:bs,nav:rangeNav(bs,bs,"Most sports in a day ("+bs+")")}); }
  // Fastest century ride — fastest 100 km+ ride (renders only if such a ride exists).
  const century=rows.filter(r=>saneBike(r)&&r.k>=100);
  if(century.length){ const cb=century.reduce((x,y)=>_kmh(y)>_kmh(x)?y:x); recs.push({v:_kmh(cb).toFixed(1)+" km/h",l:"Fastest century ride",sub:fmtNum(cb.k,1)+" km",d:cb.d,nav:entryNav(cb,"Fastest century ride")}); }

  const recCards=recs.length?recs.map(r=>{
    const a=r.nav?` ${focusAttrs(r.nav.from,r.nav.to,r.nav.idx,r.nav.label)}`:"";
    return `<div class="card stat rec${r.nav?" clk":""}"${a}><div class="l">${r.l}</div><div class="v">${r.v}</div>${r.sub?`<div class="sub">${r.sub}</div>`:""}<div class="d">${r.d}${r.nav?' <span class="drillcue">→</span>':""}</div></div>`;
  }).join(""):`<div class="muted">No records in this range.</div>`;
  const pred=predictRaces(rows);
  const predHtml=pred?`<div class="card" style="margin-top:18px"><h3>Predicted race times</h3>
     <div class="grid recgrid">${pred.preds.map(p=>`<div class="card stat rec"><div class="l">${p.n}</div><div class="v">${fmtDur(Math.round(p.sec))}</div></div>`).join("")}</div>
     <div class="note-sm">Riegel projection from your fastest recent run: ${fmtNum(pred.basis.k,1)} km @ ${fmtPace(_pace(pred.basis))}/km (<span class="clk" style="text-decoration:underline;text-decoration-style:dotted;cursor:pointer" ${focusAttrs(pred.basis.d,pred.basis.d,rowId(pred.basis),"Race-prediction basis run")}>${pred.basis.d}</span>). An estimate, not a guarantee.</div></div>`:"";
  const badges=buildBadges(rows,prs);
  // Only show genuinely earned achievements — no greyed-out "unearned" ones.
  const earnedBadges=badges.filter(b=>b.earned);
  const badgeHtml=`<h3 style="margin-top:22px">Achievements <span class="muted" style="font-weight:600;text-transform:none;letter-spacing:0">· ${earnedBadges.length} unlocked</span></h3>
     <div class="grid badges">${earnedBadges.map(b=>`<div class="card badge earned"><div class="bic">${b.ic}</div><div class="bn">${b.name}</div><div class="bd">${b.detail||"Unlocked"}</div></div>`).join("")}</div>`;
  const mileHtml=`<h3 style="margin-top:22px">Milestones</h3><div class="card"><div class="tl">${buildMilestones(rows).map(e=>`<div class="ev"><div class="dt">${e.date}</div><div class="tx"><span class="ic">${e.ic}</span>${e.text}</div></div>`).join("")}</div></div>`;

  app.innerHTML=`<h2 class="section">Records &amp; Achievements</h2>${filterBar()}
    <h3>Personal records</h3><div class="grid recgrid">${recCards}</div>
    ${predHtml}${badgeHtml}${mileHtml}`;
  wireFilter();
}

   <div class="grid stat-row" style="margin:16px 0">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">Workouts</div><div class="note-sm">${delta(a.count,pa.count)}</div></div>
     <div class="card stat"><div class="num">${fmtNum(Math.round(a.dist))}</div><div class="lbl">Total km</div><div class="note-sm">${delta(a.dist,pa.dist)}</div></div>
     <div class="card stat"><div class="num">${fmtNum(Math.round(hours))}</div><div class="lbl">Hours</div><div class="note-sm">${delta(hours,phours)}</div></div>
     <div class="card stat"><div class="num">${st.longest}</div><div class="lbl">Best streak (days)</div></div>
   </div>
   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(230px,1fr))">
     ${topSport?`<div class="card"><h3>Top sport</h3><div class="factnum">${sportMark(topSport)} ${sportName(topSport)}</div><div class="factsub">${fmtNum(sp[topSport].c)} sessions · ${fmtDurShort(sp[topSport].dur)}</div></div>`:""}
     ${bd&&dm[bd].k>0?`<div class="card clk" ${focusAttrs(bd,bd,null,"Biggest day of "+y)}><h3>Biggest day</h3><div class="factnum">${fmtNum(dm[bd].k,1)} km</div><div class="factsub">${bd} <span class="drillcue">→</span></div></div>`:""}
     ${ls?`<div class="card clk" ${focusAttrs(ls.d,ls.d,rowId(ls),"Longest session of "+y)}><h3>Longest session</h3><div class="factnum">${fmtDurShort(ls.t)}</div><div class="factsub">${sportName(ls.s)} · ${ls.d} <span class="drillcue">→</span></div></div>`:""}
     ${bm!=null?(()=>{const[bmf,bmt]=monthRange(y+"-"+String(bm+1).padStart(2,"0"));return `<div class="card clk" ${focusAttrs(bmf,bmt,null,"Busiest month ("+MONTHS[bm]+" "+y+")")}><h3>Busiest month</h3><div class="factnum">${MONTHS[bm]}</div><div class="factsub">${mc[bm]} sessions <span class="drillcue">→</span></div></div>`;})():""}
     <div class="card"><h3>Personal records set</h3><div class="factnum">${prsThisYear.length}</div><div class="factsub">${prsThisYear.length?prsThisYear.map(p=>p.name).join(", "):"No new distance PRs this year"}</div></div>
