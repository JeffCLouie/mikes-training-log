<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Mike's Training Log</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161d26; --panel2:#1d2733; --line:#283546;
    --text:#e7edf3; --muted:#8aa0b5; --accent:#36c2a8; --accent2:#4d9fff;
    --shadow:0 2px 14px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent2);text-decoration:none}
  header.top{
    position:sticky;top:0;z-index:30;background:rgba(15,20,25,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  }
  .top-inner{max-width:1180px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{font-weight:700;font-size:18px;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:9px;flex:1;text-align:center}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
  nav.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
  nav.tabs button{
    background:transparent;border:1px solid transparent;color:var(--muted);
    padding:7px 13px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;
  }
  nav.tabs button:hover{color:var(--text);background:var(--panel)}
  nav.tabs button.active{color:var(--text);background:var(--panel2);border-color:var(--line)}
  main{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
  h2.section{font-size:20px;margin:6px 0 16px;font-weight:700}
  h3{font-size:15px;margin:0 0 10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .muted{color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:14px}
  .stat-row{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .stat .num{font-size:26px;font-weight:800;letter-spacing:.4px}
  .stat .lbl{color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .sportcards{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  .sportcard{display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:transform .08s,border-color .12s}
  .sportcard:hover{transform:translateY(-2px);border-color:var(--accent)}
  .sportcard .head{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .chip{width:13px;height:13px;border-radius:4px;flex:none}
  .sportcard .kv{display:flex;justify-content:space-between;font-size:13px}
  .sportcard .kv span:first-child{color:var(--muted)}
  /* controls */
  label.fld{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--muted);font-weight:600}
  select,input[type=text],input[type=number],input[type=date]{
    background:var(--panel2);border:1px solid var(--line);color:var(--text);
    padding:8px 10px;border-radius:9px;font-size:14px;font-family:inherit;width:100%;
  }
  select:focus,input:focus{outline:none;border-color:var(--accent)}
  .btn{background:var(--accent);color:#04201a;border:none;padding:9px 16px;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn:hover{filter:brightness(1.07)}
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .controls .fld{min-width:120px;flex:1}
  /* table */
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;user-select:none;background:var(--panel)}
  /* Sticky header for every table. .tablewrap is the scroll context (it has a
     max-height), so the header pins to the top of the table's own scroll area —
     top:0, not the viewport. The old top:54px assumed the page was the scroller,
     so inside the overflow:auto wrapper it floated 54px down over the rows. */
  .tablewrap th{position:sticky;top:0;z-index:2;box-shadow:inset 0 -1px 0 var(--line)}
  #x-table th{cursor:pointer}
  th.sortable:hover{color:var(--text)}
  tbody tr:hover{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow:auto;max-height:72vh;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  .sportlabel{display:inline-flex;align-items:center;gap:7px}
  .ic{font-size:14px;line-height:1;width:18px;text-align:center;flex:none;filter:saturate(.9)}
  .sportcard .head .ic{font-size:20px;width:24px}
  .pill{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .pill.d{color:#e0b15a;border-color:#5a4a26}
  .pill.u{color:#d98b8b;border-color:#5a3030}
  /* chart */
  .chartwrap{display:flex;gap:8px;align-items:flex-start;padding-top:15px;position:relative}
  .yunit{position:absolute;top:0;left:0;font-size:9px;color:var(--muted);line-height:1;letter-spacing:.3px}
  .yaxis{position:relative;width:34px;height:200px;flex:none}
  .yaxis span{position:absolute;right:0;bottom:0;transform:translateY(50%);font-size:10.5px;color:var(--muted);white-space:nowrap;line-height:1;font-variant-numeric:tabular-nums}
  .plot{flex:1;min-width:0}
  .chart{position:relative;display:flex;align-items:flex-end;gap:3px;height:200px}
  .gline{position:absolute;left:0;right:0;height:1px;background:var(--line);opacity:.45;pointer-events:none}
  .gline.base{opacity:.85}
  .bar{flex:1;background:linear-gradient(var(--accent),#1d6e60);border-radius:4px 4px 0 0;min-height:2px;position:relative;z-index:1;cursor:pointer;transition:opacity .1s}
  .bar:hover{opacity:.8}
  /* Lift the active bar (and its tooltip) above later sibling bars, which each
     create their own stacking context via z-index:1 and would otherwise clip it. */
  .bar:hover,.bar.show{z-index:6}
  .bar .val{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;pointer-events:none;transition:opacity .1s}
  .bar:hover .val{opacity:0}
  .bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;white-space:nowrap;margin-bottom:4px;z-index:5}
  .bar:hover .tip{display:block}
  .bar.show .tip{display:block}            /* tap-to-pin on touch devices */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:auto}
  .seg button{background:var(--panel2);color:var(--muted);border:none;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button+button{border-left:1px solid var(--line)}
  .seg button.on{background:var(--accent);color:#04201a}
  .cardhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .cardhead h3{margin:0}
  .xlab{position:relative;height:15px;margin-top:7px}
  .xlab span{position:absolute;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap}
  /* compact SVG line chart (y-axis fitted to the data range, not forced to 0) */
  .linechart{width:100%;height:auto;display:block;overflow:visible}
  .lc-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .lc-area{fill:rgba(54,194,168,.12);stroke:none}
  .lc-dot{fill:var(--accent)}
  .lc-grid{stroke:var(--line);stroke-width:1}
  .lc-ax{fill:var(--muted);font-size:10px}
  /* insights: fun-fact callouts */
  .facts{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
  .fact{display:flex;gap:12px;align-items:center}
  .fact .big{font-size:22px;line-height:1}
  .fact .ftxt b{display:block;font-size:17px;font-weight:800}
  .fact .ftxt span{color:var(--muted);font-size:12.5px}
  /* insights: activity heatmap (GitHub-style) */
  .hm-box{position:relative}
  /* Year follows the scroll: pinned badge showing the year currently in view. */
  .hm-scroll{overflow-x:auto;padding-bottom:4px;scroll-behavior:smooth}
  .hm-months{display:flex;gap:3px;margin-bottom:4px;font-size:10px;color:var(--muted);height:15px}
  .hm-mlabel{width:16px;flex:none;white-space:nowrap;overflow:visible}
  .hm{display:flex;gap:3px}
  .hm-week{display:flex;flex-direction:column;gap:3px;flex:none}
  .hm-cell{width:16px;height:16px;border-radius:3px;background:var(--panel2)}
  .hm-cell[data-d]{cursor:pointer}
  .hm-cell[data-d]:hover{outline:2px solid var(--text);outline-offset:-1px}
  .hm-legend{display:flex;flex-wrap:wrap;align-items:center;gap:6px 6px;margin-top:9px;font-size:11.5px;color:var(--muted)}
  .hm-legend .hm-cell{width:12px;height:12px}
  /* day-detail overlay (tap a calendar square) */
  .overlay{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.55);backdrop-filter:blur(2px)}
  .overlay.show{display:flex}
  .day-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:15px 17px;width:100%;max-width:420px;max-height:80vh;overflow:auto}
  .day-x{background:var(--panel2);border:1px solid var(--line);color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;line-height:1;flex:none}
  .day-tot{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 4px;font-size:12.5px;color:var(--muted)}
  .day-tot b{color:var(--text);font-weight:700}
  /* insights: shoe leaderboard */
  .shoebar{display:grid;grid-template-columns:1fr;gap:7px}
  .shoe{display:flex;align-items:center;gap:10px;font-size:13px}
  .shoe .nm{width:120px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .shoe .track{flex:1;background:var(--panel2);border-radius:6px;height:16px;overflow:hidden;min-width:60px}
  .shoe .fill{display:block;height:100%;min-width:3px;background:linear-gradient(90deg,#1d6e60,var(--accent));border-radius:6px}
  .shoe .km{width:74px;flex:none;text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12.5px}
  .legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .checks label{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text)}
  .checks input{accent-color:var(--accent)}
  .row-detail{background:var(--panel2)!important}
  .row-detail td{white-space:normal;padding:14px 16px}
  .kvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px 18px}
  .kvgrid div{font-size:13px}
  .kvgrid b{color:var(--muted);font-weight:600;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .rawbox{font-family:ui-monospace,Menlo,Consolas,monospace;background:#0c1116;border:1px solid var(--line);padding:9px 12px;border-radius:8px;margin-top:10px;font-size:12.5px;color:#bcd}
  .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:14px}
  .pager button{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer}
  .pager button:disabled{opacity:.4;cursor:default}
  .hidden{display:none!important}
  .loading{text-align:center;padding:80px 0;color:var(--muted)}
  .matrix td.num{cursor:default}
  .matrix tr:hover td{background:var(--panel2)}
  .note-sm{font-size:12px;color:var(--muted);margin-top:4px}
  /* calendar heatmap */
  .cal-wrap{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .cal-inner{display:inline-block;min-width:max-content}
  .cal-months{display:flex;gap:2px;margin:0 0 4px 0;height:13px}
  .cal-months span{width:13px;flex:none;font-size:10px;color:var(--muted);white-space:nowrap;overflow:visible}
  .cal{display:flex;gap:2px}
  .cal-col{display:flex;flex-direction:column;gap:2px}
  .cal-cell{width:13px;height:13px;border-radius:3px;background:var(--panel2);flex:none}
  .cal-cell[data-d]{cursor:pointer}
  .cal-cell[data-d]:hover{outline:2px solid var(--text);outline-offset:-1px}
  .cal-cell.sel{outline:2px solid var(--accent);outline-offset:-1px}
  .cal-legend{display:flex;align-items:center;gap:6px 14px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .cal-legend .chip{width:11px;height:11px;border-radius:3px}
  .cal-detail{margin-top:12px}
  .cal-detail .e{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--line);font-size:13px;flex-wrap:wrap}
  .cal-detail .e .meta{color:var(--muted)}
  .factnum{font-size:24px;font-weight:800}
  .factsub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .wd-bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:6px}
  .wd-bars .wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end;height:100%}
  .wd-bars .wd .b{width:60%;background:linear-gradient(var(--accent),#1d6e60);border-radius:4px 4px 0 0;min-height:2px}
  .wd-bars .wd .l{font-size:11px;color:var(--muted)}
  @media(max-width:640px){
    th{position:static}
    .top-inner{padding:10px 12px}
    main{padding:9px 11px 56px}
    h2.section{font-size:16px;margin:2px 0 8px}
    h3{font-size:13px;margin-bottom:8px}
    .grid{gap:9px}
    .card{padding:11px 12px;border-radius:11px}
    /* Stat tiles: keep all 4–5 on ONE row instead of wrapping to "one and a
       bit". Force a single row of equal columns and shrink the numbers/padding
       so even long values (135,560) fit a narrow phone. */
    .stat-row{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);gap:7px}
    .stat-row .card{padding:10px 9px}
    .stat .num{font-size:16px;letter-spacing:.2px}
    .stat .lbl{font-size:9.5px;margin-top:1px;letter-spacing:.3px}
    /* Sport tiles: 2 per row and tighter. */
    .sportcards{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    .sportcard{gap:4px}
    .sportcard .head{font-size:13.5px;gap:7px}
    .sportcard .kv{font-size:12px}
    /* Denser data tables. */
    table{font-size:12.5px}
    th,td{padding:6px 8px}
    /* Slimmer chart y-axis + value labels so bars keep room on phones. */
    .chartwrap{gap:5px}
    .yaxis{width:24px}
    .yaxis span{font-size:9px}
    .bar .val{font-size:8.5px}
    /* Reports/year pages: trim the stacked header + controls + stat-tile
       margins so the chart and table reach the viewport sooner. */
    .controls{margin-bottom:10px!important;padding:10px 11px}
    .stat-row{margin-bottom:10px!important}
    .cardhead{margin-bottom:9px!important}
    .stat{padding:9px 10px}
  }

  /* ============================================================
     iPhone / touch UX layer (kept last so these rules win)
     ============================================================ */
  *{-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  header.top{padding-top:env(safe-area-inset-top)}
  .tablewrap{-webkit-overflow-scrolling:touch}
  /* Bottom tab bar: hidden on desktop, shown on phones. */
  .bottomnav{display:none}

  @media(max-width:640px){
    /* Move primary navigation to a fixed, thumb-reachable bottom bar. */
    nav.tabs{display:none}
    .bottomnav{
      display:flex;position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:rgba(16,21,28,.97);backdrop-filter:blur(12px);
      border-top:1px solid var(--line);
      padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    }
    .bottomnav button{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      background:none;border:none;color:var(--muted);
      font-size:10px;font-weight:600;line-height:1;padding:6px 2px;
      cursor:pointer;min-height:46px;
    }
    .bottomnav button svg{width:23px;height:23px;stroke:currentColor;fill:none;
      stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
    .bottomnav button.active{color:var(--accent)}
    .bottomnav button:active{opacity:.55}
    /* Keep content clear of the fixed bottom bar. */
    main{padding-bottom:calc(74px + env(safe-area-inset-bottom))}

    /* Bigger, zoom-proof controls — iOS Safari zooms inputs under 16px on focus. */
    select,input[type=text],input[type=number],input[type=date]{font-size:16px;padding:10px 12px}
    .btn{font-size:15px;padding:11px 16px}
    .seg button{padding:9px 9px;font-size:12px}
    .pager button{padding:9px 16px;font-size:14px}
    .checks label{padding:8px 11px;font-size:13.5px}

    /* Touch feedback in place of hover. */
    .sportcard:active{transform:scale(.985);border-color:var(--accent)}
    tbody tr:active{background:var(--panel2)}
    .btn:active{filter:brightness(.92)}

    /* Raw Data: show only the essentials and let a tap reveal the rest.
       Cols: 1 Date 2 Sport 3 Duration 4 Distance 5 Pace 6 HR 7 Source 8 Conf 9 Notes */
    #x-table th:nth-child(n+5):nth-child(-n+8),
    #x-table td:nth-child(n+5):nth-child(-n+8){display:none}
    #x-table td:nth-child(9){max-width:40vw;overflow:hidden;text-overflow:ellipsis}
    #x-count::after{content:" · tap any row for full details";color:var(--muted)}
  }

  /* ============================================================
     QOL: site-wide navigation & polish
     ============================================================ */
  html{scroll-behavior:smooth}
  h2.section{scroll-margin-top:64px}
  .brand{cursor:pointer}
  ::selection{background:rgba(54,194,168,.32)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* Back-to-top: appears after scrolling; clears the mobile bottom bar. */
  #toTop{
    position:fixed;right:16px;bottom:18px;width:42px;height:42px;border-radius:50%;
    z-index:55;background:var(--accent);color:#04201a;border:none;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.45);
    display:flex;align-items:center;justify-content:center;
    opacity:0;visibility:hidden;transform:translateY(8px);
    transition:opacity .18s,transform .18s,visibility .18s;
    -webkit-tap-highlight-color:transparent;
  }
  #toTop.show{opacity:1;visibility:visible;transform:none}
  #toTop:active{filter:brightness(.92)}
  #toTop svg{width:22px;height:22px;stroke:#04201a;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  @media(max-width:640px){ #toTop{bottom:calc(70px + env(safe-area-inset-bottom));width:40px;height:40px} }
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">Mike's Training Log</div>
    <nav class="tabs" id="tabs"></nav>
  </div>
</header>
<main id="app"><div class="loading">Loading training data…</div></main>
<nav class="bottomnav" id="bottomnav"></nav>

<script>
//============================================================ data + config
const SPORTS = {
  run:        {name:"Run",          color:"#4d9fff", metric:"pace",     icon:"🏃"},
  bike:       {name:"Bike",         color:"#36c2a8", metric:"speed",    icon:"🚴"},
  fb:         {name:"Fat bike",     color:"#3fb5c9", metric:"speed",    icon:"🚵"},
  swim:       {name:"Swim",         color:"#7c5cff", metric:"swimpace", icon:"🏊"},
  hockey:     {name:"Hockey",       color:"#ff7a59", metric:"time",     icon:"🏒"},
  karate:     {name:"Karate",       color:"#e0556e", metric:"time",     icon:"🥋"},
  xcski:      {name:"XC Ski",       color:"#56c2e0", metric:"dist",     icon:"🎿"},
  skate:      {name:"Skate",        color:"#5ad0ff", metric:"time",     icon:"⛸️"},
  snowboard:  {name:"Snowboard",    color:"#9aa7ff", metric:"time",     icon:"🏂"},
  snowshoe:   {name:"Snowshoe",     color:"#86b6c9", metric:"dist",     icon:""},
  ski:        {name:"Alpine Ski",   color:"#7fb0d6", metric:"time",     icon:"⛷️"},
  weights:    {name:"Weights",      color:"#c9a14a", metric:"time",     icon:"🏋️"},
  elliptical: {name:"Elliptical",   color:"#b08fd0", metric:"time",     icon:""},
  row:        {name:"Row",          color:"#5fb38f", metric:"dist",     icon:"🚣"},
  yoga:       {name:"Yoga",         color:"#d08fb8", metric:"time",     icon:"🧘"},
  walk:       {name:"Walk",         color:"#8fae6f", metric:"dist",     icon:"🚶"},

// one cohesive marker per sport: emoji icon where a clean one fits, else the color chip
function sportMark(s){
  const ic=sportIcon(s);
  return ic ? `<span class="ic">${ic}</span>`
            : `<span class="chip" style="background:${sportColor(s)}"></span>`;
}

// Canonical sport ordering used in every sport list/dropdown/card in the app:
// the core triathlon sports lead as the most relevant, then everything else by
// training volume (total time, then session count). Keeps the page consistent.
const SPORT_PRIORITY = ["run","bike","swim"];
function cmpSport(a,b,totals){
  const pa=SPORT_PRIORITY.indexOf(a), pb=SPORT_PRIORITY.indexOf(b);
  if(pa>=0&&pb>=0) return pa-pb;            // both core → fixed run, bike, swim order
  if(pa>=0) return -1;                       // a core, b not → a leads
  if(pb>=0) return 1;                        // b core, a not → b leads
  return (totals[b].dur-totals[a].dur) || (totals[b].count-totals[a].count); // rest by volume
}
function sportRank(totals){ return Object.keys(totals).sort((a,b)=>cmpSport(a,b,totals)); }
// Sport keys present in `rows` (default: all data), ordered by the rule above.
function sportsByVolume(rows=DATA){
  const v={};
  for(const r of rows){ const t=v[r.s]||(v[r.s]={dur:0,count:0}); t.count++; if(r.t)t.dur+=r.t; }
  return sportRank(v);
}

//============================================================ helpers
const pad = n => String(n).padStart(2,"0");
function fmtDur(sec){
  if(!sec) return "";
  const h=Math.floor(sec/3600), m=Math.floor(sec%3600/60), s=sec%60;
  if(h) return h+":"+pad(m)+":"+pad(s);
  return m+":"+pad(s);
}
function fmtDurShort(sec){
  if(!sec) return "—";
  const h=Math.floor(sec/3600), m=Math.round(sec%3600/60);
  if(h) return h+"h "+(m?m+"m":"");
  return m+"m";
}
function fmtKm(k){ return k==null? "" : (Math.round(k*10)/10)+" km"; }
// Pad to exactly d decimals so units shown together read consistently (13.0, not 13)
function fmtNum(n,d=0){ return n==null?"":n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}); }
// Compact number for tight spots like chart axes: 15000 -> "15k", 1.2e6 -> "1.2M".
function fmtK(n){
  if(n==null) return "";
  const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toFixed(a%1e6?1:0).replace(/\.0$/,"")+"M";
  if(a>=1e3) return (n/1e3).toFixed(a%1e3?1:0).replace(/\.0$/,"")+"k";
  return fmtNum(n);
}
// performance metric label per sport
function perf(r){
  const sp=SPORTS[r.s]||{}, t=r.t, k=r.k;
  if(!t||!k) return "";
  if(sp.metric==="pace"){ const p=(t/60)/k; return fmtPace(p)+" /km"; }
  if(sp.metric==="swimpace"){ const p=t/(k*10); return fmtMMSS(p)+" /100m"; }
  if(sp.metric==="speed"){ return (k/(t/3600)).toFixed(1)+" km/h"; }
  return "";
}
function fmtPace(minPerKm){ const m=Math.floor(minPerKm), s=Math.round((minPerKm-m)*60); return m+":"+pad(s); }
function fmtMMSS(sec){ const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+pad(s); }
const yearOf = r => +r.d.slice(0,4);
const monthOf = r => +r.d.slice(5,7);
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WEEKDAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function weekdayOf(r){ const dt=new Date(r.d+"T00:00:00"); return (dt.getDay()+6)%7; }

// aggregate a list of rows -> metrics
function agg(rows){
  let count=rows.length, dist=0, dur=0, dCount=0, tCount=0;
  for(const r of rows){ if(r.k){dist+=r.k;dCount++;} if(r.t){dur+=r.t;tCount++;} }
  return {count, dist, dur, dCount, tCount};
}

//============================================================ tiny chart (column)
// Rounded "nice" axis ticks (0 → ≥max) so the y-axis reads in clean steps.
function niceTicks(max, target=4, integer=false){
  if(max<=0) return [0,1];
  const rawStep = max/target;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep/mag;
  let step = (norm<=1?1:norm<=2?2:norm<=2.5?2.5:norm<=5?5:10)*mag;
  if(integer) step = Math.max(1, Math.ceil(step));   // whole-number steps for count data
  const ticks=[];
  for(let v=0; v<=max+step*1e-6; v+=step) ticks.push(Math.round(v*1e6)/1e6);
  if(ticks[ticks.length-1] < max) ticks.push(Math.round((ticks[ticks.length-1]+step)*1e6)/1e6);
  return ticks;
}
function columnChart(data, opts={}){
  // data: [{label, value, color?, sub?}]
  const rawMax = Math.max(1, ...data.map(d=>d.value));
  const fmt = opts.fmt || (v=>fmtNum(v));
  // Inline labels above bars stay compact (the axis already names the unit) so
  // they don't collide; the hover tooltip still shows the full formatted value.
  const valFmt = opts.valFmt || fmt;
  // rounded axis ticks drive the y-axis labels, the gridlines, and bar heights
  const allInt = data.every(d=>Number.isInteger(d.value));
  const ticks = niceTicks(rawMax, 4, allInt);
  const axisMax = ticks[ticks.length-1];
  const n = data.length;
  // value labels above each bar — only when bars are few enough to stay legible
  const showVals = opts.values!==false && n <= (opts.maxValues || (window.innerWidth<560 ? 7 : 18));
  const bars = data.map(d=>{
    const h = (d.value/axisMax*100).toFixed(1);
    const col = d.color||"";
    const style = col? `background:linear-gradient(${col},${col}99)`:"";
    const val = showVals && d.value>0 ? `<span class="val">${valFmt(d.value)}</span>` : "";
    return `<div class="bar" style="height:${h}%;${style}" data-v="${d.value}">
      ${val}<span class="tip">${d.label}: ${fmt(d.value)}${d.sub?" · "+d.sub:""}</span></div>`;
  }).join("");
  // horizontal gridlines + matching y-axis tick labels (compact, e.g. "15k km")
  const axisFmt = opts.axisFmt || (v=>fmtK(v));
  const grid = ticks.map(t=>`<div class="gline${t===0?' base':''}" style="bottom:${(t/axisMax*100).toFixed(2)}%"></div>`).join("");
  const yax = ticks.map(t=>`<span style="bottom:${(t/axisMax*100).toFixed(2)}%">${axisFmt(t)}</span>`).join("");
  // evenly-spaced, thinned x-axis labels so they stay readable with many bars
  const maxLabels = opts.maxLabels || (window.innerWidth<560 ? 7 : 14);
  const step = Math.max(1, Math.ceil(n/maxLabels));
  const lastShown = Math.floor((n-1)/step)*step;     // index of final step tick
  const showLast = (n-1) - lastShown >= step*0.6;     // only add the last label if it won't crowd
  let labs = "";
  data.forEach((d,i)=>{
    const isTick = (i%step===0) || (i===n-1 && showLast);
    if(!isTick) return;
    const left=((i+0.5)/n*100).toFixed(2);
    const text=opts.shortLabel?opts.shortLabel(d.label):d.label;
    labs+=`<span style="left:${left}%">${text}</span>`;
  });
  return `<div class="chartwrap"><div class="yunit">${opts.unit||"sessions"}</div>
    <div class="yaxis">${yax}</div>
    <div class="plot">
      <div class="chart">${grid}${bars}</div>
      <div class="xlab">${labs}</div>
    </div>
  </div>`;
}

// Compact SVG line chart for trends where the variation matters more than the
// absolute level (e.g. body weight 178–196), so the y-axis fits the data range
// instead of starting at zero. points: [{label, value}].
function lineChart(points, opts={}){
  if(points.length<2) return `<div class="muted">Not enough data.</div>`;
  const fmt=opts.fmt||(v=>fmtNum(v,1));
  const W=620,H=190,padL=44,padR=10,padT=12,padB=24;
  const vals=points.map(p=>p.value);
  let lo=Math.min(...vals), hi=Math.max(...vals);
  if(lo===hi){lo-=1;hi+=1;}
  const range=hi-lo, padv=range*0.12; lo-=padv; hi+=padv;
  const X=i=>padL+(i/(points.length-1))*(W-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  const linePath=points.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(p.value).toFixed(1)}`).join(" ");
  const areaPath=`M${X(0).toFixed(1)} ${(H-padB).toFixed(1)} `+points.map((p,i)=>`L${X(i).toFixed(1)} ${Y(p.value).toFixed(1)}`).join(" ")+` L${X(points.length-1).toFixed(1)} ${(H-padB).toFixed(1)} Z`;
  const ny=[0,0.5,1].map(f=>lo+(hi-lo)*f);
  const grid=ny.map(v=>`<line x1="${padL}" x2="${W-padR}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" class="lc-grid"/>`).join("");
  const yax=ny.map(v=>`<text x="${padL-6}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" class="lc-ax">${fmt(v)}</text>`).join("");
  const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.value).toFixed(1)}" r="2.4" class="lc-dot"><title>${p.label}: ${fmt(p.value)}</title></circle>`).join("");
  const n=points.length, maxL=opts.maxLabels||(window.innerWidth<560?6:12), stp=Math.max(1,Math.ceil(n/maxL));
  let xl=""; points.forEach((p,i)=>{ if(i%stp && i!==n-1) return; const lab=opts.shortLabel?opts.shortLabel(p.label):p.label;
    xl+=`<text x="${X(i).toFixed(1)}" y="${H-7}" text-anchor="middle" class="lc-ax">${lab}</text>`; });
  return `<div class="yunit" style="position:static;margin-bottom:2px">${opts.unit||""}</div>
    <svg class="linechart" viewBox="0 0 ${W} ${H}" role="img">${grid}<path d="${areaPath}" class="lc-area"/><path d="${linePath}" class="lc-line"/>${dots}${yax}${xl}</svg>`;
}

//============================================================ tabs / routing
const TABS = [
  ["dash","Dashboard"], ["insights","Insights"], ["reports","Reports"],
  ["browse","Raw Data"], ["about","About"],
];
// The custom report builder used to be its own tab; it now lives inside Reports.
// Keep old #builder deep links working by routing them to Reports.
const aliasTab = t => t==="builder" ? "reports" : t;
let current="dash";
function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(([id,name])=>
    `<button data-tab="${id}" class="${id===current?'active':''}">${name}</button>`).join("");
  document.querySelectorAll("#tabs button").forEach(b=>
    b.onclick=()=>go(b.dataset.tab));
}
const tabOf = h => aliasTab((h||"").replace("#","").split("?")[0] || "dash");  // hash may carry ?filters
// navigate to a tab, syncing the URL hash (deep-linkable, survives refresh)
function go(tab){
  tab=aliasTab(tab);
  if(!TABS.some(t=>t[0]===tab)) tab="dash";
  current=tab;
  if(tabOf(location.hash)!==tab) location.hash=tab;  // fires hashchange (skipped: tab===current)
  renderTabs(); route(); window.scrollTo(0,0);
}
window.addEventListener("hashchange",()=>{
  const tab=tabOf(location.hash);
  if(tab===current) return;          // same tab (or a query change we made ourselves) — ignore
  if(TABS.some(t=>t[0]===tab)){ current=tab; renderTabs(); route(); window.scrollTo(0,0); }
});
// tap a chart bar to pin its tooltip (hover doesn't exist on touch)
document.addEventListener("click",e=>{
  const bar=e.target.closest(".chart .bar");
  if(!bar) return;
  const on=bar.classList.contains("show");
  document.querySelectorAll(".bar.show").forEach(x=>x.classList.remove("show"));
  if(!on) bar.classList.add("show");
});
function route(){
  const app=document.getElementById("app");
  if(current==="dash") renderDash(app);
  else if(current==="insights") renderInsights(app);
  else if(current==="reports") renderReports(app);
  else if(current==="browse") renderBrowse(app);
  else renderAbout(app);
}

function reportYear(y){
  const rows=DATA.filter(r=>yearOf(r)===y && r.s!=="note");
  if(!rows.length) return yearNavHeader(y)+`<div class="card">No data recorded for ${y}.</div>`;
  const a=agg(rows);
  const sportTotals={};
  for(const r of rows){ const t=sportTotals[r.s]||(sportTotals[r.s]={count:0,dist:0,dur:0});
    t.count++; if(r.k)t.dist+=r.k; if(r.t)t.dur+=r.t; }
  const ranked=sportRank(sportTotals).map(s=>[s,sportTotals[s]]);
  // monthly stacked-ish (count) chart
  const byMonth=MONTHS.map((m,i)=>({label:m,value:rows.filter(r=>monthOf(r)===i+1).length}));
  return yearNavHeader(y)+`
   <div class="grid stat-row" style="margin-bottom:16px">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">Workouts in ${y}</div></div>
     <div class="card stat"><div class="num">${fmtNum(a.dist)}</div><div class="lbl">km</div></div>
     <div class="card stat"><div class="num">${Math.round(a.dur/3600)}</div><div class="lbl">hours</div></div>
     <div class="card stat"><div class="num">${ranked.length}</div><div class="lbl">sports</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>${y} by month</h3>${columnChart(byMonth)}</div>
   <div class="card"><h3>${y} by sport</h3>
     <div class="tablewrap"><table><thead><tr><th>Sport</th><th class="num">Sessions</th><th class="num">Distance</th><th class="num">Time</th></tr></thead>
     <tbody>${ranked.map(([s,t])=>`<tr>
        <td>${sportTag(s)}</td>
        <td class="num">${fmtNum(t.count)}</td>
        <td class="num">${t.dist?fmtNum(t.dist)+" km":"—"}</td>
        <td class="num">${t.dur?fmtDurShort(t.dur):"—"}</td></tr>`).join("")}</tbody></table></div></div>`;
}

function reportSport(s){
  const rows=DATA.filter(r=>r.s===s);
  if(!rows.length) return `<div class="card">No data.</div>`;
  const years=[...new Set(rows.map(yearOf))].sort();
  const a=agg(rows);
  const byYear=years.map(y=>({label:String(y),value:rows.filter(r=>yearOf(r)===y).length}));
  const perYearRows=years.map(y=>{const rr=rows.filter(r=>yearOf(r)===y);const ya=agg(rr);
    return {y,...ya};}).reverse();
  const recs=bestsFor(s);
  return `
   <div class="grid stat-row" style="margin-bottom:16px">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">${sportName(s)} sessions</div></div>
     ${a.dist>5?`<div class="card stat"><div class="num">${fmtNum(a.dist)}</div><div class="lbl">total km</div></div>`:""}
     <div class="card stat"><div class="num">${Math.round(a.dur/3600)}</div><div class="lbl">total hours</div></div>
     <div class="card stat"><div class="num">${years[0]}–${years[years.length-1]}</div><div class="lbl">span</div></div>
   </div>
   <div class="card" style="margin-bottom:16px"><h3>${sportName(s)} sessions per year</h3>
     ${columnChart(byYear,{shortLabel:l=>"'"+l.slice(2)})}</div>
   ${recs?`<div class="card" style="margin-bottom:16px"><h3>Records</h3><div class="kvgrid">${recs}</div></div>`:""}
   <div class="card"><h3>Per year</h3>
     <div class="tablewrap"><table><thead><tr><th>Year</th><th class="num">Sessions</th><th class="num">Distance</th><th class="num">Time</th></tr></thead>
     <tbody>${perYearRows.map(r=>`<tr><td>${r.y}</td><td class="num">${fmtNum(r.count)}</td>
        <td class="num">${r.dist?fmtNum(r.dist)+" km":"—"}</td><td class="num">${r.dur?fmtDurShort(r.dur):"—"}</td></tr>`).join("")}</tbody></table></div></div>`;
}

function reportMatrix(metric){
  const years=[...new Set(DATA.map(yearOf))].sort();
  const sports=globalSportOrder().filter(s=>s!=="note"&&SPORTS[s]);
  const val=(rows)=>{ const a=agg(rows); return metric==="count"?a.count:metric==="dist"?Math.round(a.dist):Math.round(a.dur/3600); };
  const cell=(y,s)=>val(DATA.filter(r=>yearOf(r)===y&&r.s===s));
  const head=`<th>Year</th>`+sports.map(s=>`<th class="num">${sportTag(s)}</th>`).join("")+`<th class="num">Total</th>`;
  const body=years.slice().reverse().map(y=>{
    let tot=0; const cells=sports.map(s=>{const v=cell(y,s);tot+=v;return `<td class="num">${v||""}</td>`;}).join("");
    return `<tr><td><b>${y}</b></td>${cells}<td class="num"><b>${tot||""}</b></td></tr>`;
  }).join("");
  const unit=metric==="count"?"sessions":metric==="dist"?"km":"hours";
  return `<div class="card"><h3>Year × Sport — ${unit}</h3>
    <div class="tablewrap"><table class="matrix"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
}

function bestsFor(s){
  const rows=DATA.filter(r=>r.s===s);
  const sp=SPORTS[s]||{};
  let html=[];
  const withDist=rows.filter(r=>r.k); const withDur=rows.filter(r=>r.t);
  if(withDist.length){ const m=withDist.reduce((a,b)=>b.k>a.k?b:a);
    html.push(kv("Longest distance",`${fmtNum(m.k,1)} km`,m.d)); }
  if(withDur.length){ const m=withDur.reduce((a,b)=>b.t>a.t?b:a);
    html.push(kv("Longest duration",fmtDur(m.t),m.d)); }
  if(sp.metric==="pace"){ const c=rows.filter(r=>r.t&&r.k&&r.k>=3);
    if(c.length){ const m=c.reduce((a,b)=> (b.t/b.k)<(a.t/a.k)?b:a); html.push(kv("Fastest pace (≥3 km)",fmtPace((m.t/60)/m.k)+" /km",m.d)); } }
  if(sp.metric==="speed"){ const c=rows.filter(r=>r.t&&r.k&&r.k>=10);
    if(c.length){ const m=c.reduce((a,b)=>(b.k/b.t)>(a.k/a.t)?b:a); html.push(kv("Fastest avg speed (≥10 km)",(m.k/(m.t/3600)).toFixed(1)+" km/h",m.d)); } }
  // best year
  const years=[...new Set(rows.map(yearOf))];
  if(years.length){ const by=years.map(y=>[y,rows.filter(r=>yearOf(r)===y).length]).reduce((a,b)=>b[1]>a[1]?b:a);
    html.push(kv("Most sessions in a year",`${by[1]}`,String(by[0]))); }
  return html.join("");
  function kv(label,val,date){ return `<div><b>${label}</b>${val} <span class="muted">(${date})</span></div>`; }
}

function reportBests(){
  const sports=["run","bike","swim","xcski","hockey"].filter(s=>DATA.some(r=>r.s===s));
  return sports.map(s=>{const h=bestsFor(s); return h?`<div class="card" style="margin-bottom:14px">
    <h3>${sportTag(s)}</h3>
    <div class="kvgrid">${h}</div></div>`:"";}).join("");
}

// Lives inside the Reports tab as the "Custom report…" option. Renders its
// filter/group controls + output into whatever container Reports hands it.
const BUILDER={f:{}};
function renderBuilderInto(target){
  const years=[...new Set(DATA.map(yearOf))].sort((a,b)=>b-a);

     <h3>2 · Group &amp; measure</h3>
     <div class="controls">
       <label class="fld">Group by<select id="b-group">
         <option value="year">Year</option><option value="sport">Sport</option>
         <option value="year_sport">Year + Sport</option><option value="month">Month of year</option>
         <option value="ym">Year-Month</option><option value="weekday">Weekday</option>
         <option value="none">No grouping (totals)</option>
       </select></label>
       <label class="fld">Sort by<select id="b-sort">

         <option value="dist">Distance</option><option value="dur">Time</option></select></label>

       <button class="btn ghost" id="b-view">View matching entries</button>
     </div>
   </div>
   <div id="b-out"></div>`;

  // "All" checkbox logic
  const sportsBox=document.getElementById("b-sports");
  sportsBox.addEventListener("change",e=>{
    const all=sportsBox.querySelector('input[value="__all"]');
    if(e.target.value==="__all"&&e.target.checked){
      sportsBox.querySelectorAll('input').forEach(i=>{if(i!==all)i.checked=false;});
    }else if(e.target.value!=="__all"&&e.target.checked){ all.checked=false; }
    if(![...sportsBox.querySelectorAll('input')].some(i=>i.checked)) all.checked=true;
  });
  document.getElementById("b-run").onclick=runBuilder;
  document.getElementById("b-csv").onclick=()=>runBuilder(true);
  document.getElementById("b-view").onclick=()=>{
    BUILDER.f=collectFilter(); go("browse");   // route() runs synchronously
    applyBuilderToBrowse();
  };
  runBuilder();

function collectFilter(){
  const v=id=>document.getElementById(id).value;
  const sportsBox=document.getElementById("b-sports");
  const checked=[...sportsBox.querySelectorAll('input:checked')].map(i=>i.value).filter(x=>x!=="__all");
  return {y0:v("b-y0"),y1:v("b-y1"),src:v("b-src"),conf:v("b-conf"),
    kmin:v("b-kmin"),q:v("b-q").toLowerCase(),sports:checked};
}
function filterRows(f){
  return DATA.filter(r=>{
    if(f.sports.length && !f.sports.includes(r.s)) return false;
    if(!f.sports.length && r.s==="note") {/* include notes only if explicitly chosen */ }
    const y=yearOf(r);
    if(f.y0 && y<+f.y0) return false;
    if(f.y1 && y>+f.y1) return false;
    if(f.src && r.src!==f.src) return false;
    if(f.conf && r.c!==f.conf) return false;
    if(f.kmin && (!r.k || r.k<+f.kmin)) return false;
    if(f.q && !(r.r||"").toLowerCase().includes(f.q) && !(r.n||"").toLowerCase().includes(f.q)) return false;
    return true;
  });
}
function runBuilder(csv){
  const f=collectFilter(); BUILDER.f=f;
  const rows=filterRows(f);
  const group=document.getElementById("b-group").value;
  const sortBy=document.getElementById("b-sort").value;
  const keyFn={
    year:r=>String(yearOf(r)), sport:r=>sportName(r.s),
    year_sport:r=>yearOf(r)+" · "+sportName(r.s),
    month:r=>MONTHS[monthOf(r)-1], ym:r=>r.d.slice(0,7),
    weekday:r=>WEEKDAYS[weekdayOf(r)], none:_=>"All",
  }[group];
  const groups={};
  for(const r of rows){ const k=keyFn(r); (groups[k]||(groups[k]=[])).push(r); }
  let entries=Object.entries(groups).map(([k,rs])=>{const a=agg(rs);return {k,...a,
     avgKm:a.dCount?a.dist/a.dCount:0, avgDur:a.tCount?a.dur/a.tCount:0};});
  // sort
  const monthOrder=MONTHS, wdOrder=WEEKDAYS;
  entries.sort((a,b)=>{
    if(sortBy==="key"){
      if(group==="month") return monthOrder.indexOf(a.k)-monthOrder.indexOf(b.k);
      if(group==="weekday") return wdOrder.indexOf(a.k)-wdOrder.indexOf(b.k);
      return a.k<b.k?-1:a.k>b.k?1:0;
    }
    return b[sortBy]-a[sortBy];
  });
  const tot=agg(rows);
  if(csv){ exportCSV(entries,group); return; }
  const out=document.getElementById("b-out");
  if(!rows.length){ out.innerHTML=`<div class="card">No entries match these filters.</div>`; return; }
  const showChart = entries.length>1 && entries.length<=60;
  const chartData=entries.map(e=>({label:e.k,value:e.count}));
  out.innerHTML=`
   <div class="grid stat-row" style="margin-bottom:14px">
     <div class="card stat"><div class="num">${fmtNum(tot.count)}</div><div class="lbl">matching workouts</div></div>
     <div class="card stat"><div class="num">${fmtNum(tot.dist)}</div><div class="lbl">total km</div></div>
     <div class="card stat"><div class="num">${Math.round(tot.dur/3600)}</div><div class="lbl">total hours</div></div>
     <div class="card stat"><div class="num">${entries.length}</div><div class="lbl">groups</div></div>
   </div>
   ${showChart?`<div class="card" style="margin-bottom:14px"><h3>Sessions by ${group.replace("_"," + ")}</h3>
      ${columnChart(chartData,{shortLabel:l=>l.length>6?l.slice(0,6):l})}</div>`:""}
   <div class="card"><h3>Results</h3>
   <div class="tablewrap"><table><thead><tr>
     <th>${group==="none"?"Total":group.replace("_"," + ")}</th>
     <th class="num">Sessions</th><th class="num">Distance</th><th class="num">Avg km</th>
     <th class="num">Total time</th><th class="num">Avg time</th></tr></thead>
   <tbody>${entries.map(e=>`<tr>
     <td>${e.k}</td><td class="num">${fmtNum(e.count)}</td>
     <td class="num">${e.dist?fmtNum(e.dist)+" km":"—"}</td>
     <td class="num">${e.avgKm?fmtNum(e.avgKm,1):"—"}</td>
     <td class="num">${e.dur?fmtDurShort(e.dur):"—"}</td>
     <td class="num">${e.avgDur?fmtDur(Math.round(e.avgDur)):"—"}</td></tr>`).join("")}
   </tbody></table></div></div>`;
}
function exportCSV(entries,group){
  const head=["group","sessions","distance_km","avg_km","total_seconds","avg_seconds"];
  const lines=[head.join(",")].concat(entries.map(e=>
    [`"${e.k}"`,e.count,e.dist.toFixed(2),e.avgKm.toFixed(2),Math.round(e.dur),Math.round(e.avgDur)].join(",")));
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`mike-report-${group}.csv`; a.click();
}

//============================================================ RAW DATA BROWSE
// Rows-per-page choices for the data tab. 250 default so scanning 12k+ entries
// isn't a 50-at-a-time slog; "All" (1e9) drops the cap entirely.
const PER_CHOICES=[50,100,250,500,1000000000];
const perLabel=v=>v>=1e9?"All":String(v);
const BROWSE={page:0,per:250,sort:"d",dir:-1,rows:null};
const BROWSE_FIELDS=[["x-q","q"],["x-sport","sport"],["x-year","year"],["x-src","src"],["x-conf","conf"]];
// reflect current filters into the URL so refresh / sharing keeps them
function syncBrowseURL(){
  const p=new URLSearchParams();
  BROWSE_FIELDS.forEach(([id,key])=>{ const v=document.getElementById(id).value; if(v) p.set(key,v); });
  const qs=p.toString();
  history.replaceState(null,"","#browse"+(qs?"?"+qs:""));   // replaceState => no hashchange loop
}
function prefillBrowseFromURL(){
  const qi=location.hash.indexOf("?"); if(qi<0) return;
  const p=new URLSearchParams(location.hash.slice(qi+1));
  BROWSE_FIELDS.forEach(([id,key])=>{ if(p.has(key)){ const el=document.getElementById(id); if(el) el.value=p.get(key); }});
}
function renderBrowse(app){
  const years=[...new Set(DATA.map(yearOf))].sort((a,b)=>b-a);
  const sports=globalSportOrder().filter(s=>SPORTS[s]);
  app.innerHTML=`
   <h2 class="section">Raw Data</h2>
   <div class="card controls" style="margin-bottom:14px">
     <label class="fld">Search<input type="text" id="x-q" placeholder="notes / raw text…"></label>
     <label class="fld" style="max-width:150px">Sport<select id="x-sport"><option value="">all</option>${sports.map(s=>`<option value="${s}">${sportName(s)}</option>`).join("")}</select></label>
     <label class="fld" style="max-width:120px">Year<select id="x-year"><option value="">all</option>${years.map(y=>`<option>${y}</option>`).join("")}</select></label>
     <label class="fld" style="max-width:150px">Source<select id="x-src"><option value="">all</option><option value="t">training log</option><option value="r">running log</option></select></label>
     <label class="fld" style="max-width:150px">Confidence<select id="x-conf"><option value="">all</option><option value="x">confirmed</option><option value="d">deduced</option><option value="u">uncertain</option></select></label>
     <button class="btn ghost" id="x-clear">Clear</button>
     <button class="btn ghost" id="x-csv">Export CSV</button>
   </div>
   <div class="muted" id="x-count" style="margin-bottom:8px"></div>
   <div class="tablewrap"><table id="x-table"></table></div>
   <div class="pager" id="x-pager"></div>`;
  const debounce=(fn,ms)=>{let t;return()=>{clearTimeout(t);t=setTimeout(fn,ms);};};
  const redraw=()=>{BROWSE.page=0;syncBrowseURL();drawBrowse();};
  document.getElementById("x-q").oninput=debounce(redraw,180);   // smooth typing over 12k rows
  ["x-sport","x-year","x-src","x-conf"].forEach(id=>document.getElementById(id).onchange=redraw);
  document.getElementById("x-clear").onclick=()=>{
    BROWSE_FIELDS.forEach(([id])=>document.getElementById(id).value="");
    redraw();
  };
  document.getElementById("x-csv").onclick=exportRawCSV;
  prefillBrowseFromURL();   // restore filters from the URL (refresh / shared link)
  drawBrowse();
}
function exportRawCSV(){
  const rows=BROWSE.rows||[];
  const head=["date","sport","duration_sec","distance_km","heart_rate","avg_speed_kmh","source","classification","note","raw"];
  const esc=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const lines=[head.join(",")].concat(rows.map(r=>[
    r.d,sportName(r.s),r.t||"",r.k==null?"":r.k,r.h||"",r.a||"",
    r.src==="r"?"running":"training",CONF[r.c],r.n||"",r.r||""
  ].map(esc).join(",")));
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="mike-raw-data.csv"; a.click();
}
function applyBuilderToBrowse(){
  const f=BUILDER.f||{};
  if(f.q!==undefined) document.getElementById("x-q").value=f.q||"";
  if(f.src) document.getElementById("x-src").value=f.src;
  if(f.conf) document.getElementById("x-conf").value=f.conf;
  if(f.sports&&f.sports.length===1) document.getElementById("x-sport").value=f.sports[0];
  if(f.y0&&f.y0===f.y1) document.getElementById("x-year").value=f.y0;
  syncBrowseURL(); drawBrowse();
}
function browseFilter(){
  const q=document.getElementById("x-q").value.toLowerCase();
  const sport=document.getElementById("x-sport").value;
  const year=document.getElementById("x-year").value;
  const src=document.getElementById("x-src").value;
  const conf=document.getElementById("x-conf").value;
  return DATA.filter(r=>{
    if(sport&&r.s!==sport) return false;
    if(year&&yearOf(r)!==+year) return false;
    if(src&&r.src!==src) return false;
    if(conf&&r.c!==conf) return false;
    if(q&&!(r.r||"").toLowerCase().includes(q)&&!(r.n||"").toLowerCase().includes(q)) return false;
    return true;
  });
}
const BROWSE_COLS=[
  ["d","Date",0],["s","Sport",0],["t","Duration",1],["k","Distance",1],
  ["perf","Pace / Speed",1],["h","HR",1],["src","Source",0],["c","Conf",0],["r","Notes / raw",0],
];
function drawBrowse(){
  let rows=browseFilter();
  const {sort,dir}=BROWSE;
  rows.sort((a,b)=>{
    let av,bv;
    if(sort==="perf"){av=a.t&&a.k?a.t/a.k:0;bv=b.t&&b.k?b.t/b.k:0;}
    else {av=(a[sort]==null?-Infinity:a[sort]);bv=(b[sort]==null?-Infinity:b[sort]);}
    if(av<bv)return -dir; if(av>bv)return dir; return 0;
  });
  BROWSE.rows=rows;
  const total=rows.length, pages=Math.max(1,Math.ceil(total/BROWSE.per));
  if(BROWSE.page>=pages)BROWSE.page=0;
  const start=BROWSE.page*BROWSE.per;
  const slice=rows.slice(start,start+BROWSE.per);
  document.getElementById("x-count").textContent= total
    ? `Showing ${fmtNum(start+1)}–${fmtNum(start+slice.length)} of ${fmtNum(total)} entries`
    : "No entries match these filters.";
  const th=BROWSE_COLS.map(([k,lbl,num])=>`<th class="sortable ${num?'num':''}" data-k="${k}">${lbl}${BROWSE.sort===k?(BROWSE.dir>0?" ▲":" ▼"):""}</th>`).join("");
  const body=slice.map((r,i)=>rowHTML(r,start+i)).join("");
  const tbl=document.getElementById("x-table");
  tbl.innerHTML=`<thead><tr>${th}</tr></thead><tbody>${body}</tbody>`;
  // One delegated handler covers header sorting + row expand, so large page
  // sizes (250/500/All) don't bind thousands of per-row listeners.
  tbl.onclick=e=>{
    const h=e.target.closest("th.sortable");
    if(h){
      const k=h.dataset.k;
      if(BROWSE.sort===k)BROWSE.dir*=-1; else {BROWSE.sort=k;BROWSE.dir=(k==="d")?-1:1;}
      drawBrowse(); return;
    }
    const tr=e.target.closest("tr.datarow");
    if(tr) toggleDetail(tr);
  };
  // pager + rows-per-page picker
  const pg=document.getElementById("x-pager");
  pg.innerHTML=`<button ${BROWSE.page===0?"disabled":""} id="pg-prev">‹ Prev</button>
    <span class="muted">Page ${BROWSE.page+1} / ${pages}</span>

    <label class="muted" style="margin-left:14px">Rows&nbsp;<select id="pg-per">${PER_CHOICES.map(v=>`<option value="${v}" ${BROWSE.per===v?"selected":""}>${perLabel(v)}</option>`).join("")}</select></label>`;
  const prev=document.getElementById("pg-prev"),next=document.getElementById("pg-next"),per=document.getElementById("pg-per");

  if(per)per.onchange=()=>{BROWSE.per=+per.value;BROWSE.page=0;drawBrowse();window.scrollTo(0,0);};
}

function escapeHTML(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

//============================================================ INSIGHTS
// ── Notes as data ─────────────────────────────────────────────────────────
// Note-only rows (no sport/distance) are Mike's diary jottings. With medium/
// high-confidence keyword matching we pull two useful things out of them: body-
// weight readings (a bare 3-digit number in lb), and the likely reason a day
// was skipped — injury, illness, travel or recovery. Everything else is "other".
const NOTE_CATS = [
  ["injury",   /\b(back|knee|foot|feet|ankle|hip|shin|calf|hamstring|groin|crotch|shoulder|heel|achilles|sore|hurt|injur|sprain|strain|pain|tendon|sciatic|blister)\b/i],
  ["illness",  /\b(sick|flu|ill|fever|cold|chills|nausea|dizzy|tired|exhaust|cough|throat|stomach|migraine|headache|virus)\b/i],
  ["travel",   /\b(mexico|camping|vacation|trip|cottage|florida|cuba|tremblant|stockholm|away|holiday|christmas|xmas|wedding|conference)\b/i],
  ["recovery", /\b(massage|physio|chiro|acupunct|recovery|rest\s*day|day\s*off|stretch|art)\b/i],
];
function noteText(r){ return (r.n||r.r||"").trim(); }
function noteWeight(t){ const m=/^\s*(\d{3}(?:\.\d)?)\s*$/.exec(t||""); if(!m) return null; const v=+m[1]; return (v>=150&&v<=230)?v:null; }  // adult body-weight band (lb); excludes stray 3-digit numbers
function classifyNote(t){ if(noteWeight(t)!=null) return "weight"; for(const [c,re] of NOTE_CATS) if(re.test(t)) return c; return "other"; }
// How note categories surface on the activity calendar (coarse buckets + colour).
const NOTE_CAL  = { injury:"rest", illness:"rest", recovery:"rest", travel:"travel", weight:"weight" };
const NOTE_COL  = { rest:"rgba(224,90,108,.74)", travel:"rgba(150,130,255,.66)", weight:"rgba(120,140,180,.5)" };
const NOTE_RANK = { rest:3, travel:2, weight:1 };
const NOTE_LABEL= { rest:"rest / unwell", travel:"travel", weight:"weight log" };

let _insightsYear = null;
function renderInsights(app){
  const real = DATA.filter(r=>r.s!=="note");
  const a = agg(real);
  const years = [...new Set(real.map(yearOf))].sort((x,y)=>x-y);
  const dnum = ds => Math.floor(Date.parse(ds+"T00:00:00Z")/864e5);

  // total running distance (for the marathon equivalence)
  let runKm=0; for(const r of real) if(r.s==="run"&&r.k) runKm+=r.k;
  // distinct active days power the streak + average stats
  const activeDays=[...new Set(real.map(r=>r.d))].sort();
  const spanDays = activeDays.length>1 ? dnum(activeDays[activeDays.length-1])-dnum(activeDays[0])+1 : 1;
  const perWeek = a.count/(spanDays/7);
  // most active year + busiest single day
  const yc={}; real.forEach(r=>{const y=yearOf(r);yc[y]=(yc[y]||0)+1;});
  const topYear = Object.entries(yc).sort((x,y)=>y[1]-x[1])[0];
  const dc={}; real.forEach(r=>{dc[r.d]=(dc[r.d]||0)+1;});
  const busiest = Object.entries(dc).sort((x,y)=>y[1]-x[1])[0];

  // streaks: longest run of consecutive calendar days trained + longest layoff
  let longest=0, cur=0, prev=null;
  for(const ds of activeDays){ const n=dnum(ds);
    cur = (prev!==null && n===prev+1) ? cur+1 : 1; if(cur>longest) longest=cur; prev=n; }
  let gap=0; for(let i=1;i<activeDays.length;i++){ const g=dnum(activeDays[i])-dnum(activeDays[i-1]); if(g>gap) gap=g; }

  // real-world equivalences for the fun-fact row
  const equator=a.dist/40075, moonPct=a.dist/384400*100, marathons=runKm/42.195, totalDays=a.dur/86400;
  const fact=(icon,big,sub)=>`<div class="card stat fact"><span class="big">${icon}</span><span class="ftxt"><b>${big}</b><span>${sub}</span></span></div>`;

  if(_insightsYear===null || !years.includes(_insightsYear))
    _insightsYear = topYear ? +topYear[0] : years[years.length-1];

  // weekly + seasonal training patterns
  const dow = WEEKDAYS.map(w=>({label:w, value:0}));
  real.forEach(r=>{ const d=new Date(r.d+"T00:00:00Z").getUTCDay(); dow[(d+6)%7].value++; });
  const mon = MONTHS.map(m=>({label:m, value:0}));
  real.forEach(r=>{ mon[monthOf(r)-1].value++; });

  // shoe mileage leaderboard (running km attributed to each shoe)
  const shoes={};
  for(const r of real){ if(r.s!=="run"||!r.sh||!r.k) continue; shoes[r.sh]=(shoes[r.sh]||0)+r.k; }
  const topShoes=Object.entries(shoes).sort((x,y)=>y[1]-x[1]).slice(0,10);
  const shoeMax=topShoes.length?topShoes[0][1]:1;

  // extra fun-fact equivalences + standout sessions
  let bikeKm=0, swimKm=0, runSec=0, longSession=null; const dayKm={};
  for(const r of real){
    if(r.s==="bike"&&r.k) bikeKm+=r.k;
    if(r.s==="swim"&&r.k) swimKm+=r.k;
    if(r.s==="run"&&r.t) runSec+=r.t;
    if(r.t && (!longSession || r.t>longSession.t)) longSession=r;
    if(r.k) dayKm[r.d]=(dayKm[r.d]||0)+r.k;
  }
  const toursDeFrance=bikeKm/3360, channels=swimKm/33.8;  // a Tour ≈ 3360 km, the Channel ≈ 33.8 km
  const coverage=activeDays.length/spanDays*100;
  const runPace=runKm>0?(runSec/60)/runKm:0;              // lifetime avg run pace (min/km)
  const bigDay=Object.entries(dayKm).sort((x,y)=>y[1]-x[1])[0];
  const distinctShoes=Object.keys(shoes).length;
  const sportCount=new Set(real.map(r=>r.s)).size;

  // complementary insight cards (on-this-day / by-decade / fitness trends)
  const _today=new Date(), _md=pad(_today.getMonth()+1)+"-"+pad(_today.getDate());
  const otd=real.filter(r=>r.d.slice(5)===_md).sort((x,y)=>x.d<y.d?-1:1);
  const dec={};
  for(const r of real){ const k=Math.floor(yearOf(r)/10)*10;
    const o=dec[k]||(dec[k]={count:0,dist:0,dur:0,sp:{}});
    o.count++; o.dist+=r.k||0; o.dur+=r.t||0; o.sp[r.s]=(o.sp[r.s]||0)+1; }
  const decRows=Object.keys(dec).sort().map(k=>{const o=dec[k];
    return {dec:k,count:o.count,dist:o.dist,dur:o.dur,top:Object.entries(o.sp).sort((x,y)=>y[1]-x[1])[0][0]};});
  const _trend=(sp,kind)=>{
    // Plausibility guard: the source shorthand sometimes mis-parses an H:MM time
    // as M:SS (durations come out ~60x too short) or scrambles distance, which
    // produces absurd implied speeds (e.g. 140 km/h bikes). Only count rides
    // whose implied speed is physically sane so a few bad entries can't poison
    // the yearly average. bike: 5–45 km/h · run: 4–22 km/h (~15:00 to ~2:43/km).
    const sane=r=>{ if(!r.t||!r.k) return false; const v=r.k/(r.t/3600);
      return sp==="bike" ? (v>=5&&v<=45) : (v>=4&&v<=22); };
    const ys=[...new Set(real.filter(r=>r.s===sp).map(yearOf))].sort(); const out=[];
    for(const y of ys){ const rs=real.filter(r=>r.s===sp&&yearOf(r)===y&&sane(r)); if(rs.length<8) continue;
      const t=rs.reduce((a,r)=>a+r.t,0),k=rs.reduce((a,r)=>a+r.k,0);
      out.push({label:String(y),value:kind==="pace"?(t/60)/k:k/(t/3600)}); } return out; };
  const runTrend=_trend("run","pace"), bikeTrend=_trend("bike","speed");

  // Notes as data: body weight over time + the reasons days were skipped.
  const weightByYear={}, restCnt={injury:0,illness:0,travel:0,recovery:0};
  for(const r of DATA){ if(r.s!=="note") continue; const txt=noteText(r); const w=noteWeight(txt);
    if(w!=null){ const y=yearOf(r); (weightByYear[y]||(weightByYear[y]=[])).push(w); continue; }
    const c=classifyNote(txt); if(restCnt[c]!=null) restCnt[c]++; }
  const weightSeries=Object.keys(weightByYear).sort().map(y=>({label:y,
    value:+(weightByYear[y].reduce((a,b)=>a+b,0)/weightByYear[y].length).toFixed(1)}));
  const weightAll=[].concat(...Object.values(weightByYear));
  const restData=[
    {label:"Injury",   value:restCnt.injury,   color:"#e05a6c"},
    {label:"Illness",  value:restCnt.illness,  color:"#e8a33a"},
    {label:"Travel",   value:restCnt.travel,   color:"#8a7dff"},
    {label:"Recovery", value:restCnt.recovery, color:"#4db6e6"},
  ];

  app.innerHTML=`
   <h2 class="section">Insights</h2>

   <div class="grid facts" style="margin-bottom:18px">
     ${fact("🌍", fmtNum(equator,1)+"×", "around the Earth — "+fmtNum(a.dist)+" km logged")}
     ${fact("🌙", fmtNum(moonPct,1)+"%", "of the way to the Moon")}
     ${fact("🏅", fmtNum(marathons), "marathons' worth of running")}
     ${fact("⏱️", fmtNum(totalDays,1)+" days", "spent training, non-stop")}
     ${fact("📅", fmtNum(perWeek,1)+"/wk", "avg sessions over "+years.length+" years")}
     ${fact("🔥", longest+" days", "longest daily training streak")}
     ${bikeKm?fact("🚴", fmtNum(toursDeFrance,1)+"×", "the Tour de France — "+fmtNum(bikeKm)+" km biked"):""}
     ${swimKm?fact("🏊", fmtNum(channels,1)+"×", "across the English Channel — "+fmtNum(swimKm)+" km swum"):""}
     ${runPace?fact("⚡", fmtPace(runPace)+"/km", "lifetime average running pace"):""}
     ${longSession?fact("⏳", fmtDurShort(longSession.t), "longest session — "+sportName(longSession.s)+" "+longSession.d.slice(0,4)):""}
     ${bigDay?fact("📈", fmtNum(bigDay[1])+" km", "biggest distance in a single day"):""}
     ${distinctShoes?fact("👟", fmtNum(distinctShoes), "pairs of running shoes worn out"):""}
     ${fact("🤸", sportCount, "different sports logged over the years")}
     ${fact("🗓️", fmtNum(coverage)+"%", "of all days had a workout")}
   </div>

   <div class="card" style="margin-bottom:18px">
     <div class="cardhead" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
       <h3>Activity calendar</h3>
       <label class="fld" style="max-width:120px">Year
         <select id="hm-year">${years.slice().reverse().map(y=>`<option ${y===_insightsYear?"selected":""}>${y}</option>`).join("")}</select></label>
     </div>
     <div class="hm-box">
       <div class="hm-scroll" id="hm-scroll">${activityHeatmap()}</div>
     </div>
     <div class="hm-legend">Less <span class="hm-cell" style="background:var(--panel2)"></span><span class="hm-cell" style="background:rgba(54,194,168,.4)"></span><span class="hm-cell" style="background:rgba(54,194,168,.6)"></span><span class="hm-cell" style="background:rgba(54,194,168,.8)"></span><span class="hm-cell" style="background:rgba(54,194,168,1)"></span> More<span class="hm-cell" style="background:rgba(255,178,90,.95);margin-left:12px"></span> top 1%<span class="hm-cell" style="background:rgba(224,90,108,.74);margin-left:12px"></span> rest/unwell<span class="hm-cell" style="background:rgba(150,130,255,.66);margin-left:8px"></span> travel<span class="hm-cell" style="background:rgba(120,140,180,.5);margin-left:8px"></span> weigh-in</div>
     <div class="note-sm">Each square is one day. Green shows the total <b>time trained</b> that day — darker means more — and orange marks your busiest 1%. Days with no workout but a diary note are tinted instead: <b>red</b> for injury/illness, <b>purple</b> for travel, <b>slate</b> for a weigh-in. Tap any training day for its workouts.</div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:18px">
     <div class="card"><h3>By day of week</h3>${columnChart(dow)}</div>
     <div class="card"><h3>By month (all years)</h3>${columnChart(mon,{shortLabel:l=>l[0]})}</div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:18px">
     <div class="card"><h3>Body weight by year</h3>
       ${weightSeries.length>1?lineChart(weightSeries,{unit:"lb",fmt:v=>fmtNum(v,1)+" lb",shortLabel:l=>"'"+l.slice(2)}):`<div class="muted">Not enough weigh-ins recorded.</div>`}
       <div class="note-sm">Pulled from the bare weight readings jotted on the calendar — ${fmtNum(weightAll.length)} weigh-ins${weightAll.length?", range "+fmtNum(Math.min(...weightAll))+"–"+fmtNum(Math.max(...weightAll))+" lb":""}.</div></div>
     <div class="card"><h3>Why days were skipped <span class="muted" style="font-weight:400;font-size:12px">· ${years[0]}–${years[years.length-1]}</span></h3>
       ${restData.some(d=>d.value)?columnChart(restData,{unit:"days"}):`<div class="muted">No rest-reason notes found.</div>`}
       <div class="note-sm">Note-only days across all ${years.length} years (${years[0]}–${years[years.length-1]}), grouped by likely reason and keyword-matched from the diary jottings (medium confidence).</div></div>
   </div>

   <div class="card" style="line-height:1.7">
     <h3>Consistency</h3>
     <div class="kvgrid">
       <div><b>Most active year</b>${topYear?topYear[0]+" — "+fmtNum(topYear[1])+" sessions":"—"}</div>
       <div><b>Busiest day</b>${busiest?busiest[0]+" — "+busiest[1]+" sessions":"—"}</div>
       <div><b>Distinct active days</b>${fmtNum(activeDays.length)}</div>
       <div><b>Longest streak</b>${longest} days</div>
       <div><b>Longest layoff</b>${gap} days between sessions</div>
       <div><b>Training span</b>${(Math.round(spanDays/365.25*10)/10)} years</div>
     </div>
   </div>

   <div class="card" style="margin-top:18px"><h3>By decade</h3>
     <div class="tablewrap"><table><thead><tr><th>Decade</th><th class="num">Workouts</th><th class="num">Distance</th><th class="num">Hours</th><th>Top sport</th></tr></thead>
     <tbody>${decRows.map(o=>`<tr><td><b>${o.dec}s</b></td><td class="num">${fmtNum(o.count)}</td><td class="num">${fmtNum(Math.round(o.dist))} km</td><td class="num">${Math.round(o.dur/3600)}</td><td>${sportTag(o.top)}</td></tr>`).join("")}</tbody></table></div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:18px">
     <div class="card"><h3>🏃 Avg run pace by year</h3>${runTrend.length?columnChart(runTrend,{shortLabel:l=>"'"+l.slice(2),fmt:v=>fmtPace(v)+"/km",unit:"min/km"}):`<div class="muted">Not enough data.</div>`}<div class="note-sm">Shorter = faster · years with &ge;8 runs</div></div>
     <div class="card"><h3>🚴 Avg bike speed by year</h3>${bikeTrend.length?columnChart(bikeTrend,{shortLabel:l=>"'"+l.slice(2),fmt:v=>v.toFixed(1)+" km/h",valFmt:v=>v.toFixed(1),unit:"km/h"}):`<div class="muted">Not enough data.</div>`}<div class="note-sm">Years with &ge;8 rides</div></div>
   </div>

   <div class="card" style="margin-top:18px"><h3>On this day — ${MONTHS[_today.getMonth()]} ${_today.getDate()}</h3>
     ${otd.length?`<div class="kvgrid" style="grid-template-columns:1fr">${otd.map(r=>`<div><b style="display:inline-block;width:42px">${r.d.slice(0,4)}</b>${sportTag(r.s)} <span class="muted">${[fmtDur(r.t),r.k!=null?fmtNum(r.k,1)+" km":"",perf(r)].filter(Boolean).join(" · ")}</span></div>`).join("")}</div>`:`<div class="muted">No workouts recorded on this date in any year.</div>`}
   </div>

   ${topShoes.length?`<div class="card" style="margin-top:18px">
     <h3>Top running shoes by distance</h3>
     <div class="shoebar">
       ${topShoes.map(([nm,km])=>`<div class="shoe">
         <span class="nm" title="${escapeHTML(nm)}">${escapeHTML(nm)}</span>
         <span class="track"><span class="fill" style="width:${(km/shoeMax*100).toFixed(1)}%"></span></span>
         <span class="km">${fmtNum(km)} km</span></div>`).join("")}
     </div>
     <div class="note-sm">Distance attributed to the shoe noted on each run.</div>
   </div>`:""}`;

  // The heatmap is one continuous all-years strip. The Year dropdown scrolls it
  // to that year; scrolling updates the dropdown to match.
  const ysel=document.getElementById("hm-year");
  const scroll=document.getElementById("hm-scroll");
  const grid=scroll&&scroll.querySelector(".hm");
  if(scroll&&grid){
    const kids=grid.children;
    const step=()=>kids.length>1?(kids[1].getBoundingClientRect().left-kids[0].getBoundingClientRect().left)||16:16;
    const yearAt=()=>{ const i=Math.min(kids.length-1,Math.max(0,Math.round(scroll.scrollLeft/step()))); const el=kids[i]; return el?+el.dataset.year:_insightsYear; };
    const sync=()=>{ const y=yearAt(); if(ysel&&+ysel.value!==y)ysel.value=y; _insightsYear=y; };
    const scrollToYear=y=>{ for(let i=0;i<kids.length;i++){ if(+kids[i].dataset.year===y){ scroll.scrollTo({left:i*step(),behavior:"smooth"}); break; } } };
    scroll.addEventListener("scroll",sync,{passive:true});
    grid.addEventListener("click",e=>{ const c=e.target.closest(".hm-cell[data-d]"); if(c) showDayOverlay(c.dataset.d); });
    if(ysel) ysel.onchange=()=>scrollToYear(+ysel.value);
    // jump to the most-active year on open (no smooth animation for the initial jump)
    requestAnimationFrame(()=>{ for(let i=0;i<kids.length;i++){ if(+kids[i].dataset.year===_insightsYear){ scroll.scrollLeft=i*step(); break; } } sync(); });
  }
}

// Tap a calendar square → overlay that day's sessions and totals.
function dayPopup(ds){
  const rows=DATA.filter(r=>r.d===ds && r.s!=="note");
  const dt=new Date(ds+"T00:00:00Z");
  const title=WEEKDAYS[(dt.getUTCDay()+6)%7]+", "+MONTHS[dt.getUTCMonth()]+" "+dt.getUTCDate()+", "+dt.getUTCFullYear();
  let totDur=0,totKm=0; rows.forEach(r=>{ if(r.t)totDur+=r.t; if(r.k)totKm+=r.k; });
  const body=rows.length?rows.map(r=>`<div class="e">${sportTag(r.s)}<span class="meta">${[r.t?fmtDur(r.t):"",r.k!=null?fmtNum(r.k,1)+" km":"",perf(r)].filter(Boolean).join(" · ")||"—"}</span>${r.n?`<div class="note-sm" style="flex-basis:100%;margin-top:2px">${escapeHTML(r.n)}</div>`:""}</div>`).join("")
    :`<div class="muted">No workouts recorded.</div>`;
  const tot=rows.length>1?`<div class="day-tot"><span><b>${rows.length}</b> sessions</span><span><b>${fmtDurShort(totDur)}</b> total</span>${totKm?`<span><b>${fmtNum(totKm,1)}</b> km</span>`:""}</div>`:"";
  return `<div class="day-card">
    <div class="cardhead" style="justify-content:space-between;margin-bottom:6px"><h3 style="margin:0">${title}</h3><button class="day-x" aria-label="Close">✕</button></div>
    ${tot}<div class="cal-detail">${body}</div>
  </div>`;
}
function showDayOverlay(ds){
  let ov=document.getElementById("day-overlay");
  if(!ov){ ov=document.createElement("div"); ov.id="day-overlay"; ov.className="overlay"; document.body.appendChild(ov);
    ov.addEventListener("click",e=>{ if(e.target===ov||e.target.closest(".day-x")) ov.classList.remove("show"); });
    document.addEventListener("keydown",e=>{ if(e.key==="Escape") ov.classList.remove("show"); });
  }
  ov.innerHTML=dayPopup(ds);
  ov.classList.add("show");
}

// GitHub-style activity heatmap spanning ALL years as one continuous Monday-top
// week grid coloured by each day's total training time (empty cells are rest
// days). Returns the month-label row + the week grid; the caller wraps it in a
// horizontal scroller. Each week carries data-year (its Thursday's year,
// ISO-week style) so scrolling can sync the year dropdown to the view.
function activityHeatmap(){
  const day={}, noteDay={};
  let minY=Infinity, maxY=-Infinity;
  for(const r of DATA){
    if(r.s==="note"){ const c=NOTE_CAL[classifyNote(noteText(r))]; if(!c) continue;
      if(!noteDay[r.d] || NOTE_RANK[c]>NOTE_RANK[noteDay[r.d]]) noteDay[r.d]=c; continue; }
    const y=yearOf(r); if(y<minY)minY=y; if(y>maxY)maxY=y;
    const m=day[r.d]||(day[r.d]={c:0,dur:0}); m.c++; if(r.t)m.dur+=r.t; }
  if(!isFinite(minY)) return `<div class="muted">No activity recorded.</div>`;
  // 95th-percentile day by training time → the top ~5% of days get a warm highlight
  const durs=Object.values(day).map(d=>d.dur).filter(v=>v>0).sort((x,y)=>x-y);
  const hot = durs.length>=2 ? durs[Math.floor(durs.length*0.99)] : Infinity;
  const start=new Date(Date.UTC(minY,0,1));
  start.setUTCDate(start.getUTCDate()-((start.getUTCDay()+6)%7));   // back to Monday
  const end=new Date(Date.UTC(maxY,11,31));
  end.setUTCDate(end.getUTCDate()+(6-((end.getUTCDay()+6)%7)));     // forward to Sunday
  const weeks=[]; const cur=new Date(start);
  while(cur<=end){
    const wk=[];
    for(let i=0;i<7;i++){
      const ds=cur.toISOString().slice(0,10), y=cur.getUTCFullYear();
      const inSpan=y>=minY&&y<=maxY, d=day[ds]||{c:0,dur:0};
      wk.push({ds,y,inSpan,c:d.c,dur:d.dur,note:noteDay[ds]||null});
      cur.setUTCDate(cur.getUTCDate()+1);
    }
    weeks.push({cells:wk, year:wk[3].y});   // Thursday's year labels the week
  }
  const color=d=>{
    if(!d.inSpan) return "transparent";
    if(!d.c) return d.note ? NOTE_COL[d.note] : "var(--panel2)";   // no workout: show a diary-note colour if any
    if(d.dur>0 && d.dur>=hot) return "rgba(255,178,90,.95)";   // top ~1% of days by training time
    const h=d.dur/3600, a=!d.dur?.35:h<0.75?.4:h<1.5?.6:h<2.5?.8:1;
    return `rgba(54,194,168,${a})`;
  };
  // Month label sits on the week containing the 1st; January also shows the year.
  const months=weeks.map(w=>{ const f=w.cells.find(d=>d.inSpan&&d.ds.slice(8)==="01");
    if(!f) return ""; const mo=+f.ds.slice(5,7); return mo===1?"'"+f.ds.slice(2,4):MONTHS[mo-1]; });
  const tip=d=>{ if(!d.inSpan) return "";
    if(!d.c) return d.note ? `${d.ds} · ${NOTE_LABEL[d.note]}` : "";
    return `${d.ds} · ${d.c} session${d.c===1?"":"s"}${d.dur?" · "+fmtDurShort(d.dur):""}${d.dur>0&&d.dur>=hot?" · top 1%":""}`; };
  return `<div class="hm-months">${months.map(m=>`<div class="hm-mlabel">${m}</div>`).join("")}</div>
    <div class="hm">${weeks.map(w=>`<div class="hm-week" data-year="${w.year}">${w.cells.map(d=>`<div class="hm-cell"${d.inSpan&&d.c?` data-d="${d.ds}"`:""} style="background:${color(d)}" title="${tip(d)}"></div>`).join("")}</div>`).join("")}</div>`;
}

//============================================================ ABOUT
function renderAbout(app){
  const conf={};DATA.forEach(r=>conf[r.c]=(conf[r.c]||0)+1);
  app.innerHTML=`
   <h2 class="section">About this log</h2>
   <div class="card" style="margin-bottom:14px;max-width:760px;line-height:1.7">
     <h3>The sources</h3>
     <p>This site is built from two records Mike kept by hand: a decades-long
     <b>training log</b> — a weekly calendar grid where each day's workout was
     jotted in shorthand — and a separate, more precise <b>running log</b> with
     exact distances and times. Together they span
     ${META.span[0].slice(0,4)}–${META.span[1].slice(0,4)}, mostly predating GPS
     watches, so every distance and time here is as Mike noted it at the time, not
     a device reading.</p>

     <h3 style="margin-top:18px">Merging the two logs</h3>
     <p>Many runs appear in <i>both</i> records. Where a running-log entry matched
     one in the training grid (same date, comparable distance and time), the
     duplicate was dropped and the richer <b>running-log</b> version kept.
     Everything else in the grid — swims, rides, hockey, ski days and the rest —
     was carried over as recorded.</p>

     <h3 style="margin-top:18px">Reading the shorthand</h3>
     <p>The grid cells were terse — typically a distance, sometimes a time, and
     occasionally a letter or word for the activity. Each cell was parsed to
     recover three things: the <b>sport</b>, the <b>duration</b> and the
     <b>distance</b>. Figures were normalised to common units (distances to
     kilometres, times to seconds) so pace and speed could be derived
     consistently across thirty-plus years of notation.</p>

     <h3 style="margin-top:18px">Identifying the sport</h3>
     <p>When a cell named the activity — a code or word such as <code>r</code>=run,
     <code>s</code>=swim, <code>b</code>=bike, or spelled-out hockey, karate, XC
     ski, snowboard and others — that was taken at face value. When it didn't, the
     sport was <b>deduced</b> from the numbers:</p>
     <ul>
       <li><b>A distance with no time</b> → almost always a bike ride.</li>
       <li><b>A distance and a time</b> → classified by the implied pace or speed —
         roughly <b>bike</b> 25–30 km/h, <b>run</b> 3:30–5:30 /km, <b>swim</b>
         ~1:45 /100 m. Entries that landed cleanly inside a band were labelled with
         that sport; borderline ones were flagged rather than forced.</li>
     </ul>

     <h3 style="margin-top:18px">How sure each entry is</h3>
     <p>Every entry carries a confidence tag so you can weigh it yourself:</p>
     <ul>
       <li><span class="pill">confirmed</span> — the sport was stated explicitly in the log.</li>
       <li><span class="pill d">deduced</span> — inferred from pace/speed or context, with good confidence.</li>
       <li><span class="pill u">uncertain</span> — genuinely ambiguous; the best available guess, so treat it loosely.</li>
     </ul>
     <p>Nothing is discarded in the process: the <b>original shorthand is kept on
     every entry</b> and shown in the <b>Raw Data</b> tab, so any interpretation
     can be checked against exactly what Mike wrote.</p>

     <h3 style="margin-top:18px">Worth keeping in mind</h3>
     <p>These are hand-kept records across more than three decades, so occasional
     gaps, rounding, and the odd ambiguous cell come with the territory. Charts and
     totals count only real workouts — rest days and plain notes are excluded — and
     distance- or pace-based figures only draw on entries that actually recorded
     those numbers.</p>
   </div>

   <!-- Considerations: a living QA log of known data-quality issues. Add a <li>
        with a status pill (d = mitigated, u = still open) as we find/fix things;
        flip a pill to "confirmed" + reword once an item is fully resolved. -->
   <div class="card" style="margin-bottom:14px;max-width:760px;line-height:1.7">
     <h3>Considerations — known data issues</h3>
     <p>QA on this dataset is ongoing. Below is a running list of quirks we've
     found in the parsed data and how each is currently handled. It will be
     updated as the source is audited and corrected.</p>
     <ul>
       <li><span class="pill d">mitigated</span> <b>Impossible cycling / running speeds.</b>
         Some times written as <code>H:MM</code> were parsed as <code>M:SS</code>
         (durations come out ~60× too short), and a few cells merged two numbers
         into a single distance — together producing absurd figures (e.g. 140 km/h
         "rides"). The yearly <b>Avg bike speed</b> and <b>Avg run pace</b> charts
         now ignore physically impossible entries; a year left with fewer than 8
         sane rides reads <i>“Not enough data.”</i></li>
       <li><span class="pill d">mitigated</span> <b>Track intervals filed as cycling.</b>
         Workouts written as track repeats (<code>8×475 @1:27</code>,
         <code>6×800 on 2:41</code>) had been deduced as bike rides. 42 such
         entries were moved to <b>run</b> at the source — their per-rep split
         times (not session lengths) were dropped. Two ambiguous <code>p8-p9</code>
         rows were left unchanged.</li>
       <li><span class="pill u">open</span> <b>Raw per-ride pace / speed.</b> The
         Pace / Speed column in the <b>Raw Data</b> tab still shows the unfiltered
         value for those mis-parsed entries, so individual rows can still look off.</li>
       <li><span class="pill u">open</span> <b>Distance vs. time mix-ups.</b>
         Shorthand containing two numbers (e.g. <code>9.2 47</code>) sometimes
         stores the time where the distance should be. Being audited.</li>
       <li><span class="pill u">open</span> <b>Fix at the source.</b> The items
         above are guards inside the app; the underlying data file should be
         regenerated with corrected time parsing so the numbers are right at the
         source, not just hidden from the charts.</li>
       <li><span class="pill d">interpreted</span> <b>Diary notes turned into data.</b>
         Many "note" days are actually <b>weigh-ins</b> (a bare number in lb) or a
         reason a day was skipped (injury, illness, travel, recovery). These power
         the <i>Body weight</i> and <i>Why days were skipped</i> charts and the
         tinted squares on the activity calendar. Classification is keyword-based
         (medium confidence), so the odd note may be mis-bucketed.</li>
     </ul>
     <p class="note-sm">Spotted something off? It's almost certainly in the
     original shorthand — open the <b>Raw Data</b> tab to see exactly what Mike
     wrote for that entry.</p>
   </div>

   <div class="grid stat-row" style="max-width:760px">
     <div class="card stat"><div class="num">${fmtNum(META.count)}</div><div class="lbl">total entries</div></div>
     <div class="card stat"><div class="num">${fmtNum(conf.x||0)}</div><div class="lbl">confirmed</div></div>
     <div class="card stat"><div class="num">${fmtNum(conf.d||0)}</div><div class="lbl">deduced</div></div>
     <div class="card stat"><div class="num">${fmtNum(conf.u||0)}</div><div class="lbl">uncertain</div></div>
   </div>
   <div class="note-sm" style="margin-top:14px">Generated ${META.generated}. Span ${META.span[0]} → ${META.span[1]}.</div>`;
}

     <code>data.json</code>. View it through the GitHub Pages link, or run a local server

});

//============================================================ mobile bottom nav
// A fixed, thumb-reachable tab bar for phones. Built additively: it drives the
// existing go() router and mirrors its active state, so it needs no changes to
// the routing code above.
(function(){
  const ICONS = {
    dash:    '<path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.6V21h13V9.6"/>',
    insights:'<path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-3.8 10.6c.6.5.8 1 .8 2.4h6c0-1.4.2-1.9.8-2.4A6 6 0 0 0 12 3Z"/>',
    reports: '<path d="M4 21V10"/><path d="M10 21V4"/><path d="M16 21v-7"/><path d="M21 21H3"/>',
    browse:  '<path d="M4 6h16M4 12h16M4 18h16"/>',
    about:   '<circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r="1.1" fill="currentColor" stroke="none"/>',
  };
  const SHORT = {dash:"Home", insights:"Insights", reports:"Reports", browse:"Data", about:"About"};
  const nav = document.getElementById("bottomnav");
  if(!nav || typeof TABS==="undefined") return;
  nav.innerHTML = TABS.map(([id])=>
    `<button data-tab="${id}" aria-label="${SHORT[id]||id}">
       <svg viewBox="0 0 24 24" aria-hidden="true">${ICONS[id]||""}</svg>
       <span>${SHORT[id]||id}</span></button>`).join("");
  const sync = ()=>nav.querySelectorAll("button").forEach(b=>
    b.classList.toggle("active", b.dataset.tab===current));
  nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{ go(b.dataset.tab); sync(); });
  // Wrap go() so the bar tracks navigation triggered anywhere (tabs, drill-ins).
  if(typeof go==="function"){ const _go=go; window.go=function(t){ _go(t); sync(); }; }
  window.addEventListener("hashchange", sync);
  sync();
})();

//============================================================ QOL: nav helpers
// Back-to-top button, tap-the-brand-to-go-home, and 1..N keyboard tab jumps.
// Additive: relies on the existing go()/TABS, touches no render code.
(function(){
  const btn=document.createElement("button");
  btn.id="toTop"; btn.type="button"; btn.setAttribute("aria-label","Back to top");
  btn.innerHTML='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V6"/><path d="M6 12l6-6 6 6"/></svg>';
  btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
  document.body.appendChild(btn);
  const onScroll=()=>btn.classList.toggle("show",(window.scrollY||document.documentElement.scrollTop)>320);
  window.addEventListener("scroll",onScroll,{passive:true}); onScroll();

  const brand=document.querySelector(".brand");
  if(brand){ brand.setAttribute("role","button"); brand.title="Back to Dashboard"; brand.onclick=()=>go("dash"); }

  document.addEventListener("keydown",e=>{
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    const tag=(e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="select"||tag==="textarea"||e.target.isContentEditable) return;
    if(typeof TABS==="undefined") return;
    const n=parseInt(e.key,10);
    if(n>=1 && n<=TABS.length) go(TABS[n-1][0]);
  });
})();

// Pin the fixed bottom nav to the VISUAL viewport. On iOS Safari the visual
// viewport (URL bar collapsed) is taller than the layout viewport that
// position:fixed;bottom:0 anchors to, so the bar drifts up and the page shows
// through below it. visualViewport gives the real offset; translate to correct
// it. No-op where unsupported (delta ~0 on desktop / standalone).
(function(){
  const vv = window.visualViewport;
  const nav = document.getElementById("bottomnav");
  if(!vv || !nav) return;
  let raf = 0;
  const pin = ()=>{ raf=0;
    const delta = document.documentElement.clientHeight - (vv.height + vv.offsetTop);
    nav.style.transform = `translateY(${-delta}px)`;
  };
  const sched = ()=>{ if(!raf) raf=requestAnimationFrame(pin); };
  vv.addEventListener("resize", sched);
  vv.addEventListener("scroll", sched);
  window.addEventListener("orientationchange", sched);
  pin();
})();
