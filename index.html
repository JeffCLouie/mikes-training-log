function collectFilter(){
  const v=id=>document.getElementById(id).value;
  const sportsBox=document.getElementById("b-sports");
  const checked=[...sportsBox.querySelectorAll('input:checked')].map(i=>i.value).filter(x=>x!=="__all");
  return {y0:v("b-y0"),y1:v("b-y1"),src:v("b-src"),conf:v("b-conf"),
    kmin:v("b-kmin"),q:v("b-q").toLowerCase(),sports:checked};
}
function filterRows(f){
  return DATA.filter(r=>{
    if(f.sports.length && !f.sports.includes(r.s)) return false;
    if(!f.sports.length && r.s==="note") {/* include notes only if explicitly chosen */ }
    const y=yearOf(r);
    if(f.y0 && y<+f.y0) return false;
    if(f.y1 && y>+f.y1) return false;
    if(f.src && r.src!==f.src) return false;
    if(f.conf && r.c!==f.conf) return false;
    if(f.kmin && (!r.k || r.k<+f.kmin)) return false;
    if(f.q && !(r.r||"").toLowerCase().includes(f.q) && !(r.n||"").toLowerCase().includes(f.q)) return false;
    return true;
  });
}
function runBuilder(csv){
  const f=collectFilter(); BUILDER.f=f;
  const rows=filterRows(f);
  const group=document.getElementById("b-group").value;
  const sortBy=document.getElementById("b-sort").value;
  const keyFn={
    year:r=>String(yearOf(r)), sport:r=>sportName(r.s),
    year_sport:r=>yearOf(r)+" · "+sportName(r.s),
    month:r=>MONTHS[monthOf(r)-1], ym:r=>r.d.slice(0,7),
    weekday:r=>WEEKDAYS[weekdayOf(r)], none:_=>"All",
  }[group];
  const groups={};
  for(const r of rows){ const k=keyFn(r); (groups[k]||(groups[k]=[])).push(r); }
  let entries=Object.entries(groups).map(([k,rs])=>{const a=agg(rs);return {k,...a,
     avgKm:a.dCount?a.dist/a.dCount:0, avgDur:a.tCount?a.dur/a.tCount:0};});
  // sort
  const monthOrder=MONTHS, wdOrder=WEEKDAYS;
  entries.sort((a,b)=>{
    if(sortBy==="key"){
      if(group==="month") return monthOrder.indexOf(a.k)-monthOrder.indexOf(b.k);
      if(group==="weekday") return wdOrder.indexOf(a.k)-wdOrder.indexOf(b.k);
      return a.k<b.k?-1:a.k>b.k?1:0;
    }
    return b[sortBy]-a[sortBy];
  });
  const tot=agg(rows);
  if(csv){ exportCSV(entries,group); return; }
  const out=document.getElementById("b-out");
  if(!rows.length){ out.innerHTML=`<div class="card">No entries match these filters.</div>`; return; }
  const showChart = entries.length>1 && entries.length<=60;
  const chartData=entries.map(e=>({label:e.k,value:e.count}));
  out.innerHTML=`
   <div class="grid stat-row" style="margin-bottom:14px">
     <div class="card stat"><div class="num">${fmtNum(tot.count)}</div><div class="lbl">matching workouts</div></div>
     <div class="card stat"><div class="num">${fmtNum(tot.dist)}</div><div class="lbl">total km</div></div>
     <div class="card stat"><div class="num">${Math.round(tot.dur/3600)}</div><div class="lbl">total hours</div></div>
     <div class="card stat"><div class="num">${entries.length}</div><div class="lbl">groups</div></div>
   </div>
   ${showChart?`<div class="card" style="margin-bottom:14px"><h3>Sessions by ${group.replace("_"," + ")}</h3>
      ${columnChart(chartData,{shortLabel:l=>l.length>6?l.slice(0,6):l})}</div>`:""}
   <div class="card"><h3>Results</h3>
   <div class="note-sm" style="margin-bottom:8px">One row per ${group==="none"?"selection (all matches combined)":group.replace("_"," + ")}. <b>Avg km</b> and <b>Avg time</b> are per-session averages within the row; <b>Total time</b> is summed moving time.</div>
   <div class="tablewrap"><table><thead><tr>
     <th>${group==="none"?"Total":group.replace("_"," + ")}</th>
     <th class="num">Sessions</th><th class="num">Distance</th><th class="num">Avg km</th>
     <th class="num">Total time</th><th class="num">Avg time</th></tr></thead>
   <tbody>${entries.map(e=>`<tr>
     <td>${e.k}</td><td class="num">${fmtNum(e.count)}</td>
     <td class="num">${e.dist?fmtNum(e.dist)+" km":"—"}</td>
     <td class="num">${e.avgKm?fmtNum(e.avgKm,1):"—"}</td>
     <td class="num">${e.dur?fmtDurShort(e.dur):"—"}</td>
     <td class="num">${e.avgDur?fmtDur(Math.round(e.avgDur)):"—"}</td></tr>`).join("")}
   </tbody></table></div></div>`;
}
function exportCSV(entries,group){
  const head=["group","sessions","distance_km","avg_km","total_seconds","avg_seconds"];
  const lines=[head.join(",")].concat(entries.map(e=>
    [`"${e.k}"`,e.count,e.dist.toFixed(2),e.avgKm.toFixed(2),Math.round(e.dur),Math.round(e.avgDur)].join(",")));
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`mike-report-${group}.csv`; a.click();
}

//============================================================ RAW DATA BROWSE
// Rows-per-page choices for the data tab. 250 default so scanning 12k+ entries
// isn't a 50-at-a-time slog; "All" (1e9) drops the cap entirely.
const PER_CHOICES=[50,100,250,500,1000000000];
const perLabel=v=>v>=1e9?"All":String(v);
const BROWSE={page:0,per:250,sort:"d",dir:-1,rows:null};
const BROWSE_FIELDS=[["x-q","q"],["x-sport","sport"],["x-year","year"],["x-src","src"],["x-conf","conf"]];
// reflect current filters into the URL so refresh / sharing keeps them
function syncBrowseURL(){
  const p=new URLSearchParams();
  BROWSE_FIELDS.forEach(([id,key])=>{ const v=document.getElementById(id).value; if(v) p.set(key,v); });
  const qs=p.toString();
  history.replaceState(null,"","#browse"+(qs?"?"+qs:""));   // replaceState => no hashchange loop
}
function prefillBrowseFromURL(){
  const qi=location.hash.indexOf("?"); if(qi<0) return;
  const p=new URLSearchParams(location.hash.slice(qi+1));
  BROWSE_FIELDS.forEach(([id,key])=>{ if(p.has(key)){ const el=document.getElementById(id); if(el) el.value=p.get(key); }});
}
function renderBrowse(app){
  const years=[...new Set(DATA.map(yearOf))].sort((a,b)=>b-a);
  const sports=globalSportOrder().filter(s=>SPORTS[s]);
  app.innerHTML=`
   <h2 class="section">Raw Data</h2>
   <div class="card controls" style="margin-bottom:14px">
     <label class="fld">Search<input type="text" id="x-q" placeholder="notes / raw text…"></label>
     <label class="fld" style="max-width:150px">Sport<select id="x-sport"><option value="">all</option>${sports.map(s=>`<option value="${s}">${sportName(s)}</option>`).join("")}</select></label>
     <label class="fld" style="max-width:120px">Year<select id="x-year"><option value="">all</option>${years.map(y=>`<option>${y}</option>`).join("")}</select></label>
     <label class="fld" style="max-width:150px">Source<select id="x-src"><option value="">all</option><option value="t">training log</option><option value="r">running log</option></select></label>
     <label class="fld" style="max-width:150px">Confidence<select id="x-conf"><option value="">all</option><option value="x">confirmed</option><option value="d">deduced</option><option value="u">uncertain</option></select></label>
     <button class="btn ghost" id="x-clear">Clear</button>
     <button class="btn ghost" id="x-csv">Export CSV</button>
   </div>
   <div class="muted" id="x-count" style="margin-bottom:8px"></div>
   <div class="tablewrap"><table id="x-table"></table></div>
   <div class="pager" id="x-pager"></div>`;
  const debounce=(fn,ms)=>{let t;return()=>{clearTimeout(t);t=setTimeout(fn,ms);};};
  const redraw=()=>{BROWSE.page=0;syncBrowseURL();drawBrowse();};
  document.getElementById("x-q").oninput=debounce(redraw,180);   // smooth typing over 12k rows
  ["x-sport","x-year","x-src","x-conf"].forEach(id=>document.getElementById(id).onchange=redraw);
  document.getElementById("x-clear").onclick=()=>{
    BROWSE_FIELDS.forEach(([id])=>document.getElementById(id).value="");
    redraw();
  };
  document.getElementById("x-csv").onclick=exportRawCSV;
  prefillBrowseFromURL();   // restore filters from the URL (refresh / shared link)
  drawBrowse();
}
function exportRawCSV(){
  const rows=BROWSE.rows||[];
  const head=["date","sport","duration_sec","distance_km","heart_rate","avg_speed_kmh","source","classification","note","raw"];
  const esc=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const lines=[head.join(",")].concat(rows.map(r=>[
    r.d,sportName(r.s),r.t||"",r.k==null?"":r.k,r.h||"",r.a||"",
    r.src==="r"?"running":"training",CONF[r.c],r.n||"",r.r||""
  ].map(esc).join(",")));
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="mike-raw-data.csv"; a.click();
}
function applyBuilderToBrowse(){
  const f=BUILDER.f||{};
  if(f.q!==undefined) document.getElementById("x-q").value=f.q||"";
  if(f.src) document.getElementById("x-src").value=f.src;
  if(f.conf) document.getElementById("x-conf").value=f.conf;
  if(f.sports&&f.sports.length===1) document.getElementById("x-sport").value=f.sports[0];
  if(f.y0&&f.y0===f.y1) document.getElementById("x-year").value=f.y0;
  syncBrowseURL(); drawBrowse();
}
function browseFilter(){
  const q=document.getElementById("x-q").value.toLowerCase();
  const sport=document.getElementById("x-sport").value;
  const year=document.getElementById("x-year").value;
  const src=document.getElementById("x-src").value;
  const conf=document.getElementById("x-conf").value;
  return DATA.filter(r=>{
    if(sport&&r.s!==sport) return false;
    if(year&&yearOf(r)!==+year) return false;
    if(src&&r.src!==src) return false;
    if(conf&&r.c!==conf) return false;
    if(q&&!(r.r||"").toLowerCase().includes(q)&&!(r.n||"").toLowerCase().includes(q)) return false;
    return true;
  });
}
const BROWSE_COLS=[
  ["d","Date",0],["s","Sport",0],["t","Duration",1],["k","Distance",1],
  ["perf","Pace / Speed",1],["h","HR",1],["src","Source",0],["c","Conf",0],["r","Notes / raw",0],
];
function drawBrowse(){
  let rows=browseFilter();
  const {sort,dir}=BROWSE;
  rows.sort((a,b)=>{
    let av,bv;
    if(sort==="perf"){av=a.t&&a.k?a.t/a.k:0;bv=b.t&&b.k?b.t/b.k:0;}
    else {av=(a[sort]==null?-Infinity:a[sort]);bv=(b[sort]==null?-Infinity:b[sort]);}
    if(av<bv)return -dir; if(av>bv)return dir; return 0;
  });
  BROWSE.rows=rows;
  const total=rows.length, pages=Math.max(1,Math.ceil(total/BROWSE.per));
  if(BROWSE.page>=pages)BROWSE.page=0;
  const start=BROWSE.page*BROWSE.per;
  const slice=rows.slice(start,start+BROWSE.per);
  document.getElementById("x-count").textContent= total
    ? `Showing ${fmtNum(start+1)}–${fmtNum(start+slice.length)} of ${fmtNum(total)} entries`
    : "No entries match these filters.";
  const th=BROWSE_COLS.map(([k,lbl,num])=>`<th class="sortable ${num?'num':''}" data-k="${k}">${lbl}${BROWSE.sort===k?(BROWSE.dir>0?" ▲":" ▼"):""}</th>`).join("");
  const body=slice.map((r,i)=>rowHTML(r,start+i)).join("");
  const tbl=document.getElementById("x-table");
  tbl.innerHTML=`<thead><tr>${th}</tr></thead><tbody>${body}</tbody>`;
  // One delegated handler covers header sorting + row expand, so large page
  // sizes (250/500/All) don't bind thousands of per-row listeners.
  tbl.onclick=e=>{
    const h=e.target.closest("th.sortable");
    if(h){
      const k=h.dataset.k;
      if(BROWSE.sort===k)BROWSE.dir*=-1; else {BROWSE.sort=k;BROWSE.dir=(k==="d")?-1:1;}
      drawBrowse(); return;
    }
    const tr=e.target.closest("tr.datarow");
    if(tr) toggleDetail(tr);
  };
  // pager + rows-per-page picker
  const pg=document.getElementById("x-pager");
  pg.innerHTML=`<button ${BROWSE.page===0?"disabled":""} id="pg-prev">‹ Prev</button>
    <span class="muted">Page ${BROWSE.page+1} / ${pages}</span>
    <button ${BROWSE.page>=pages-1?"disabled":""} id="pg-next">Next ›</button>
    <label class="muted" style="margin-left:14px">Rows&nbsp;<select id="pg-per">${PER_CHOICES.map(v=>`<option value="${v}" ${BROWSE.per===v?"selected":""}>${perLabel(v)}</option>`).join("")}</select></label>`;
  const prev=document.getElementById("pg-prev"),next=document.getElementById("pg-next"),per=document.getElementById("pg-per");
  if(prev)prev.onclick=()=>{BROWSE.page--;drawBrowse();window.scrollTo(0,0);};
  if(next)next.onclick=()=>{BROWSE.page++;drawBrowse();window.scrollTo(0,0);};
  if(per)per.onchange=()=>{BROWSE.per=+per.value;BROWSE.page=0;drawBrowse();window.scrollTo(0,0);};
}
function rowHTML(r,idx){
  const sp=sportTag(r.s);
  const confPill=r.c==="x"?"":`<span class="pill ${r.c}">${CONF[r.c]}</span>`;
  return `<tr class="datarow" data-idx="${idx}">
    <td>${r.d}</td><td>${sp}</td>
    <td class="num">${fmtDur(r.t)||"—"}</td>
    <td class="num">${r.k!=null?fmtNum(r.k,1)+" km":"—"}</td>
    <td class="num">${perf(r)||"—"}</td>
    <td class="num">${r.h||"—"}</td>
    <td>${r.src==="r"?"running":"training"}</td>
    <td>${confPill||'<span class="pill">ok</span>'}</td>
    <td>${escapeHTML(r.n||r.r||"").slice(0,46)}</td></tr>`;
}
function toggleDetail(tr){
  const next=tr.nextElementSibling;
  if(next&&next.classList.contains("row-detail")){ next.remove(); return; }
  const r=BROWSE.rows[+tr.dataset.idx];
  const tdcount=BROWSE_COLS.length;
  const det=document.createElement("tr"); det.className="row-detail";
  det.innerHTML=`<td colspan="${tdcount}">
    <div class="kvgrid">
      <div><b>Date</b>${r.d} (${WEEKDAYS[weekdayOf(r)]})</div>
      <div><b>Sport</b>${sportName(r.s)}</div>
      <div><b>Duration</b>${fmtDur(r.t)||"—"}</div>
      <div><b>Distance</b>${r.k!=null?fmtNum(r.k,2)+" km":"—"}</div>
      <div><b>Pace / Speed</b>${perf(r)||"—"}</div>
      <div><b>Heart rate</b>${r.h?r.h+" bpm":"—"}</div>
      <div><b>Avg speed (logged)</b>${r.a?r.a+" km/h":"—"}</div>
      ${r.sh?`<div><b>Shoe</b>${escapeHTML(r.sh)}</div>`:""}
      <div><b>Source</b>${r.src==="r"?"running log":"training log"}</div>
      <div><b>Classification</b>${CONF[r.c]}</div>
    </div>
    ${r.n?`<div class="note-sm" style="margin-top:8px"><b>Note:</b> ${escapeHTML(r.n)}</div>`:""}
    <div class="rawbox">${escapeHTML(r.r)}</div>
  </td>`;
  tr.after(det);
}
function escapeHTML(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

//============================================================ INSIGHTS
// ── Notes as data ─────────────────────────────────────────────────────────
// Note-only rows (no sport/distance) are Mike's diary jottings. With medium/
// high-confidence keyword matching we pull out the reason a day had no workout —
// injury, illness, a deliberate rest day, therapy/recovery, travel, or a home
// project. Each is its own category (colour). Order = match priority; the first
// regex that hits wins. Anything unmatched is "other" and stays uncoloured.
const NOTE_CATS = [
  ["race",     /\b(triathlon|duathlon|biathlon|tri|relay|race|sprint|marathon|worlds?|championships?|champs|dnf|dns|oac|national capital|nat\.? ?cap|beat beethoven|rockland|shuffle)\b/i],
  ["injury",   /\b(back|knee|foot|feet|ankle|hip|shin|calf|hamstring|hams|groin|crotch|shoulder|heel|achilles|wrist|numb|orthotics?|sore|hurt|injur|sprain|strain|pain|tendon|sciatic|blister)\b/i],
  ["illness",  /\b(sick|flu|ill|fever|cold|chills|nausea|dizzy|tired|exhaust|cough|throat|stomach|migraine|headache|virus)\b/i],
  ["weather",  /\b(snow ?day|snow ?storm|storm|blizzard|flood(?:ed|ing)?|hurricane|ice ?storm|washout)\b/i],
  ["rest",     /\b(rest|day ?off|off day|easy day|lazy)\b/i],
  ["recovery", /\b(massage|physio|chiro|acupunct\w*|recover|stretch|rehab|sauna|foam ?roll|ice ?bath|art)\b/i],
  ["travel",   /\b(mexico|camping|vacation|trip|cottage|florida|cuba|tremblant|stockholm|away|holiday|christmas|xmas|wedding|conference|flight|airport)\b/i],
  ["home",     /\b(roof|porch|firewood|patio|kitchen|deck|fence|garage|paint|yard|lawn|mow|shovel|reno|drywall|basement|shed|gutter|boards|cables|garden|plant|aralia|weed|mulch|wood|floor|tile|shingle|caulk|stain|chores?)\b/i],
];
function noteText(r){ return (r.n||r.r||"").trim(); }
function classifyNote(t){ for(const [c,re] of NOTE_CATS) if(re.test(t)) return c; return "other"; }
// How each note category surfaces on the activity calendar: a distinct colour, a
// label, and a rank (when a day has several notes, the highest-rank one colours
// the square — race/health first).
const NOTE_COL  = { race:"rgba(228,80,200,.90)", injury:"rgba(224,90,108,.80)", illness:"rgba(232,150,60,.80)", weather:"rgba(200,212,224,.80)", rest:"rgba(125,142,170,.82)", recovery:"rgba(80,180,220,.74)", travel:"rgba(150,130,255,.72)", home:"rgba(190,140,85,.76)" };
const NOTE_RANK = { race:7, injury:6, illness:5, weather:4.5, rest:4, recovery:3, travel:2, home:1 };
const NOTE_LABEL= { race:"race / event", injury:"injury", illness:"illness", weather:"weather day", rest:"rest day", recovery:"therapy / recovery", travel:"travel", home:"home project" };

let _insightsYear = null;
function renderInsights(app){
  const real = filtered(DATA).filter(r=>r.s!=="note");
  const a = agg(real);
  const years = [...new Set(real.map(yearOf))].sort((x,y)=>x-y);
  const dnum = ds => Math.floor(Date.parse(ds+"T00:00:00Z")/864e5);

  // total running distance (for the marathon equivalence)
  let runKm=0; for(const r of real) if(r.s==="run"&&r.k) runKm+=r.k;
  // distinct active days power the streak + average stats
  const activeDays=[...new Set(real.map(r=>r.d))].sort();
  const spanDays = activeDays.length>1 ? dnum(activeDays[activeDays.length-1])-dnum(activeDays[0])+1 : 1;
  const perWeek = a.count/(spanDays/7);
  // most active year + busiest single day
  const yc={}; real.forEach(r=>{const y=yearOf(r);yc[y]=(yc[y]||0)+1;});
  const topYear = Object.entries(yc).sort((x,y)=>y[1]-x[1])[0];
  const dc={}; real.forEach(r=>{dc[r.d]=(dc[r.d]||0)+1;});
  const busiest = Object.entries(dc).sort((x,y)=>y[1]-x[1])[0];

  // streaks: longest run of consecutive calendar days trained + longest layoff
  let longest=0, cur=0, prev=null;
  for(const ds of activeDays){ const n=dnum(ds);
    cur = (prev!==null && n===prev+1) ? cur+1 : 1; if(cur>longest) longest=cur; prev=n; }
  let gap=0; for(let i=1;i<activeDays.length;i++){ const g=dnum(activeDays[i])-dnum(activeDays[i-1]); if(g>gap) gap=g; }

  // real-world equivalences for the fun-fact row
  const equator=a.dist/40075, moonPct=a.dist/384400*100, marathons=runKm/42.195, totalDays=a.dur/86400;
  const fact=(icon,big,sub)=>`<div class="card stat fact"><span class="big">${icon}</span><span class="ftxt"><b>${big}</b><span>${sub}</span></span></div>`;

  if(_insightsYear===null || !years.includes(_insightsYear))
    _insightsYear = topYear ? +topYear[0] : years[years.length-1];

  // weekly + seasonal training patterns
  const dow = WEEKDAYS.map(w=>({label:w, value:0}));
  real.forEach(r=>{ const d=new Date(r.d+"T00:00:00Z").getUTCDay(); dow[(d+6)%7].value++; });
  const mon = MONTHS.map(m=>({label:m, value:0}));
  real.forEach(r=>{ mon[monthOf(r)-1].value++; });

  // shoe mileage leaderboard (running km attributed to each shoe)
  const shoes={};
  for(const r of real){ if(r.s!=="run"||!r.sh||!r.k) continue; shoes[r.sh]=(shoes[r.sh]||0)+r.k; }
  const topShoes=Object.entries(shoes).sort((x,y)=>y[1]-x[1]).slice(0,10);
  const shoeMax=topShoes.length?topShoes[0][1]:1;

  // extra fun-fact equivalences + standout sessions
  let bikeKm=0, swimKm=0, runSec=0, longSession=null; const dayKm={};
  for(const r of real){
    if(r.s==="bike"&&r.k) bikeKm+=r.k;
    if(r.s==="swim"&&r.k) swimKm+=r.k;
    if(r.s==="run"&&r.t) runSec+=r.t;
    if(r.t && (!longSession || r.t>longSession.t)) longSession=r;
    if(r.k) dayKm[r.d]=(dayKm[r.d]||0)+r.k;
  }
  const toursDeFrance=bikeKm/3360, channels=swimKm/33.8;  // a Tour ≈ 3360 km, the Channel ≈ 33.8 km
  const coverage=activeDays.length/spanDays*100;
  const runPace=runKm>0?(runSec/60)/runKm:0;              // lifetime avg run pace (min/km)
  const bigDay=Object.entries(dayKm).sort((x,y)=>y[1]-x[1])[0];
  const distinctShoes=Object.keys(shoes).length;
  const sportCount=new Set(real.map(r=>r.s)).size;

  // complementary insight cards (on-this-day / by-decade / fitness trends)
  const _today=new Date(), _md=pad(_today.getMonth()+1)+"-"+pad(_today.getDate());
  const otd=real.filter(r=>r.d.slice(5)===_md).sort((x,y)=>x.d<y.d?-1:1);
  const dec={};
  for(const r of real){ const k=Math.floor(yearOf(r)/10)*10;
    const o=dec[k]||(dec[k]={count:0,dist:0,dur:0,sp:{}});
    o.count++; o.dist+=r.k||0; o.dur+=r.t||0; o.sp[r.s]=(o.sp[r.s]||0)+1; }
  const decRows=Object.keys(dec).sort().map(k=>{const o=dec[k];
    return {dec:k,count:o.count,dist:o.dist,dur:o.dur,top:Object.entries(o.sp).sort((x,y)=>y[1]-x[1])[0][0]};});
  const _trend=(sp,kind)=>{
    // Plausibility guard: the source shorthand sometimes mis-parses an H:MM time
    // as M:SS (durations come out ~60x too short) or scrambles distance, which
    // produces absurd implied speeds (e.g. 140 km/h bikes). Only count rides
    // whose implied speed is physically sane so a few bad entries can't poison
    // the yearly average. bike: 5–45 km/h · run: 4–22 km/h (~15:00 to ~2:43/km).
    const sane=r=>{ if(!r.t||!r.k) return false; const v=r.k/(r.t/3600);
      return sp==="bike" ? (v>=5&&v<=45) : (v>=4&&v<=22); };
    const ys=[...new Set(real.filter(r=>r.s===sp).map(yearOf))].sort(); const out=[];
    for(const y of ys){ const rs=real.filter(r=>r.s===sp&&yearOf(r)===y&&sane(r)); if(rs.length<8) continue;
      const t=rs.reduce((a,r)=>a+r.t,0),k=rs.reduce((a,r)=>a+r.k,0);
      out.push({label:String(y),value:kind==="pace"?(t/60)/k:k/(t/3600)}); } return out; };
  const runTrend=_trend("run","pace"), bikeTrend=_trend("bike","speed");

  // Notes as data: the reasons there was no workout.
  const restCnt={injury:0,illness:0,weather:0,rest:0,recovery:0,travel:0,home:0};
  for(const r of DATA){ if(r.s!=="note") continue;
    const c=classifyNote(noteText(r)); if(restCnt[c]!=null) restCnt[c]++; }
  const restData=[
    {label:"Injury",   value:restCnt.injury,   color:"#e05a6c"},
    {label:"Illness",  value:restCnt.illness,  color:"#e8963c"},
    {label:"Weather",  value:restCnt.weather,  color:"#c8d4e0"},
    {label:"Rest",     value:restCnt.rest,     color:"#e1cd5a"},
    {label:"Recovery", value:restCnt.recovery, color:"#4db6e6"},
    {label:"Travel",   value:restCnt.travel,   color:"#8a7dff"},
    {label:"Home",     value:restCnt.home,     color:"#be8c55"},
  ];

  // More patterns: annual volume + sport mix. (Cumulative distance lives in the
  // Reports distance report; active days per year in Reports > Consistency.)
  const kmByYear={}; for(const r of real) if(r.k) kmByYear[yearOf(r)]=(kmByYear[yearOf(r)]||0)+r.k;
  const volYears=Object.keys(kmByYear).sort();
  const distByYear=volYears.map(y=>({label:y, value:Math.round(kmByYear[y])}));
  const sportCnt={}; for(const r of real) sportCnt[r.s]=(sportCnt[r.s]||0)+1;

  app.innerHTML=`
   <h2 class="section">Insights</h2>

     ${fact("🌙", fmtNum(moonPct,1)+"%", "of the way to the Moon")}
     ${fact("🏅", fmtNum(marathons), "marathons' worth of running")}
     ${fact("⏱️", fmtNum(totalDays,1)+" days", "spent training, non-stop")}
     ${fact("📅", fmtNum(perWeek,1)+"/wk", "avg sessions over "+years.length+" years")}
     ${fact("🔥", longest+" days", "longest daily training streak")}
     ${bikeKm?fact("🚴", fmtNum(toursDeFrance,1)+"×", "the Tour de France — "+fmtNum(bikeKm)+" km biked"):""}
     ${swimKm?fact("🏊", fmtNum(channels,1)+"×", "across the English Channel — "+fmtNum(swimKm)+" km swum"):""}
     ${runPace?fact("⚡", fmtPace(runPace)+"/km", "lifetime average running pace"):""}
     ${longSession?fact("⏳", fmtDurShort(longSession.t), "longest session — "+sportName(longSession.s)+" "+longSession.d.slice(0,4)):""}
     ${bigDay?fact("📈", fmtNum(bigDay[1])+" km", "biggest distance in a single day"):""}
     ${distinctShoes?fact("👟", fmtNum(distinctShoes), "pairs of running shoes worn out"):""}
     ${fact("🤸", sportCount, "different sports logged over the years")}
     ${fact("🗓️", fmtNum(coverage)+"%", "of all days had a workout")}
   </div>

   <div class="card" style="margin-bottom:18px">
     <div class="cardhead" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
       <h3>Activity calendar</h3>
       <label class="fld" style="max-width:120px">Year
         <select id="hm-year">${years.slice().reverse().map(y=>`<option ${y===_insightsYear?"selected":""}>${y}</option>`).join("")}</select></label>
     </div>
     <div class="hm-box">
       <div class="hm-scroll" id="hm-scroll">${activityHeatmap()}</div>
     </div>
     <div class="hm-legend">Less <span class="hm-cell" style="background:var(--panel2)"></span><span class="hm-cell" style="background:rgba(54,194,168,.4)"></span><span class="hm-cell" style="background:rgba(54,194,168,.6)"></span><span class="hm-cell" style="background:rgba(54,194,168,.8)"></span><span class="hm-cell" style="background:rgba(54,194,168,1)"></span> More<span class="hm-cell" style="background:rgba(255,178,90,.95);margin-left:12px"></span> top 1%<span class="hm-cell" style="background:rgba(224,90,108,.80);margin-left:12px"></span> injury<span class="hm-cell" style="background:rgba(232,150,60,.80);margin-left:8px"></span> illness<span class="hm-cell" style="background:rgba(125,142,170,.82);margin-left:8px"></span> rest<span class="hm-cell" style="background:rgba(80,180,220,.74);margin-left:8px"></span> recovery<span class="hm-cell" style="background:rgba(150,130,255,.72);margin-left:8px"></span> travel<span class="hm-cell" style="background:rgba(190,140,85,.76);margin-left:8px"></span> home<span class="hm-cell" style="background:rgba(228,80,200,.90);margin-left:8px"></span> race<span class="hm-cell" style="background:rgba(200,212,224,.80);margin-left:8px"></span> weather</div>
     <div class="note-sm">Each square is one day. Green shows the total <b>time trained</b> that day — darker means more — and orange marks your busiest 1%. Days with no workout but a diary note are tinted by what Mike jotted — a race/event, injury, illness, weather, rest, therapy/recovery, travel, or a home project. <b>Tap any square</b> for that day's workouts and notes.</div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:18px">
     <div class="card"><h3>By day of week</h3>${columnChart(dow,{unit:"sessions"})}<div class="note-sm">Total sessions on each weekday, all years combined — which days Mike trains most.</div></div>
     <div class="card"><h3>By month (all years)</h3>${columnChart(mon,{shortLabel:l=>l[0],unit:"sessions"})}<div class="note-sm">Sessions in each calendar month, every year stacked together — reveals seasonal patterns.</div></div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:18px">
     <div class="card"><h3>Why days were skipped <span class="muted" style="font-weight:400;font-size:12px">· ${years[0]}–${years[years.length-1]}</span></h3>
       ${restData.some(d=>d.value)?columnChart(restData,{unit:"days"}):`<div class="muted">No rest-reason notes found.</div>`}
       <div class="note-sm">Note-only days across all ${years.length} years (${years[0]}–${years[years.length-1]}), grouped by likely reason and keyword-matched from the diary jottings (medium confidence).</div></div>
   </div>

   <div class="card" style="margin-bottom:18px"><h3>Distance by year</h3>${columnChart(distByYear,{unit:"km",shortLabel:l=>"'"+l.slice(2),fmt:v=>fmtNum(v)+" km"})}<div class="note-sm">Total distance logged each year, all sports. (Active days per year live in Reports → Consistency.)</div></div>

   <div class="card" style="margin-bottom:18px"><h3>Sessions by sport</h3>
     <div class="shoebar">
       ${topSports.map(([s,cnt])=>`<div class="shoe">
         <span class="nm">${sportTag(s)}</span>
         <span class="track"><span class="fill" style="width:${(cnt/sportMax*100).toFixed(1)}%;background:linear-gradient(90deg,${sportColor(s)}88,${sportColor(s)})"></span></span>
         <span class="km">${fmtNum(cnt)}</span></div>`).join("")}
     </div>
     <div class="note-sm">All-time session counts by activity (top ${topSports.length}).</div></div>

   <div class="card" style="line-height:1.7">
     <h3>Consistency</h3>
     <div class="kvgrid">
       <div><b>Most active year</b>${topYear?topYear[0]+" — "+fmtNum(topYear[1])+" sessions":"—"}</div>
       <div><b>Busiest day</b>${busiest?busiest[0]+" — "+busiest[1]+" sessions":"—"}</div>
       <div><b>Distinct active days</b>${fmtNum(activeDays.length)}</div>
       <div><b>Longest streak</b>${longest} days</div>
       <div><b>Longest layoff</b>${gap} days between sessions</div>
       <div><b>Training span</b>${(Math.round(spanDays/365.25*10)/10)} years</div>
     </div>
   </div>

   <div class="card" style="margin-top:18px"><h3>By decade</h3>
     <div class="note-sm" style="margin-bottom:8px">Totals grouped into calendar decades (90s, 00s…). <b>Top sport</b> is the most-logged sport of that decade by session count. The 1990s and 2020s are partial decades.</div>
     <div class="tablewrap"><table><thead><tr><th>Decade</th><th class="num">Workouts</th><th class="num">Distance</th><th class="num">Hours</th><th>Top sport</th></tr></thead>
     <tbody>${decRows.map(o=>`<tr><td><b>${o.dec}s</b></td><td class="num">${fmtNum(o.count)}</td><td class="num">${fmtNum(Math.round(o.dist))} km</td><td class="num">${Math.round(o.dur/3600)}</td><td>${sportTag(o.top)}</td></tr>`).join("")}</tbody></table></div>
   </div>

   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:18px">
     <div class="card"><h3>🏃 Avg run pace by year</h3>${runTrend.length?columnChart(runTrend,{shortLabel:l=>"'"+l.slice(2),fmt:v=>fmtPace(v)+"/km",unit:"min/km"}):`<div class="muted">Not enough data.</div>`}<div class="note-sm">Shorter = faster · years with &ge;8 runs</div></div>
     <div class="card"><h3>🚴 Avg bike speed by year</h3>${bikeTrend.length?columnChart(bikeTrend,{shortLabel:l=>"'"+l.slice(2),fmt:v=>v.toFixed(1)+" km/h",valFmt:v=>v.toFixed(1),unit:"km/h"}):`<div class="muted">Not enough data.</div>`}<div class="note-sm">Years with &ge;8 rides</div></div>
   </div>

   <div class="card" style="margin-top:18px"><h3>On this day — ${MONTHS[_today.getMonth()]} ${_today.getDate()}</h3>
     ${otd.length?`<div class="kvgrid" style="grid-template-columns:1fr">${otd.map(r=>`<div><b style="display:inline-block;width:42px">${r.d.slice(0,4)}</b>${sportTag(r.s)} <span class="muted">${[fmtDur(r.t),r.k!=null?fmtNum(r.k,1)+" km":"",perf(r)].filter(Boolean).join(" · ")}</span></div>`).join("")}</div>`:`<div class="muted">No workouts recorded on this date in any year.</div>`}
   </div>

   ${topShoes.length?`<div class="card" style="margin-top:18px">
     <h3>Top running shoes by distance</h3>
     <div class="shoebar">
       ${topShoes.map(([nm,km])=>`<div class="shoe">
         <span class="nm" title="${escapeHTML(nm)}">${escapeHTML(nm)}</span>
         <span class="track"><span class="fill" style="width:${(km/shoeMax*100).toFixed(1)}%"></span></span>
         <span class="km">${fmtNum(km)} km</span></div>`).join("")}
     </div>
     <div class="note-sm">Distance attributed to the shoe noted on each run.</div>
   </div>`:""}`;

  // The heatmap is one continuous all-years strip. The Year dropdown scrolls it
  // to that year; scrolling updates the dropdown to match.
  const ysel=document.getElementById("hm-year");
  const scroll=document.getElementById("hm-scroll");
  const grid=scroll&&scroll.querySelector(".hm");
  if(scroll&&grid){
    const kids=grid.children;
    const step=()=>kids.length>1?(kids[1].getBoundingClientRect().left-kids[0].getBoundingClientRect().left)||16:16;
    const yearAt=()=>{ const i=Math.min(kids.length-1,Math.max(0,Math.round(scroll.scrollLeft/step()))); const el=kids[i]; return el?+el.dataset.year:_insightsYear; };
    const sync=()=>{ const y=yearAt(); if(ysel&&+ysel.value!==y)ysel.value=y; _insightsYear=y; };
    const scrollToYear=y=>{ for(let i=0;i<kids.length;i++){ if(+kids[i].dataset.year===y){ scroll.scrollTo({left:i*step(),behavior:"smooth"}); break; } } };
    scroll.addEventListener("scroll",sync,{passive:true});
    grid.addEventListener("click",e=>{ const c=e.target.closest(".hm-cell[data-d]"); if(c) showDayOverlay(c.dataset.d); });
    if(ysel) ysel.onchange=()=>scrollToYear(+ysel.value);
    // jump to the most-active year on open (no smooth animation for the initial jump)
    requestAnimationFrame(()=>{ for(let i=0;i<kids.length;i++){ if(+kids[i].dataset.year===_insightsYear){ scroll.scrollLeft=i*step(); break; } } sync(); });
  }
  wireFilter();
}

// Tap a calendar square → overlay that day's sessions and totals.
function dayPopup(ds){
  const all=DATA.filter(r=>r.d===ds);
  const rows=all.filter(r=>r.s!=="note");
  const notes=all.filter(r=>r.s==="note");
  const dt=new Date(ds+"T00:00:00Z");
  const title=WEEKDAYS[(dt.getUTCDay()+6)%7]+", "+MONTHS[dt.getUTCMonth()]+" "+dt.getUTCDate()+", "+dt.getUTCFullYear();
  let totDur=0,totKm=0; rows.forEach(r=>{ if(r.t)totDur+=r.t; if(r.k)totKm+=r.k; });
  const wbody=rows.map(r=>`<div class="e">${sportTag(r.s)}<span class="meta">${[r.t?fmtDur(r.t):"",r.k!=null?fmtNum(r.k,1)+" km":"",perf(r)].filter(Boolean).join(" · ")||"—"}</span>${r.n?`<div class="note-sm" style="flex-basis:100%;margin-top:2px">${escapeHTML(r.n)}</div>`:""}</div>`).join("");
  // Diary notes (injury, rest, travel, home projects…): show the
  // detected category as a coloured tag next to whatever Mike actually wrote.
  const nbody=notes.map(r=>{ const txt=noteText(r), c=classifyNote(txt);
    const lab=NOTE_LABEL[c]||"note", col=NOTE_COL[c]||"var(--panel2)";
    return `<div class="e"><span class="note-tag" style="background:${col}">${lab}</span><span class="meta">${escapeHTML(txt)||"—"}</span></div>`; }).join("");
  const body=(wbody+nbody)||`<div class="muted">Nothing recorded.</div>`;
  const tot=rows.length>1?`<div class="day-tot"><span><b>${rows.length}</b> sessions</span><span><b>${fmtDurShort(totDur)}</b> total</span>${totKm?`<span><b>${fmtNum(totKm,1)}</b> km</span>`:""}</div>`:"";
  return `<div class="day-card">
    <div class="cardhead" style="justify-content:space-between;margin-bottom:6px"><h3 style="margin:0">${title}</h3><button class="day-x" aria-label="Close">✕</button></div>
    ${tot}<div class="cal-detail">${body}</div>
  </div>`;
}
function showDayOverlay(ds){
  let ov=document.getElementById("day-overlay");
  if(!ov){ ov=document.createElement("div"); ov.id="day-overlay"; ov.className="overlay"; document.body.appendChild(ov);
    ov.addEventListener("click",e=>{ if(e.target===ov||e.target.closest(".day-x")) ov.classList.remove("show"); });
    document.addEventListener("keydown",e=>{ if(e.key==="Escape") ov.classList.remove("show"); });
  }
  ov.innerHTML=dayPopup(ds);
  ov.classList.add("show");
}

// GitHub-style activity heatmap spanning ALL years as one continuous Monday-top
// week grid coloured by each day's total training time (empty cells are rest
// days). Returns the month-label row + the week grid; the caller wraps it in a
// horizontal scroller. Each week carries data-year (its Thursday's year,
// ISO-week style) so scrolling can sync the year dropdown to the view.
function activityHeatmap(){
  const day={}, noteDay={};
  let minY=Infinity, maxY=-Infinity;
  for(const r of DATA){
    if(r.s==="note"){ const c=classifyNote(noteText(r)); if(c==="other") continue;
      if(!noteDay[r.d] || NOTE_RANK[c]>NOTE_RANK[noteDay[r.d]]) noteDay[r.d]=c; continue; }
    const y=yearOf(r); if(y<minY)minY=y; if(y>maxY)maxY=y;
    const m=day[r.d]||(day[r.d]={c:0,dur:0}); m.c++; if(r.t)m.dur+=r.t; }
  if(!isFinite(minY)) return `<div class="muted">No activity recorded.</div>`;
  // 95th-percentile day by training time → the top ~5% of days get a warm highlight
  const durs=Object.values(day).map(d=>d.dur).filter(v=>v>0).sort((x,y)=>x-y);
  const hot = durs.length>=2 ? durs[Math.floor(durs.length*0.99)] : Infinity;
  const start=new Date(Date.UTC(minY,0,1));
  start.setUTCDate(start.getUTCDate()-((start.getUTCDay()+6)%7));   // back to Monday
  const end=new Date(Date.UTC(maxY,11,31));
  end.setUTCDate(end.getUTCDate()+(6-((end.getUTCDay()+6)%7)));     // forward to Sunday
  const weeks=[]; const cur=new Date(start);
  while(cur<=end){
    const wk=[];
    for(let i=0;i<7;i++){
      const ds=cur.toISOString().slice(0,10), y=cur.getUTCFullYear();
      const inSpan=y>=minY&&y<=maxY, d=day[ds]||{c:0,dur:0};
      wk.push({ds,y,inSpan,c:d.c,dur:d.dur,note:noteDay[ds]||null});
      cur.setUTCDate(cur.getUTCDate()+1);
    }
    weeks.push({cells:wk, year:wk[3].y});   // Thursday's year labels the week
  }
  const color=d=>{
    if(!d.inSpan) return "transparent";
    if(!d.c) return d.note ? NOTE_COL[d.note] : "var(--panel2)";   // no workout: show a diary-note colour if any
    if(d.dur>0 && d.dur>=hot) return "rgba(255,178,90,.95)";   // top ~1% of days by training time
    const h=d.dur/3600, a=!d.dur?.35:h<0.75?.4:h<1.5?.6:h<2.5?.8:1;
    return `rgba(54,194,168,${a})`;
  };
  // Month label sits on the week containing the 1st; January also shows the year.
  const months=weeks.map(w=>{ const f=w.cells.find(d=>d.inSpan&&d.ds.slice(8)==="01");
    if(!f) return ""; const mo=+f.ds.slice(5,7); return mo===1?"'"+f.ds.slice(2,4):MONTHS[mo-1]; });
  const tip=d=>{ if(!d.inSpan) return "";
    if(!d.c) return d.note ? `${d.ds} · ${NOTE_LABEL[d.note]}` : "";
    return `${d.ds} · ${d.c} session${d.c===1?"":"s"}${d.dur?" · "+fmtDurShort(d.dur):""}${d.dur>0&&d.dur>=hot?" · top 1%":""}`; };
  return `<div class="hm-months">${months.map(m=>`<div class="hm-mlabel">${m}</div>`).join("")}</div>
    <div class="hm">${weeks.map(w=>`<div class="hm-week" data-year="${w.year}">${w.cells.map(d=>`<div class="hm-cell"${d.inSpan&&(d.c||d.note)?` data-d="${d.ds}"`:""} style="background:${color(d)}" title="${tip(d)}"></div>`).join("")}</div>`).join("")}</div>`;
}

//============================================================ GLOBAL FILTER
// A site-wide scope (year range + sport) applied to the Dashboard, Insights and
// Records pages. Kept in one place so switching tabs preserves the selection.
let FILTER = {fromY:null, toY:null, sport:""};
function allYears(){ return [...new Set(DATA.map(yearOf))].sort((a,b)=>a-b); }
function filtered(rows=DATA){
  return rows.filter(r=>{
    const y=yearOf(r);
    if(FILTER.fromY!=null && y<FILTER.fromY) return false;
    if(FILTER.toY!=null && y>FILTER.toY) return false;
    if(FILTER.sport && r.s!==FILTER.sport) return false;
    return true;
  });
}
function filterActive(){
  const ys=allYears();
  return !!FILTER.sport || (FILTER.fromY!=null&&FILTER.fromY!==ys[0]) || (FILTER.toY!=null&&FILTER.toY!==ys[ys.length-1]);
}
function filterBar(){
  const ys=allYears(); if(!ys.length) return "";
  const lo=ys[0], hi=ys[ys.length-1];

  const yopt=sel=>ys.map(y=>`<option ${y===sel?"selected":""}>${y}</option>`).join("");
  const sports=sportsByVolume(DATA).filter(s=>s!=="note"&&SPORTS[s]);

}
function wireFilter(){
  const from=document.getElementById("f-from"), to=document.getElementById("f-to"),
        sp=document.getElementById("f-sport"), cl=document.getElementById("f-clear");
  if(!from) return;
  const apply=()=>{ let a=+from.value, b=+to.value; if(a>b){const t=a;a=b;b=t;}
    FILTER.fromY=a; FILTER.toY=b; FILTER.sport=sp.value; route(); };
  from.onchange=apply; to.onchange=apply; sp.onchange=apply;
  if(cl) cl.onclick=()=>{ FILTER={fromY:null,toY:null,sport:""}; route(); };
}

//============================================================ CUMULATIVE CHART
// Cumulative distance through the year, one line per year overlaid, so you can
// see whether a year is running ahead of or behind your usual pace. Recent years
// are drawn brightest; older years fade into the background.
function cumulativeChart(rows){
  const byYear={};
  for(const r of rows){ if(!r.k) continue; (byYear[yearOf(r)]||(byYear[yearOf(r)]=[])).push(r); }
  const years=Object.keys(byYear).map(Number).sort((a,b)=>a-b);
  if(!years.length) return `<div class="muted">No distance data in range.</div>`;
  const W=660,H=240,padL=46,padR=12,padT=12,padB=22;
  const doy=ds=>{ const dt=new Date(ds+"T00:00:00Z"); return Math.floor((dt-Date.UTC(dt.getUTCFullYear(),0,1))/864e5); };
  let maxKm=0;
  const series=years.map(y=>{
    const rs=byYear[y].slice().sort((a,b)=>a.d<b.d?-1:1);
    let cum=0; const pts=[];
    for(const r of rs){ cum+=r.k; pts.push([doy(r.d),cum]); }
    if(cum>maxKm) maxKm=cum;
    return {y,pts,total:cum};
  });
  const ticks=niceTicks(Math.max(1,maxKm),4); const tmax=ticks[ticks.length-1];
  const X=d=>padL+(d/365)*(W-padL-padR);
  const Y=v=>padT+(1-v/tmax)*(H-padT-padB);
  const recent=years.slice(-6);
  const PAL=["#2b5a52","#2f7d76","#36a890","#43c2a8","#5fd6bf","#8af0dd"];
  const colorFor=y=>{ const ri=recent.indexOf(y); return ri<0 ? "rgba(138,160,181,.16)" : PAL[Math.round(ri/Math.max(1,recent.length-1)*(PAL.length-1))]; };
  const grid=ticks.map(t=>`<line x1="${padL}" x2="${W-padR}" y1="${Y(t).toFixed(1)}" y2="${Y(t).toFixed(1)}" class="lc-grid"/><text x="${padL-6}" y="${(Y(t)+3).toFixed(1)}" text-anchor="end" class="lc-ax">${fmtK(t)}</text>`).join("");
  const mlab=["Jan","Mar","May","Jul","Sep","Nov"].map((m,i)=>`<text x="${X([0,59,120,181,243,304][i]).toFixed(1)}" y="${H-6}" text-anchor="middle" class="lc-ax">${m}</text>`).join("");
  const paths=series.map(s=>{
    const col=colorFor(s.y), w=recent.includes(s.y)?2:1;
    const d=s.pts.map((p,j)=>`${j?'L':'M'}${X(p[0]).toFixed(1)} ${Y(p[1]).toFixed(1)}`).join(" ");
    return `<path d="${d}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linejoin="round" stroke-linecap="round"><title>${s.y}: ${fmtNum(Math.round(s.total))} km</title></path>`;
  }).join("");
  const legend=`<div class="cumlegend">`+recent.slice().reverse().map(y=>`<span><i style="background:${colorFor(y)}"></i>${y} · ${fmtNum(Math.round(byYear[y].reduce((a,r)=>a+r.k,0)))} km</span>`).join("")+(years.length>recent.length?`<span><i style="background:rgba(138,160,181,.16)"></i>earlier years</span>`:"")+`</div>`;
  return `<div class="yunit" style="position:static;margin-bottom:2px">km</div><svg class="linechart" viewBox="0 0 ${W} ${H}" role="img">${grid}${paths}${mlab}</svg>${legend}`;
}

//============================================================ RECORDS / BADGES / MILESTONES
// The source has some mis-parsed times (impossible paces/speeds), so pace/speed
// records use sanity guards; raw distance/duration records don't need them.
const _pace = r => (r.t/60)/r.k;          // min/km
const _kmh  = r => r.k/(r.t/3600);        // km/h
const _per100 = r => r.t/(r.k*10);        // sec/100 m
// 3.0 min/km floor: the source has runs where an interval split or a wrong time
// yields impossible sub-3:00/km paces; nobody in this log actually runs that fast.
const saneRun  = r => r.s==="run"  && r.t>0 && r.k>0 && _pace(r)>=3.0 && _pace(r)<=10;
const saneBike = r => r.s==="bike" && r.t>0 && r.k>0 && _kmh(r)>=8  && _kmh(r)<=55;
const saneSwim = r => r.s==="swim" && r.t>0 && r.k>0 && _per100(r)>=55 && _per100(r)<=200;
const dayNum = ds => Math.floor(Date.parse(ds+"T00:00:00Z")/864e5);

const RACE_DISTS = [["5K",5],["10K",10],["Half",21.0975],["Marathon",42.195]];
// Best avg pace over runs that covered at least each distance → an estimated time.
function distancePRs(rows){
  const runs=rows.filter(saneRun), out=[];
  for(const [name,D] of RACE_DISTS){
    const c=runs.filter(r=>r.k>=D-0.05); if(!c.length) continue;
    let b=c[0]; for(const r of c) if(_pace(r)<_pace(b)) b=r;
    out.push({name,D,row:b,sec:_pace(b)*60*D});
  }
  return out;
}
function streakInfo(rows){
  const days=[...new Set(rows.map(r=>r.d))].sort();
  let longest=0,cur=0,prev=null,curStart=null,bestStart=null,bestEnd=null;
  for(const ds of days){ const n=dayNum(ds);
    if(prev!==null&&n===prev+1){cur++;} else {cur=1;curStart=ds;}
    if(cur>longest){longest=cur;bestStart=curStart;bestEnd=ds;}
    prev=n;
  }
  let gap=0; for(let i=1;i<days.length;i++){const g=dayNum(days[i])-dayNum(days[i-1]); if(g>gap)gap=g;}
  return {longest,start:bestStart,end:bestEnd,gap,activeDays:days.length};
}
function dailyMap(rows){ const m={}; for(const r of rows){ const o=m[r.d]||(m[r.d]={k:0,c:0,dur:0}); o.c++; if(r.k)o.k+=r.k; if(r.t)o.dur+=r.t; } return m; }
// Max total over any rolling N-day window (key "k" distance or "c" sessions).
function rollingMax(rows,key,win){
  const m=dailyMap(rows), days=Object.keys(m).sort(); if(!days.length) return null;
  const dn=days.map(dayNum); let best=0,bestEnd=null,lo=0,sum=0;
  for(let hi=0;hi<days.length;hi++){
    sum+=m[days[hi]][key];
    while(dn[hi]-dn[lo]>win-1){ sum-=m[days[lo]][key]; lo++; }
    if(sum>best){best=sum;bestEnd=days[hi];}
  }
  return {val:best,end:bestEnd};
}
function monthMax(rows,key){ const m={}; for(const r of rows){ const k=r.d.slice(0,7); m[k]=(m[k]||0)+(key==="k"?(r.k||0):1);} let bk=null; for(const k in m) if(bk===null||m[k]>m[bk])bk=k; return bk?{val:m[bk],ym:bk}:null; }
function distMilestones(rows,thresholds){
  const rs=rows.filter(r=>r.k>0).slice().sort((a,b)=>a.d<b.d?-1:1);
  let cum=0,ti=0; const out=[];
  for(const r of rs){ cum+=r.k; while(ti<thresholds.length&&cum>=thresholds[ti]){ out.push({km:thresholds[ti],date:r.d}); ti++; } }
  return out;
}
// Riegel race-time projection from the fastest recent run (last ~2 years of data).
function predictRaces(rows){
  const sane=rows.filter(r=>saneRun(r)&&r.k>=3); if(!sane.length) return null;
  const latest=sane.reduce((a,b)=>a.d>b.d?a:b).d;
  const cut=new Date(latest+"T00:00:00Z"); cut.setUTCFullYear(cut.getUTCFullYear()-2);
  const cutS=cut.toISOString().slice(0,10);
  let pool=sane.filter(r=>r.d>=cutS&&r.k>=5);
  if(!pool.length) pool=sane.filter(r=>r.k>=5);
  if(!pool.length) pool=sane;
  let basis=pool[0]; for(const r of pool) if(_pace(r)<_pace(basis)) basis=r;
  return {basis, preds:RACE_DISTS.map(([n,D])=>({n,D,sec:basis.t*Math.pow(D/basis.k,1.06)}))};
}
function buildBadges(rows,prs){
  const total=rows.reduce((a,r)=>a+(r.k||0),0);
  const hours=rows.reduce((a,r)=>a+(r.t||0),0)/3600;
  const bikeKm=rows.filter(r=>r.s==="bike").reduce((a,r)=>a+(r.k||0),0);
  const swimKm=rows.filter(r=>r.s==="swim").reduce((a,r)=>a+(r.k||0),0);
  const sportsN=new Set(rows.map(r=>r.s)).size, yearsN=new Set(rows.map(yearOf)).size;
  const century=rows.some(r=>r.s==="bike"&&r.k>=100), dcentury=rows.some(r=>r.s==="bike"&&r.k>=200);
  const marathon=rows.some(r=>r.s==="run"&&r.k>=42.195);
  const st=streakInfo(rows);
  const prBy={}; for(const p of prs) prBy[p.name]=p.sec; const get=n=>prBy[n]??Infinity;
  const byDay={}; for(const r of rows){ (byDay[r.d]||(byDay[r.d]=new Set())).add(r.s); }
  const triDay=Object.values(byDay).some(s=>s.has("run")&&s.has("bike")&&s.has("swim"));
  const B=(ic,name,desc,earned,detail)=>({ic,name,desc,earned,detail});

    B("🏅","Marathoner","Run a marathon distance (42.2 km)",marathon,marathon?"Done":""),
    B("⚡","Sub-20 5K","Best 5K under 20:00",get("5K")<1200,get("5K")<Infinity?"Best "+fmtDur(Math.round(get("5K"))):""),
    B("🔥","Sub-40 10K","Best 10K under 40:00",get("10K")<2400,get("10K")<Infinity?"Best "+fmtDur(Math.round(get("10K"))):""),
    B("🏆","Sub-1:30 Half","Best half-marathon under 1:30",get("Half")<5400,get("Half")<Infinity?"Best "+fmtDur(Math.round(get("Half"))):""),
    B("👑","Sub-3 Marathon","Best marathon under 3:00",get("Marathon")<10800,get("Marathon")<Infinity?"Best "+fmtDur(Math.round(get("Marathon"))):""),
    B("📅","Century Streak","Train 100 days in a row",st.longest>=100,st.longest+"-day best streak"),
    B("🗓️","Iron Month","Train 30 days in a row",st.longest>=30,st.longest+"-day best streak"),
    B("🚴","Le Tour","Bike 3,360 km — a Tour de France",bikeKm>=3360,fmtNum(Math.round(bikeKm))+" km biked"),
    B("🏊","Channel Crossing","Swim 33.8 km lifetime",swimKm>=33.8,fmtNum(Math.round(swimKm))+" km swum"),
    B("💪","Triathlete","Run, bike and swim on the same day",triDay,triDay?"Done":""),
    B("🤸","All-Rounder","Log 10+ different sports",sportsN>=10,sportsN+" sports logged"),
    B("⏳","10,000 Hours","Train 10,000 hours total",hours>=10000,fmtNum(Math.round(hours))+" h trained"),
    B("🎂","Decade Strong","Train across 10+ years",yearsN>=10,yearsN+" years active"),
  ];
}
function buildMilestones(rows){
  const sorted=rows.slice().sort((a,b)=>a.d<b.d?-1:1); if(!sorted.length) return [];
  const ev=[{date:sorted[0].d,ic:"🎉",text:`First logged workout — ${sportName(sorted[0].s)}`}];
  const firstOf=(s,text,ic)=>{ const r=sorted.find(x=>x.s===s); if(r) ev.push({date:r.d,ic,text}); };
  firstOf("run","First run","🏃"); firstOf("bike","First ride","🚴"); firstOf("swim","First swim","🏊");
  const f10=sorted.find(r=>r.s==="run"&&r.k>=10); if(f10) ev.push({date:f10.d,ic:"🏃",text:"First 10 km run"});
  const fM=sorted.find(r=>r.s==="run"&&r.k>=42.195); if(fM) ev.push({date:fM.d,ic:"🏅",text:"First marathon-distance run"});
  const fC=sorted.find(r=>r.s==="bike"&&r.k>=100); if(fC) ev.push({date:fC.d,ic:"💯",text:"First 100 km ride"});
  for(const m of distMilestones(rows,[1000,5000,10000,25000,50000,75000,100000,150000,200000]))
    ev.push({date:m.date,ic:"📍",text:`${fmtNum(m.km)} km lifetime total reached`});
  const st=streakInfo(rows); if(st.longest>=7&&st.start) ev.push({date:st.start,ic:"🔥",text:`Longest streak begins — ${st.longest} days straight (through ${st.end})`});
  ev.push({date:sorted[sorted.length-1].d,ic:"⏱️",text:`Most recent workout — ${sportName(sorted[sorted.length-1].s)}`});
  return ev.sort((a,b)=>a.date<b.date?-1:1);
}
function renderRecords(app){
  // Drop interval-artifact "ultras": "8x400on77 7" parsed the rep split (77) as a
  // 77 km distance. Real long runs record a duration, so a >60 km run with no time
  // is a parse error, not an ultramarathon.
  const rows=filtered(DATA).filter(r=>r.s!=="note").filter(r=>!(r.s==="run"&&r.k>60&&!r.t));
  const recs=[], prs=distancePRs(rows);
  for(const p of prs) recs.push({v:fmtDur(Math.round(p.sec)),l:p.name,sub:fmtPace(_pace(p.row))+"/km · "+fmtNum(p.row.k,1)+" km",d:p.row.d});
  const longestBy=pred=>{ const a=rows.filter(pred); return a.length?a.reduce((x,y)=>(y.k||0)>(x.k||0)?y:x):null; };
  const lr=longestBy(r=>r.s==="run"&&r.k>0), lb=longestBy(r=>r.s==="bike"&&r.k>0), lsw=longestBy(r=>r.s==="swim"&&r.k>0);
  if(lr) recs.push({v:fmtNum(lr.k,1)+" km",l:"Longest run",sub:lr.t?fmtDurShort(lr.t):"",d:lr.d});
  if(lb) recs.push({v:fmtNum(lb.k,1)+" km",l:"Longest ride",sub:lb.t?fmtDurShort(lb.t):"",d:lb.d});
  if(lsw) recs.push({v:fmtNum(lsw.k,2)+" km",l:"Longest swim",sub:lsw.t?fmtDurShort(lsw.t):"",d:lsw.d});
  const ride40=rows.filter(r=>saneBike(r)&&r.k>=40);
  if(ride40.length){ const b=ride40.reduce((x,y)=>_kmh(y)>_kmh(x)?y:x); recs.push({v:_kmh(b).toFixed(1)+" km/h",l:"Fastest 40K+ ride",sub:fmtNum(b.k,1)+" km",d:b.d}); }
  const sw=rows.filter(saneSwim);
  if(sw.length){ const b=sw.reduce((x,y)=>_per100(y)<_per100(x)?y:x); recs.push({v:fmtMMSS(_per100(b))+"/100m",l:"Best swim pace",sub:fmtNum(b.k,2)+" km",d:b.d}); }
  const timed=rows.filter(r=>r.t>0);
  if(timed.length){ const b=timed.reduce((x,y)=>y.t>x.t?y:x); recs.push({v:fmtDurShort(b.t),l:"Longest session",sub:sportName(b.s),d:b.d}); }
  const dm=dailyMap(rows); let bd=null; for(const d in dm) if(!bd||dm[d].k>dm[bd].k)bd=d;
  if(bd&&dm[bd].k>0) recs.push({v:fmtNum(dm[bd].k,1)+" km",l:"Biggest day",d:bd});
  const wk=rollingMax(rows,"k",7); if(wk&&wk.val>0) recs.push({v:fmtNum(Math.round(wk.val))+" km",l:"Biggest week",d:"week to "+wk.end});
  const mo=monthMax(rows,"k"); if(mo&&mo.val>0) recs.push({v:fmtNum(Math.round(mo.val))+" km",l:"Biggest month",d:MONTHS[+mo.ym.slice(5,7)-1]+" "+mo.ym.slice(0,4)});
  const wkc=rollingMax(rows,"c",7); if(wkc&&wkc.val>0) recs.push({v:wkc.val+" sessions",l:"Most in a week",d:"week to "+wkc.end});

  const recCards=recs.length?recs.map(r=>`<div class="card stat rec"><div class="v">${r.v}</div><div class="l">${r.l}</div>${r.sub?`<div class="sub">${r.sub}</div>`:""}<div class="d">${r.d}</div></div>`).join(""):`<div class="muted">No records in this range.</div>`;
  const pred=predictRaces(rows);
  const predHtml=pred?`<div class="card" style="margin-top:18px"><h3>Predicted race times</h3>
     <div class="grid recgrid">${pred.preds.map(p=>`<div class="card stat rec"><div class="v">${fmtDur(Math.round(p.sec))}</div><div class="l">${p.n}</div></div>`).join("")}</div>
     <div class="note-sm">Riegel projection from your fastest recent run: ${fmtNum(pred.basis.k,1)} km @ ${fmtPace(_pace(pred.basis))}/km (${pred.basis.d}). An estimate, not a guarantee.</div></div>`:"";
  const badges=buildBadges(rows,prs);
  // Only show genuinely earned achievements — no greyed-out "unearned" ones.
  const earnedBadges=badges.filter(b=>b.earned);
  const badgeHtml=`<h3 style="margin-top:22px">Achievements <span class="muted" style="font-weight:600;text-transform:none;letter-spacing:0">· ${earnedBadges.length} unlocked</span></h3>
     <div class="grid badges">${earnedBadges.map(b=>`<div class="card badge earned"><div class="bic">${b.ic}</div><div class="bn">${b.name}</div><div class="bd">${b.detail||"Unlocked"}</div></div>`).join("")}</div>`;
  const mileHtml=`<h3 style="margin-top:22px">Milestones</h3><div class="card"><div class="tl">${buildMilestones(rows).map(e=>`<div class="ev"><div class="dt">${e.date}</div><div class="tx"><span class="ic">${e.ic}</span>${e.text}</div></div>`).join("")}</div></div>`;

  app.innerHTML=`<h2 class="section">Records &amp; Achievements</h2>${filterBar()}
    <h3>Personal records</h3><div class="grid recgrid">${recCards}</div>
    ${predHtml}${badgeHtml}${mileHtml}`;
  wireFilter();
}

//============================================================ YEAR IN REVIEW
let WRAP_YEAR=null;
function renderWrapped(app){
  const ys=allYears(); if(!ys.length){ app.innerHTML=`<div class="card" style="margin-top:20px">No data.</div>`; return; }
  if(WRAP_YEAR==null||!ys.includes(WRAP_YEAR)) WRAP_YEAR=ys[ys.length-1];
  const y=WRAP_YEAR;
  const cur=DATA.filter(r=>r.s!=="note"&&yearOf(r)===y);
  const prev=DATA.filter(r=>r.s!=="note"&&yearOf(r)===y-1);
  const a=agg(cur), pa=agg(prev), hours=a.dur/3600, phours=pa.dur/3600;
  const sp={}; for(const r of cur){ const o=sp[r.s]||(sp[r.s]={c:0,dur:0,k:0}); o.c++; o.dur+=r.t||0; o.k+=r.k||0; }
  const topSport=Object.keys(sp).sort((m,n)=>sp[n].dur-sp[m].dur)[0];
  const dm=dailyMap(cur); let bd=null; for(const d in dm) if(!bd||dm[d].k>dm[bd].k)bd=d;
  const timed=cur.filter(r=>r.t>0); const ls=timed.length?timed.reduce((x,z)=>z.t>x.t?z:x):null;
  const mc={}; cur.forEach(r=>{const m=monthOf(r)-1; mc[m]=(mc[m]||0)+1;});
  const bm=Object.keys(mc).sort((m,n)=>mc[n]-mc[m])[0];
  const st=streakInfo(cur);
  const prsThisYear=distancePRs(DATA.filter(r=>r.s!=="note")).filter(p=>yearOf(p.row)===y);
  const delta=(c,p)=>{ if(!p) return ""; const d=(c-p)/p*100, up=d>=0;
    return `<span class="delta ${up?"up":"down"}">${up?"▲":"▼"} ${Math.abs(d).toFixed(0)}% vs ${y-1}</span>`; };
  app.innerHTML=`<h2 class="section">Year in Review</h2>
   <div class="yearpicks" id="wrap-years">${ys.slice().reverse().map(yy=>`<button class="ypick ${yy===y?"sel":""}" data-y="${yy}">${yy}</button>`).join("")}</div>
   <div class="card wrap-hero"><div class="yr">${y}</div><div class="sub">${fmtNum(a.count)} workouts · ${fmtNum(Math.round(a.dist))} km · ${fmtNum(Math.round(hours))} hours${topSport?` · most: ${sportName(topSport)}`:""}</div></div>
   <div class="grid stat-row" style="margin:16px 0">
     <div class="card stat"><div class="num">${fmtNum(a.count)}</div><div class="lbl">Workouts</div><div class="note-sm">${delta(a.count,pa.count)}</div></div>
     <div class="card stat"><div class="num">${fmtNum(Math.round(a.dist))}</div><div class="lbl">Total km</div><div class="note-sm">${delta(a.dist,pa.dist)}</div></div>
     <div class="card stat"><div class="num">${fmtNum(Math.round(hours))}</div><div class="lbl">Hours</div><div class="note-sm">${delta(hours,phours)}</div></div>
     <div class="card stat"><div class="num">${st.longest}</div><div class="lbl">Best streak (days)</div></div>
   </div>
   <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(230px,1fr))">
     ${topSport?`<div class="card"><h3>Top sport</h3><div class="factnum">${sportMark(topSport)} ${sportName(topSport)}</div><div class="factsub">${fmtNum(sp[topSport].c)} sessions · ${fmtDurShort(sp[topSport].dur)}</div></div>`:""}
     ${bd&&dm[bd].k>0?`<div class="card"><h3>Biggest day</h3><div class="factnum">${fmtNum(dm[bd].k,1)} km</div><div class="factsub">${bd}</div></div>`:""}
     ${ls?`<div class="card"><h3>Longest session</h3><div class="factnum">${fmtDurShort(ls.t)}</div><div class="factsub">${sportName(ls.s)} · ${ls.d}</div></div>`:""}
     ${bm!=null?`<div class="card"><h3>Busiest month</h3><div class="factnum">${MONTHS[bm]}</div><div class="factsub">${mc[bm]} sessions</div></div>`:""}
     <div class="card"><h3>Personal records set</h3><div class="factnum">${prsThisYear.length}</div><div class="factsub">${prsThisYear.length?prsThisYear.map(p=>p.name).join(", "):"No new distance PRs this year"}</div></div>
   </div>
   <div class="card" style="margin-top:16px"><h3>Sessions by month</h3>${columnChart(MONTHS.map((m,i)=>({label:m,value:mc[i]||0})),{shortLabel:l=>l[0]})}</div>`;
  const yp=document.getElementById("wrap-years");
  if(yp) yp.addEventListener("click",e=>{ const b=e.target.closest(".ypick"); if(b){ WRAP_YEAR=+b.dataset.y; renderWrapped(app); window.scrollTo(0,0); } });
}

//============================================================ mobile bottom nav
// A fixed, thumb-reachable tab bar for phones. Built additively: it drives the
// existing go() router and mirrors its active state, so it needs no changes to
// the routing code above.
(function(){
  const ICONS = {
    dash:    '<path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.6V21h13V9.6"/>',
    insights:'<path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-3.8 10.6c.6.5.8 1 .8 2.4h6c0-1.4.2-1.9.8-2.4A6 6 0 0 0 12 3Z"/>',
    reports: '<path d="M4 21V10"/><path d="M10 21V4"/><path d="M16 21v-7"/><path d="M21 21H3"/>',
    records: '<path d="M7 4h10v3a5 5 0 0 1-10 0Z"/><path d="M7 5H4v1a3 3 0 0 0 3 3"/><path d="M17 5h3v1a3 3 0 0 1-3 3"/><path d="M10 17h4v3h-4z"/><path d="M9 20h6"/><path d="M12 12v5"/>',
    wrapped: '<path d="M12 3l2.3 5.4L20 9l-4 3.6L17.2 19 12 16l-5.2 3L8 12.6 4 9l5.7-.6z"/>',
    browse:  '<path d="M4 6h16M4 12h16M4 18h16"/>',
    about:   '<circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r="1.1" fill="currentColor" stroke="none"/>',
  };
  const SHORT = {dash:"Home", insights:"Insights", records:"Records", wrapped:"Recap", reports:"Reports", browse:"Data", about:"About"};
  const nav = document.getElementById("bottomnav");
  if(!nav || typeof TABS==="undefined") return;
  nav.innerHTML = TABS.map(([id])=>
    `<button data-tab="${id}" aria-label="${SHORT[id]||id}">
       <svg viewBox="0 0 24 24" aria-hidden="true">${ICONS[id]||""}</svg>
       <span>${SHORT[id]||id}</span></button>`).join("");
  const sync = ()=>nav.querySelectorAll("button").forEach(b=>
    b.classList.toggle("active", b.dataset.tab===current));
  nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{ go(b.dataset.tab); sync(); });
  // Wrap go() so the bar tracks navigation triggered anywhere (tabs, drill-ins).
  if(typeof go==="function"){ const _go=go; window.go=function(t){ _go(t); sync(); }; }
  window.addEventListener("hashchange", sync);
  sync();
})();

//============================================================ QOL: nav helpers
// Back-to-top button, tap-the-brand-to-go-home, and 1..N keyboard tab jumps.
// Additive: relies on the existing go()/TABS, touches no render code.
(function(){
  const btn=document.createElement("button");
  btn.id="toTop"; btn.type="button"; btn.setAttribute("aria-label","Back to top");
  btn.innerHTML='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V6"/><path d="M6 12l6-6 6 6"/></svg>';
  btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
  document.body.appendChild(btn);
  const onScroll=()=>btn.classList.toggle("show",(window.scrollY||document.documentElement.scrollTop)>320);
  window.addEventListener("scroll",onScroll,{passive:true}); onScroll();

  const brand=document.querySelector(".brand");
  if(brand){ brand.setAttribute("role","button"); brand.title="Back to Dashboard"; brand.onclick=()=>go("dash"); }

  document.addEventListener("keydown",e=>{
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    const tag=(e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="select"||tag==="textarea"||e.target.isContentEditable) return;
    if(typeof TABS==="undefined") return;
    const n=parseInt(e.key,10);
    if(n>=1 && n<=TABS.length) go(TABS[n-1][0]);
  });
})();

// Pin the fixed bottom nav to the VISUAL viewport. On iOS Safari the visual
// viewport (URL bar collapsed) is taller than the layout viewport that
// position:fixed;bottom:0 anchors to, so the bar drifts up and the page shows
// through below it. visualViewport gives the real offset; translate to correct
// it. No-op where unsupported (delta ~0 on desktop / standalone).
(function(){
  const vv = window.visualViewport;
  const nav = document.getElementById("bottomnav");
  if(!vv || !nav) return;
  let raf = 0;
  const pin = ()=>{ raf=0;
    const delta = document.documentElement.clientHeight - (vv.height + vv.offsetTop);
    nav.style.transform = `translateY(${-delta}px)`;
  };
  const sched = ()=>{ if(!raf) raf=requestAnimationFrame(pin); };
  vv.addEventListener("resize", sched);
  vv.addEventListener("scroll", sched);
  window.addEventListener("orientationchange", sched);
  pin();
})();

//============================================================ QOL: line-chart hover/tap tooltips
// Delegated so it works for any lineChart rendered later. Shows a value bubble +
// focus guide for the hovered/tapped point.
(function(){
  let active=null;
  function hide(){
    if(!active) return;
    const t=active.querySelector(".lc-tip"); if(t)t.hidden=true;
    const fl=active.querySelector(".lc-focus"),fd=active.querySelector(".lc-fdot");
    if(fl)fl.style.display="none"; if(fd)fd.style.display="none";
    active=null;
  }
  function show(hit){
    const w=hit.closest(".lc-wrap"); if(!w) return; active=w;
    const tip=w.querySelector(".lc-tip");
    const fl=w.querySelector(".lc-focus"), fd=w.querySelector(".lc-fdot");
    const cx=hit.getAttribute("data-cx"), cy=hit.getAttribute("data-cy");
    if(fl){ fl.setAttribute("x1",cx); fl.setAttribute("x2",cx); fl.style.display="block"; }
    if(fd){ fd.setAttribute("cx",cx); fd.setAttribute("cy",cy); fd.style.display="block"; }
    tip.innerHTML='<b>'+hit.getAttribute("data-label")+'</b> '+hit.getAttribute("data-value");
    tip.hidden=false;
    // Position the HTML bubble over the focus dot using its real on-screen rect
    // (handles the SVG viewBox scaling for us).
    const dr=fd.getBoundingClientRect(), wr=w.getBoundingClientRect();
    tip.style.left=(dr.left-wr.left+dr.width/2)+"px";
    tip.style.top=(dr.top-wr.top)+"px";
  }
  document.addEventListener("pointermove",e=>{
    const hit=e.target.closest&&e.target.closest(".lc-hit");
    if(hit) show(hit);
    else if(!(e.target.closest&&e.target.closest(".lc-wrap"))) hide();
  },{passive:true});
  document.addEventListener("pointerdown",e=>{
    const hit=e.target.closest&&e.target.closest(".lc-hit");
    if(hit) show(hit);
  },{passive:true});
})();
</script>
