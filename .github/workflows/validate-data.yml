name: Validate data

# Runs the data.json integrity check on every push and every PR into main,
# so meta/rows drift can't be merged. Part of the branch -> PR -> main flow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check data.json is internally consistent
        run: node validate-data.js
